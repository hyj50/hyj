  function renderNoteList() {
    const container = document.getElementById('note-list');
    const pag = document.getElementById('pagination');
    const info = document.getElementById('page-info');
    const list = currentEntries;

    // 대단원별 뷰
    if (currentFilter === 'byUnit') {
      if (!list.length) {
        container.innerHTML = '<div class="empty">표시할 오답이 없어요</div>';
        if (pag) pag.innerHTML = '';
        if (info) info.textContent = '';
        return;
      }
      const groups = {};
      list.forEach(e => {
        const key = [e.subject, e.major_unit].filter(Boolean).join(' > ') || '미분류';
        if (!groups[key]) groups[key] = [];
        groups[key].push(e);
      });
      container.innerHTML = Object.entries(groups).map(([unit, entries]) => `
        <div style="margin-bottom:16px;">
          <div style="font-size:13px;font-weight:700;color:#0F6E56;padding:8px 12px;background:#F0F8F5;border-radius:10px;margin-bottom:8px;">
            📚 ${unit} <span style="font-size:12px;color:#888;font-weight:400;">(${entries.length}개)</span>
          </div>
          ${entries.map(noteCardHtml).join('')}
        </div>
      `).join('');
      if (pag) pag.innerHTML = '';
      if (info) info.textContent = '';
      return;
    }

    if (currentFilter === 'unsorted' || currentFilter === 'reviewing') {
      // 미분류/검수대기는 폴더 없이 그냥 리스트로
      if (list.length === 0) {
        container.innerHTML = `<div class="empty">${currentFilter === 'unsorted' ? '미분류 오답이 없어요 🎉' : '검수 대기 중인 오답이 없어요 🎉'}</div>`;
      } else {
        container.innerHTML = [...list].sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('');
      }
      return;
    }

    if (list.length === 0) {
      container.innerHTML = '<div class="empty">표시할 오답이 없어요</div>';
      return;
    }

    // 분류 안 된 항목과 분류된 항목 분리
    const sortedList = list.filter(e => e.subject);
    const unsortedList = list.filter(e => !e.subject);

    const bySubject = {};
    sortedList.forEach(e => {
      const subj = e.subject || '기타';
      if (!bySubject[subj]) bySubject[subj] = [];
      bySubject[subj].push(e);
    });

    const subjectOrder = Object.keys(CURRICULUM).concat(['기타']);
    const subjectKeys = Object.keys(bySubject).sort((a, b) => subjectOrder.indexOf(a) - subjectOrder.indexOf(b));

    let html = '';

    // 미분류 항목 우선 표시 (폴더 밖에, 눈에 띄게)
    if (unsortedList.length > 0) {
      html += unsortedList.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('');
    }

    html += subjectKeys.map(subj => {
      const subjEntries = bySubject[subj];
      const subjPending = subjEntries.filter(e => !e.solved).length;
      const subjKey = 'subj_' + subj;
      const subjOpen = !!openGroups[subjKey];
      const majorMap = CURRICULUM[subj] || {};
      const majorOrder = Object.keys(majorMap);

      const byMajor = {};
      const noMajor = [];
      subjEntries.forEach(e => {
        if (e.major_unit) {
          if (!byMajor[e.major_unit]) byMajor[e.major_unit] = [];
          byMajor[e.major_unit].push(e);
        } else {
          noMajor.push(e);
        }
      });

      const majorKeys = Object.keys(byMajor).sort((a, b) => majorOrder.indexOf(a) - majorOrder.indexOf(b));

      const majorGroupsHtml = majorKeys.map(major => {
        const majorEntries = byMajor[major];
        const majorPending = majorEntries.filter(e => !e.solved).length;
        const mKey = subjKey + '__major_' + major;
        const mOpen = !!openGroups[mKey];
        const minorOrder = majorMap[major] || [];

        const byMinor = {};
        const noMinor = [];
        majorEntries.forEach(e => {
          if (e.minor_unit) {
            if (!byMinor[e.minor_unit]) byMinor[e.minor_unit] = [];
            byMinor[e.minor_unit].push(e);
          } else {
            noMinor.push(e);
          }
        });

        const minorKeys = Object.keys(byMinor).sort((a, b) => minorOrder.indexOf(a) - minorOrder.indexOf(b));

        const minorGroupsHtml = minorKeys.map(minor => {
          const minorEntries = byMinor[minor];
          const minorPending = minorEntries.filter(e => !e.solved).length;
          const miKey = mKey + '__minor_' + minor;
          const miOpen = !!openGroups[miKey];
          return `
            <div class="minor-group">
              <div class="minor-header" onclick="toggleGroup('${miKey}')">
                <span class="minor-arrow ${miOpen ? 'open' : ''}">▶</span>
                <span class="minor-name">${minor}</span>
                <span class="minor-count ${minorPending > 0 ? 'has-pending' : ''}">${minorEntries.length}개${minorPending > 0 ? ' · 미해결 ' + minorPending : ''}</span>
              </div>
              <div class="minor-body ${miOpen ? 'open' : ''}">
                ${minorEntries.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
              </div>
            </div>`;
        }).join('');

        const noMinorHtml = noMinor.length > 0 ? (() => {
          const miKey = mKey + '__nominor';
          const miOpen = !!openGroups[miKey];
          const pc = noMinor.filter(e => !e.solved).length;
          return `
            <div class="minor-group">
              <div class="minor-header" onclick="toggleGroup('${miKey}')">
                <span class="minor-arrow ${miOpen ? 'open' : ''}">▶</span>
                <span class="minor-name">중단원 미지정</span>
                <span class="minor-count ${pc > 0 ? 'has-pending' : ''}">${noMinor.length}개</span>
              </div>
              <div class="minor-body ${miOpen ? 'open' : ''}">
                ${noMinor.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
              </div>
            </div>`;
        })() : '';

        return `
          <div class="major-group">
            <div class="major-header" onclick="toggleGroup('${mKey}')">
              <span class="major-arrow ${mOpen ? 'open' : ''}">▶</span>
              <span class="major-name">${major}</span>
              <span class="major-count ${majorPending > 0 ? 'has-pending' : ''}">${majorEntries.length}개${majorPending > 0 ? ' · 미해결 ' + majorPending : ''}</span>
            </div>
            <div class="major-body ${mOpen ? 'open' : ''}">
              ${minorGroupsHtml}${noMinorHtml}
            </div>
          </div>`;
      }).join('');

      const noMajorHtml = noMajor.length > 0 ? (() => {
        const mKey = subjKey + '__nomajor';
        const mOpen = !!openGroups[mKey];
        const pc = noMajor.filter(e => !e.solved).length;
        return `
          <div class="major-group">
            <div class="major-header" onclick="toggleGroup('${mKey}')">
              <span class="major-arrow ${mOpen ? 'open' : ''}">▶</span>
              <span class="major-name">대단원 미지정</span>
              <span class="major-count ${pc > 0 ? 'has-pending' : ''}">${noMajor.length}개</span>
            </div>
            <div class="major-body ${mOpen ? 'open' : ''}">
              ${noMajor.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
            </div>
          </div>`;
      })() : '';

      return `
        <div class="subject-group">
          <div class="subject-header" onclick="toggleGroup('${subjKey}')">
            <span class="subject-arrow ${subjOpen ? 'open' : ''}">▶</span>
            <span class="subject-folder-icon">📁</span>
            <span class="subject-name">${subj}</span>
            <span class="subject-count ${subjPending > 0 ? 'has-pending' : ''}">${subjEntries.length}개${subjPending > 0 ? ' · 미해결 ' + subjPending : ''}</span>
          </div>
          <div class="subject-body ${subjOpen ? 'open' : ''}">
            ${majorGroupsHtml}${noMajorHtml}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = html;
    renderPaginationT();
  }

  function renderPaginationT() {
    const pag = document.getElementById('pagination');
    const info = document.getElementById('page-info');
    if (!pag) return;
    const totalPages = Math.ceil(totalCountT / PAGE_SIZE_T);
    if (totalPages <= 1) { pag.innerHTML = ''; if(info) info.textContent = ''; return; }
    if (info) info.textContent = `전체 ${totalCountT}개 중 ${(currentPageT-1)*PAGE_SIZE_T+1}–${Math.min(currentPageT*PAGE_SIZE_T, totalCountT)}번째`;
    const start = Math.max(1, currentPageT - 2);
    const end = Math.min(totalPages, start + 4);
    let btns = `<button class="page-btn ${currentPageT===1?'disabled':''}" onclick="goPageT(${currentPageT-1})">‹</button>`;
    if (start > 1) btns += `<button class="page-btn" onclick="goPageT(1)">1</button>${start>2?'<span style="padding:0 2px;color:#ccc">…</span>':''}`;
    for (let p = start; p <= end; p++) btns += `<button class="page-btn ${p===currentPageT?'active':''}" onclick="goPageT(${p})">${p}</button>`;
    if (end < totalPages) btns += `${end<totalPages-1?'<span style="padding:0 2px;color:#ccc">…</span>':''}<button class="page-btn" onclick="goPageT(${totalPages})">${totalPages}</button>`;
    btns += `<button class="page-btn ${currentPageT===totalPages?'disabled':''}" onclick="goPageT(${currentPageT+1})">›</button>`;
    pag.innerHTML = btns;
  }

  async function goPageT(p) {
    const totalPages = Math.ceil(totalCountT / PAGE_SIZE_T);
    if (p < 1 || p > totalPages) return;
    currentPageT = p;
    await loadCurrentPage();
    document.getElementById('note-list')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ===== 월별 순위표 =====
  let lbYear, lbMonth;
  function initLbMonth() {
    const d = new Date();
    lbYear = d.getFullYear();
    lbMonth = d.getMonth() + 1;
    const label = document.getElementById('lb-month-label');
    if (label) label.textContent = `${lbYear}년 ${lbMonth}월`;
  }
  initLbMonth();

  function changeMonth(delta) {
    lbMonth += delta;
    if (lbMonth > 12) { lbMonth = 1; lbYear++; }
    if (lbMonth < 1) { lbMonth = 12; lbYear--; }
    loadLeaderboard();
  }

  function getMonthStr() {
    return `${lbYear}-${String(lbMonth).padStart(2, '0')}`;
  }

  async function loadLeaderboard() {
    const monthStr = getMonthStr();
    document.getElementById('lb-month-label').textContent = `${lbYear}년 ${lbMonth}월`;

    try {
      // 해당 월의 모든 오답 데이터 가져오기
      const nextMonth = lbMonth === 12 ? 1 : lbMonth + 1;
      const nextYear = lbMonth === 12 ? lbYear + 1 : lbYear;
      const dateFrom = `${monthStr}-01`;
      const dateTo = `${nextYear}-${String(nextMonth).padStart(2, '0')}-01`;

      // entry_date 기준 + created_at 기준 둘 다 가져오기
      const [notesRes1, notesRes2] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?select=student_id,entry_date,review_status,solved,created_at&entry_date=gte.${dateFrom}&entry_date=lt.${dateTo}`, { headers: sbHeaders() }),
        fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?select=student_id,entry_date,review_status,solved,created_at&entry_date=is.null&created_at=gte.${dateFrom}T00:00:00&created_at=lt.${dateTo}T00:00:00`, { headers: sbHeaders() })
      ]);
      const notes1 = await notesRes1.json();
      const notes2 = await notesRes2.json();
      const notes = [...(Array.isArray(notes1) ? notes1 : []), ...(Array.isArray(notes2) ? notes2 : [])];

      // 해당 월의 보너스 포인트
      const bonusRes = await fetch(`${SUPABASE_URL}/rest/v1/bonus_points?select=student_id,points&month=eq.${monthStr}`, {
        headers: sbHeaders()
      });
      let bonuses = [];
      try { bonuses = await bonusRes.json(); } catch(e) { bonuses = []; }

      // 학생별 점수 계산
      const scores = {};
      students.forEach(s => {
        scores[s.id] = { name: s.name, uploads: 0, approved: 0, bonus: 0, total: 0 };
      });

      notes.forEach(n => {
        if (!scores[n.student_id]) return;
        if (n.review_status === 'approved' || (n.solved && !n.review_status)) {
          scores[n.student_id].approved += 10; // 검수 OK 통합 10점
        }
      });

      if (Array.isArray(bonuses)) {
        bonuses.forEach(b => {
          if (!scores[b.student_id]) return;
          scores[b.student_id].bonus += b.points;
        });
      }

      // 총점 계산 & 정렬
      const ranked = Object.values(scores).map(s => {
        s.total = s.uploads + s.approved + s.bonus;
        return s;
      }).sort((a, b) => b.total - a.total);

      const medals = ['🥇', '🥈', '🥉'];
      const tbody = document.getElementById('lb-body');

      if (ranked.length === 0 || ranked.every(r => r.total === 0)) {
        tbody.innerHTML = `<tr><td colspan="6" class="lb-empty">이번 달 데이터가 아직 없어요</td></tr>`;
        return;
      }

      tbody.innerHTML = ranked.map((r, i) => `
        <tr>
          <td class="lb-rank">${i < 3 ? `<span class="lb-medal">${medals[i]}</span>` : (i + 1)}</td>
          <td class="lb-name">${r.name}</td>
          <td class="lb-detail">${r.uploads}점</td>
          <td class="lb-detail">${r.approved}점</td>
          <td class="lb-detail">${r.bonus > 0 ? '+' + r.bonus : '-'}</td>
          <td class="lb-score">${r.total}점</td>
        </tr>
      `).join('');

      // 보너스 내역 렌더링
      const historyEl = document.getElementById('bonus-history');
      if (historyEl) {
        if (!Array.isArray(bonuses) || bonuses.length === 0) {
          historyEl.innerHTML = '';
        } else {
          const bonusDetail = await fetch(`${SUPABASE_URL}/rest/v1/bonus_points?select=*&month=eq.${monthStr}&order=created_at.desc`, { headers: sbHeaders() });
          const bonusData = await bonusDetail.json();
          historyEl.innerHTML = `
            <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:6px;">📋 이번 달 보너스 내역</div>
            ${bonusData.map(b => {
              const sName = students.find(s => s.id === b.student_id)?.name || '알 수 없음';
              return `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:10px;padding:8px 12px;font-size:13px;">
                <span style="color:var(--text1);font-weight:600;">${sName}</span>
                <span style="color:#854F0B;font-weight:700;">+${b.points}점 ${b.memo ? `(${b.memo})` : ''}</span>
                <button onclick="cancelBonus('${b.id}')" style="background:none;border:none;color:#FF453A;font-size:13px;cursor:pointer;font-weight:600;">취소</button>
              </div>`;
            }).join('')}`;
        }
      }

    } catch (err) {
      console.error('순위표 로드 실패:', err);
    }
  }

  async function cancelBonus(bonusId) {
    if (!confirm('이 보너스 점수를 취소할까요?')) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/bonus_points?id=eq.${bonusId}`, {
        method: 'DELETE', headers: sbHeaders()
      });
      loadLeaderboard();
    } catch { alert('취소 실패했어요 ㅠㅠ'); }
  }

  function populateBonusSelect() {
    const sel = document.getElementById('bonus-student-select');
    sel.innerHTML = '<option value="">학생 선택</option>' +
      students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }

  async function giveBonus() {
    const studentId = document.getElementById('bonus-student-select').value;
    const points = parseInt(document.getElementById('bonus-points').value);
    const memo = document.getElementById('bonus-memo').value.trim();

    if (!studentId) { alert('학생을 선택해주세요.'); return; }
    if (!points || points <= 0) { alert('점수를 입력해주세요.'); return; }

    const monthStr = getMonthStr();
    const studentName = students.find(s => s.id === studentId)?.name || '';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/bonus_points`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({
          student_id: studentId,
          points: points,
          memo: memo || null,
          month: monthStr
        })
      });
      if (!res.ok) throw new Error(await res.text());

      // 통합 포인트에도 적립
      await grantPoints(studentId, points, memo ? `보너스: ${memo}` : '보너스 점수');

      alert(`✅ ${studentName}에게 보너스 ${points}점 지급 완료!`);
      document.getElementById('bonus-points').value = '';
      document.getElementById('bonus-memo').value = '';
      loadLeaderboard();
    } catch (err) {
      console.error(err);
      alert('보너스 지급에 실패했어요.');
    }
  }

  // ===== 학생 업로드 페이지 링크 표시 =====
  function switchMainTab(tab) {
    document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mainTab === tab));
    document.querySelectorAll('.main-tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('main-tab-' + tab).classList.add('active');
    if (tab === 'qna') loadTeacherQnA(1);
    if (tab === 'rank') loadLeaderboard();
    if (tab === 'mission') { loadVariationReviews(); loadShopItems(); loadPurchases(); loadPointOverview(); }
  }

  function showTeacherUploadOptions(entryId) {
    const sheet = document.getElementById('teacher-upload-action-sheet');
    sheet.style.display = 'flex';
    sheet.dataset.entryId = entryId;
  }

  function hideTeacherUploadSheet() {
    document.getElementById('teacher-upload-action-sheet').style.display = 'none';
  }

  function teacherUploadSheetSelect(type) {
    const entryId = document.getElementById('teacher-upload-action-sheet').dataset.entryId;
    hideTeacherUploadSheet();
    if (type === 'camera') {
      document.getElementById(`solution-file-input-cam-${entryId}`).click();
    } else {
      document.getElementById(`solution-file-input-${entryId}`).click();
    }
  }

  function toggleHeatmap() {
    const el = document.getElementById('heatmap-collapsible');
    const icon = document.getElementById('heatmap-toggle-icon');
    if (el.style.display === 'none') {
      el.style.display = 'block';
      icon.textContent = '▲';
    } else {
      el.style.display = 'none';
      icon.textContent = '▼';
    }
  }

  // 당겨서 새로고침 막기 (스크롤은 유지)
  let touchStartY = 0;
  document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const touchY = e.touches[0].clientY;
    if (scrollTop === 0 && touchY > touchStartY) {
      e.preventDefault();
    }
  }, { passive: false });

  // 뒤로가기 버튼 막기
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });

  // ===== 초기 실행 =====
  checkLoginOnLoad();

  // PWA 서비스워커 등록
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }
</script>
