<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오답 너 뒤졌다 (선생)</title>
<link rel="manifest" href="/manifest-teacher.json">
<meta name="theme-color" content="#E8639A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오답뒤졌다(선생)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f5f5f0;
    --bg2: #ffffff;
    --bg3: #fafafa;
    --bg4: #f8f8f5;
    --border: #eee;
    --border2: #ddd;
    --text1: #1a1a1a;
    --text2: #555;
    --text3: #888;
    --text4: #aaa;
    --tab-bg: #f0f0eb;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    --pink: #E8639A;
    --pink-dark: #C94080;
    --pink-light: #FDE8F2;
    --green: #0F6E56;
    --green-light: #E1F5EE;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --bg2: #252528;
      --bg3: #38383a;
      --bg4: #2c2c2e;
      --border: #48484a;
      --border2: #636366;
      --text1: #f2f2f7;
      --text2: #ebebf5cc;
      --text3: #ebebf599;
      --text4: #ebebf560;
      --tab-bg: #2c2c2e;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.4);
      --pink: #FF6EB0;
      --pink-dark: #FF6EB0;
      --pink-light: #3a1a2a;
      --green: #30d158;
      --green-light: #1a3a2a;
    }
  }

  html, body { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text1); }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 1rem; }
  .wrap { max-width: 600px; margin: 0 auto; }

  @media (max-width: 600px) {
    body { padding: 0.8rem; }
    .board { padding: 1.1rem !important; }
    .stats-row { grid-template-columns: 1fr 1fr 1fr; gap: 6px !important; }
    .student-select-row { flex-wrap: wrap; }
    .student-select-row select { width: 100%; }
    .note-top-row { flex-direction: column; }
    .note-thumbs { width: 100%; }
    .note-thumb { flex: 1; height: 120px; }
    .note-thumb.mini { flex: 1; height: 120px; }
  }

  /* 로그인 화면 */
  .login-wrap { max-width: 360px; margin: 8rem auto; }
  .login-card { background: var(--bg2); border-radius: 24px; padding: 2.4rem 2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.10); text-align: center; }
  .login-card h1 { font-size: 20px; margin-bottom: 6px; color: var(--text1); font-weight: 700; }
  .login-card input { width: 100%; padding: 12px 14px; font-size: 15px; border-radius: 10px; border: 1px solid var(--border2); outline: none; margin-bottom: 10px; text-align: center; background: var(--bg2); color: var(--text1); }
  .login-card input:focus { border-color: var(--pink); }
  .login-card button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: white; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(232,99,154,0.35); }
  .login-error { color: #993C1D; font-size: 12px; margin-top: 8px; display: none; }
  .login-error.show { display: block; }

  /* 학생 선택 바 */
  .student-bar { background: var(--bg2); border-radius: 20px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .student-select-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .student-select-row select { flex: 1; min-width: 120px; padding: 10px 12px; font-size: 15px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); }
  .btn-small { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg2); font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; color: var(--text2); }
  .btn-add-student { border-color: var(--pink); color: var(--pink); }
  .btn-add-student:hover { background: var(--pink-light); }
  .btn-del-student { border-color: #993C1D; color: #FF453A; }
  .btn-logout { border-color: var(--border2); color: var(--text3); }

  .add-form { display: none; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .add-form.show { display: flex; }
  .add-form input { flex: 1; min-width: 90px; padding: 9px 12px; font-size: 13px; border-radius: 8px; border: 1px solid var(--border2); outline: none; background: var(--bg2); color: var(--text1); }
  .add-form input:focus { border-color: var(--pink); }
  .add-form button { padding: 9px 16px; border-radius: 8px; border: none; background: var(--pink); color: white; font-size: 13px; cursor: pointer; font-weight: 600; }

  .student-link-box { background: var(--pink-light); border: 1px solid var(--pink); border-radius: 10px; padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: var(--pink-dark); }
  .student-link-box code { background: var(--bg2); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

  /* 월별 순위표 */
  .leaderboard { background: var(--bg2); border-radius: 20px; padding: 1.4rem; margin-bottom: 1rem; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .lb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .lb-title { font-size: 16px; font-weight: 700; color: var(--text1); }
  .lb-month-nav { display: flex; align-items: center; gap: 8px; }
  .lb-month-nav button { background: none; border: 1px solid var(--border2); border-radius: 10px; width: 32px; height: 32px; font-size: 14px; cursor: pointer; color: var(--text3); background: var(--bg3); }
  .lb-month-label { font-size: 14px; font-weight: 600; color: var(--text1); min-width: 100px; text-align: center; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th { font-size: 11px; color: var(--text3); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 500; }
  .lb-table td { font-size: 13px; padding: 8px; border-bottom: 1px solid var(--border); }
  .lb-rank { font-weight: 700; width: 36px; }
  .lb-name { font-weight: 600; color: var(--text1); }
  .lb-score { font-weight: 700; color: var(--pink); text-align: right; }
  .lb-detail { font-size: 11px; color: var(--text4); text-align: right; }
  .lb-medal { font-size: 16px; }
  .lb-empty { text-align: center; padding: 1.5rem; color: var(--text4); font-size: 13px; }

  .bonus-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .bonus-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .bonus-row select, .bonus-row input { padding: 8px 10px; font-size: 13px; border-radius: 8px; border: 1px solid var(--border2); outline: none; background: var(--bg2); color: var(--text1); }
  .bonus-row select { flex: 1; min-width: 80px; }
  .bonus-row input[type="number"] { width: 70px; }
  .bonus-row input[type="text"] { flex: 2; min-width: 100px; }
  .btn-bonus { padding: 8px 14px; border-radius: 8px; border: none; background: #854F0B; color: white; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* 통계 대시보드 */
  .board { background: var(--bg2); border-radius: 20px; padding: 1.8rem; box-shadow: var(--card-shadow); }
  .profile-head { text-align: center; margin-bottom: 1.2rem; }
  h1 { font-size: 20px; font-weight: 600; color: var(--text1); margin-bottom: 4px; }
  .profile-sub { font-size: 13px; color: var(--text3); }

  .dashboard-t {
    background: linear-gradient(135deg, #E8639A, #C94080);
    border-radius: 20px; padding: 1.2rem;
    margin-bottom: 1rem; color: white;
    box-shadow: 0 6px 24px rgba(232,99,154,0.35);
  }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; margin-bottom: 14px; }
  .stat-card { text-align: center; padding: 0.6rem; position: relative; }
  .stat-card + .stat-card::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:1px; background:rgba(255,255,255,0.3); }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.75); margin-bottom: 2px; font-weight: 600; }
  .stat-value { font-size: 28px; font-weight: 800; color: white; }
  .stat-value.green { color: #A8FFD4; }
  .stat-value.orange { color: #FFE0A0; }

  .progress-wrap-t { margin-top: 4px; }
  .progress-label-t { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
  .progress-bar-t { height: 6px; background: rgba(255,255,255,0.25); border-radius: 6px; overflow: hidden; }
  .progress-fill-t { height: 100%; background: white; border-radius: 6px; transition: width 0.8s ease; }

  /* 알림 카드 */
  .unsorted-alert { background: linear-gradient(135deg, #FFF3F0, #FFE8E0); border: 1px solid #FFD4C2; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; display: none; }
  .unsorted-alert.show { display: block; }
  .unsorted-title { font-size: 13px; font-weight: 700; color: #B5421F; margin-bottom: 4px; }
  .unsorted-sub { font-size: 12px; color: #8a3115; }

  /* 약점 TOP3 */
  .weakness-card { background: linear-gradient(135deg, #FFF3F0, #FFE8E0); border: 1px solid #FFD4C2; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; }
  .weakness-title { font-size: 13px; font-weight: 700; color: #B5421F; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .weakness-list { display: flex; flex-direction: column; gap: 6px; }
  .weakness-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #6B2E16; background: var(--bg2); padding: 7px 12px; border-radius: 8px; }
  .weakness-rank { font-weight: 700; margin-right: 6px; }
  .weakness-count { font-size: 12px; font-weight: 600; color: #B5421F; }
  .weakness-empty { font-size: 12px; color: var(--text4); padding: 4px 0; }

  .review-alert { background: linear-gradient(135deg, #FFF8E7, #FFEFC9); border: 1px solid #FAC775; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; display: none; }
  .review-alert.show { display: block; }
  .review-alert-title { font-size: 13px; font-weight: 700; color: #854F0B; margin-bottom: 8px; }
  .review-alert-list { display: flex; flex-direction: column; gap: 6px; }
  .review-alert-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12.5px; color: #6B3E0B; background: var(--bg2); padding: 7px 12px; border-radius: 8px; }
  .review-tag { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 6px; white-space: nowrap; }
  .review-tag.d1 { background: #FFE0DC; color: #B5421F; }
  .review-tag.d3 { background: #FFF0CC; color: #854F0B; }
  .review-tag.d7 { background: #DCEEE8; color: #0F6E56; }

  .heatmap-card { background: var(--bg4); border-radius: 14px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
  .heatmap-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
  .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; max-width: 280px; margin: 0 auto; }
  .heatmap-cell { aspect-ratio: 1; border-radius: 4px; background: var(--border); }
  .heatmap-cell.l1 { background: #FDE8F2; }
  .heatmap-cell.l2 { background: #F4A8CC; }
  .heatmap-cell.l3 { background: #EC76AD; }
  .heatmap-cell.l4 { background: #E8639A; }
  .heatmap-legend { display: flex; align-items: center; gap: 4px; margin-top: 8px; justify-content: flex-end; font-size: 10px; color: var(--text4); }
  .heatmap-legend-cell { width: 10px; height: 10px; border-radius: 2px; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 13px; border-radius: 20px;
    border: 1.5px solid var(--border2);
    background: var(--bg2); font-size: 12px;
    cursor: pointer; color: var(--text3);
    font-weight: 600; transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: linear-gradient(135deg, #E8639A, #C94080);
    color: white; border-color: transparent;
    box-shadow: 0 2px 8px rgba(232,99,154,0.35);
  }

  /* 애니메이션 */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .note-list { display: flex; flex-direction: column; gap: 12px; }
  .note-card {
    background: var(--bg2);
    border-radius: 16px;
    padding: 1rem;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    animation: fadeSlideIn 0.2s ease both;
    transition: transform 0.15s;
    overflow: hidden;
  }
  .note-card:nth-child(1) { animation-delay: 0.00s; }
  .note-card:nth-child(2) { animation-delay: 0.04s; }
  .note-card:nth-child(3) { animation-delay: 0.08s; }
  .note-card:nth-child(4) { animation-delay: 0.12s; }
  .note-card:nth-child(5) { animation-delay: 0.16s; }
  .note-card:nth-child(6) { animation-delay: 0.20s; }
  .note-card:nth-child(7) { animation-delay: 0.24s; }
  .note-card:nth-child(8) { animation-delay: 0.28s; }
  .note-card:nth-child(9) { animation-delay: 0.32s; }
  .note-card:nth-child(10) { animation-delay: 0.36s; }
  .note-card.solved { opacity: 0.55; border-left: 4px solid #30d158; }
  .note-card.struggling { border-left: 4px solid #FF9F0A; background: var(--bg3); }
  .note-card.unsorted { border-left: 4px solid #FF453A; background: var(--bg3); }

  .note-top-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .note-thumbs { display: flex; gap: 6px; width: 100%; }
  .note-thumb { flex: 1; min-width: 0; height: 110px; border-radius: 10px; object-fit: cover; cursor: pointer; background: var(--border); display: block; }
  .note-body { flex: 1; min-width: 0; }
  .note-memo { font-size: 13px; color: var(--text2); margin-bottom: 4px; word-break: break-word; }
  .note-date { font-size: 11px; color: var(--text4); }
  .note-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .note-reason-tag { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: var(--bg4); color: var(--text3); }
  .note-retry-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: #FFE0DC; color: #B5421F; font-weight: 600; }
  .status-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; font-weight: 700; }
  .status-badge.pending { background: #FFF3CC; color: #854F0B; }
  .status-badge.approved { background: var(--green-light); color: var(--green); }
  .status-badge.rejected { background: #FFE0DC; color: #B5421F; }
  .review-btns { display: flex; gap: 6px; }
  .btn-ok { padding: 7px 14px; border-radius: 8px; border: none; background: var(--green); color: white; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .btn-no { padding: 7px 14px; border-radius: 8px; border: 1.5px solid #FF453A; background: var(--bg2); color: #FF453A; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .btn-reopen { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text3); font-size: 12px; cursor: pointer; }
  .note-unsorted-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: #FFD9C2; color: #B5421F; font-weight: 700; }
  .note-actions-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .check-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); cursor: pointer; white-space: nowrap; }
  .check-label input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--pink); }
  .btn-delete { background: none; border: none; color: var(--text4); font-size: 16px; cursor: pointer; padding: 2px 4px; }
  .btn-delete:hover { color: #993C1D; }

  /* 분류 폼 (선생님 전용) */
  .classify-form { background: var(--bg3); border-radius: 14px; padding: 12px; margin-top: 10px; border: 1.5px dashed var(--border2); }
  .solution-upload-zone { width: 100%; border: 2px dashed var(--border2); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; background: var(--bg2); }
  .solution-upload-zone:hover { border-color: var(--pink); }
  .solution-upload-placeholder { font-size: 12px; color: var(--text4); }
  .solution-preview-thumb { max-width: 100%; max-height: 120px; border-radius: 8px; object-fit: contain; }
  .classify-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .classify-row select, .classify-row input { flex: 1; padding: 7px 9px; font-size: 12px; border-radius: 7px; border: 1.5px solid var(--border2); outline: none; background: var(--bg2); color: var(--text1); }
  .classify-row select:disabled { background: var(--bg3); color: var(--text4); }
  .btn-save-classify { width: 100%; padding: 8px; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: white; font-size: 12px; font-weight: 700; cursor: pointer; }

  /* 일괄삭제 */
  .bulk-bar { display:none; position:sticky; top:8px; z-index:50; background:#1a1a1a; color:white; border-radius:12px; padding:10px 14px; margin-bottom:12px; align-items:center; justify-content:space-between; gap:8px; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
  .bulk-bar.show { display:flex; }
  .bulk-bar-left { font-size:13px; font-weight:600; }
  .bulk-bar-right { display:flex; gap:6px; }
  .btn-bulk-cancel { padding:7px 14px; border-radius:8px; border:1px solid #555; background:transparent; color:#ccc; font-size:12px; font-weight:600; cursor:pointer; }
  .btn-bulk-delete { padding:7px 14px; border-radius:8px; border:none; background:#993C1D; color:white; font-size:12px; font-weight:600; cursor:pointer; }
  .note-card-checkbox { width:18px; height:18px; accent-color:#993C1D; cursor:pointer; flex-shrink:0; }

  /* 페이지네이션 */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 14px; flex-wrap: wrap; }
  .page-btn { min-width: 34px; height: 34px; padding: 0 8px; border-radius: 8px; border: 1.5px solid var(--border2); background: var(--bg2); font-size: 13px; font-weight: 600; color: var(--text3); cursor: pointer; }
  .page-btn:hover { background: var(--bg3); }
  .page-btn.active { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: white; border-color: transparent; }
  .page-btn.disabled { color: var(--text4); cursor: default; pointer-events: none; }
  .page-info { font-size: 12px; color: #aaa; text-align: center; margin-top: 6px; }

  /* 메인 탭 */
  .main-tab-bar { display: flex; gap: 0; margin-bottom: 1rem; background: var(--bg2); padding: 5px; border-radius: 18px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .main-tab-btn { flex: 1; padding: 11px 4px; border: none; background: transparent; border-radius: 14px; font-size: 13px; font-weight: 700; color: var(--text4); cursor: pointer; text-align: center; line-height: 1.6; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .main-tab-btn .nav-icon { font-size: 22px; display: block; }
  .main-tab-btn.active { background: linear-gradient(135deg, #E8639A, #C94080); color: white; box-shadow: 0 3px 12px rgba(232,99,154,0.35); }
  .main-tab-panel { display: none; }
  .main-tab-panel.active { display: block; animation: fadeSlideIn 0.25s ease both; }

  @keyframes fadeSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .file-input-hidden { display: none; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text4); font-size: 14px; }
  .no-student { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .loading-msg { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }

  /* 폴더 그룹 */
  .subject-group { margin-bottom: 10px; border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
  .subject-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg3); cursor: pointer; user-select: none; }
  .subject-header:hover { background: var(--bg4); }
  .subject-arrow { font-size: 11px; color: var(--text4); transition: transform 0.2s; flex-shrink: 0; }
  .subject-arrow.open { transform: rotate(90deg); }
  .subject-folder-icon { font-size: 16px; flex-shrink: 0; }
  .subject-name { font-size: 14px; font-weight: 700; color: var(--text1); flex: 1; }
  .subject-count { font-size: 12px; color: var(--text3); background: var(--bg2); padding: 2px 9px; border-radius: 10px; border: 1px solid var(--border); }
  .subject-count.has-pending { color: #BA7517; border-color: #FAC775; background: #FFF8E7; }
  .subject-body { display: none; }

  function onUnitSearchT() {

    if (clearBtn) clearBtn.style.display = val ? 'block' : 'none';

    const input = document.getElementById('unit-search-t');

  function toggleBulkMode() {
    bulkMode = !bulkMode;
    selectedIds.clear();
    const bar = document.getElementById('bulk-bar');
    if (bar) bar.classList.toggle('show', bulkMode);
    updateBulkLabel();
    renderNoteList();
  }

  function updateBulkLabel() {
    const el = document.getElementById('bulk-count-label');
    if (el) el.textContent = `${selectedIds.size}개 선택됨`;
  }

  function toggleSelectCard(id) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    updateBulkLabel();
    const cb = document.getElementById(`cb-${id}`);
    if (cb) cb.checked = selectedIds.has(id);
  }

  async function bulkDelete() {
    if (selectedIds.size === 0) { alert('선택된 오답이 없어요.'); return; }
    if (!confirm(`선택한 ${selectedIds.size}개를 삭제할까요? 되돌릴 수 없어요.`)) return;

    try {
      const ids = [...selectedIds];
      await Promise.all(ids.map(id =>
        fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?id=eq.${id}`, {
          method: 'DELETE', headers: sbHeaders()
        })
      ));
      selectedIds.clear();
      bulkMode = false;
      const bar = document.getElementById('bulk-bar');
      if (bar) bar.classList.remove('show');
      await refreshCurrentEntries();
    } catch (err) {
      console.error(err);
      alert('삭제에 실패했어요.');
    }
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatDate(dStr) {
    if (!dStr) return '';
    const [y,m,d] = dStr.split('-');
    return `${y}.${m}.${d}`;
  }
  function daysBetween(dateStr1, dateStr2) {
    const d1 = new Date(dateStr1 + 'T00:00:00');
    const d2 = new Date(dateStr2 + 'T00:00:00');
    return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  }

  function getCurrentStudent() {
    return students.find(s => s.id === currentId) || null;
  }

  // ===== PDF 출력 =====
  async function exportAnswerPDF() {
    const stu = getCurrentStudent();
    if (!stu) return;

    // 전체 오답 불러오기
    const res = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?student_id=eq.${stu.id}&select=*&order=created_at.asc`, { headers: sbHeaders() });
    const entries = await res.json();
    if (!entries.length) { alert('오답이 없어요!'); return; }

    const win = window.open('', '_blank');
    const today = new Date().toLocaleDateString('ko-KR');

    let rows = '';
    entries.forEach((e, i) => {
      const unit = [e.subject, e.major_unit, e.minor_unit].filter(Boolean).join(' > ') || '미분류';
      const status = e.review_status === 'approved' ? '✅ 완료' : e.review_status === 'rejected' ? '🔄 다시풀기' : '⏳ 검수대기';
      rows += `
        <tr style="page-break-inside:avoid;">
          <td style="padding:8px;border:1px solid #ddd;text-align:center;font-weight:700;">${i+1}</td>
          <td style="padding:8px;border:1px solid #ddd;text-align:center;">${e.entry_date || ''}</td>
          <td style="padding:8px;border:1px solid #ddd;"><img src="${e.image_url}" style="width:180px;height:130px;object-fit:contain;display:block;" /></td>
          <td style="padding:8px;border:1px solid #ddd;">${e.image_mine_url ? `<img src="${e.image_mine_url}" style="width:180px;height:130px;object-fit:contain;display:block;" />` : '-'}</td>
          <td style="padding:8px;border:1px solid #ddd;">${e.image_solution_url ? `<img src="${e.image_solution_url}" style="width:180px;height:130px;object-fit:contain;display:block;" />` : '-'}</td>
          <td style="padding:8px;border:1px solid #ddd;font-size:12px;">${unit}</td>
          <td style="padding:8px;border:1px solid #ddd;text-align:center;font-size:12px;">${e.retry_count || 0}회</td>
          <td style="padding:8px;border:1px solid #ddd;text-align:center;font-size:12px;">${status}</td>
        </tr>`;
    });

    win.document.write(`
      <!DOCTYPE html><html><head><meta charset="UTF-8">
      <title>${stu.name} 오답 모음</title>
      <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        h1 { font-size: 20px; margin-bottom: 4px; }
        .sub { font-size: 13px; color: #888; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #0F6E56; color: white; padding: 10px 8px; border: 1px solid #ddd; }
        @media print { button { display: none; } }
      </style></head><body>
      <h1>📄 ${stu.name} 오답 모음집</h1>
      <p class="sub">${[stu.school, stu.grade].filter(Boolean).join(' · ')} | 출력일: ${today} | 총 ${entries.length}개</p>
      <button onclick="window.print()" style="margin-bottom:16px;padding:10px 24px;background:#0F6E56;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;">🖨️ 인쇄 / PDF 저장</button>

    const entries = await res.json();
    if (!entries.length) { alert('오답이 없어요!'); return; }

    const today = new Date().toLocaleDateString('ko-KR');
    const total = entries.length;
    const solved = entries.filter(e => e.solved).length;
    const unsolved = total - solved;
    const rate = Math.round((solved / total) * 100);

    // 약점 단원 TOP5
    const counts = {};
    entries.filter(e => e.subject).forEach(e => {
      const key = [e.subject, e.major_unit].filter(Boolean).join(' > ');
      counts[key] = (counts[key] || 0) + 1;
    });
    const weakTop = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);

    // 월별 업로드
    const monthly = {};
    entries.forEach(e => {
      if (!e.entry_date) return;
      const m = e.entry_date.slice(0,7);
      monthly[m] = (monthly[m] || 0) + 1;
    });
    const monthlyRows = Object.entries(monthly).sort().map(([m, c]) =>
      `<tr><td style="padding:6px 10px;border:1px solid #eee;">${m}</td><td style="padding:6px 10px;border:1px solid #eee;text-align:center;">${c}개</td></tr>`
    ).join('');

    // 틀린 횟수 많은 TOP5
    const hardTop = [...entries].sort((a,b) => (b.retry_count||0)-(a.retry_count||0)).slice(0,5);

    const weakRows = weakTop.map(([unit, cnt], i) => {
      const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
      return `<tr><td style="padding:6px 10px;border:1px solid #eee;">${medals[i]} ${unit}</td><td style="padding:6px 10px;border:1px solid #eee;text-align:center;color:#993C1D;font-weight:700;">${cnt}개</td></tr>`;
    }).join('');

    const hardRows = hardTop.map((e, i) => {
      const unit = [e.subject, e.major_unit].filter(Boolean).join(' > ') || '미분류';
      return `<tr><td style="padding:6px 10px;border:1px solid #eee;">${i+1}. ${unit}</td><td style="padding:6px 10px;border:1px solid #eee;text-align:center;">${e.entry_date||''}</td><td style="padding:6px 10px;border:1px solid #eee;text-align:center;color:#993C1D;font-weight:700;">${e.retry_count||0}회</td></tr>`;
    }).join('');

    const win = window.open('', '_blank');
    win.document.write(`
      <!DOCTYPE html><html><head><meta charset="UTF-8">
      <title>${stu.name} 성적 리포트</title>
      <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; max-width: 800px; margin: 0 auto; color: #1a1a1a; }

        .stats { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-box { flex: 1; background: #f8f8f5; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e8e8e0; }
        .stat-num { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
        .green { color: #0F6E56; }
        .orange { color: #BA7517; }
        .red { color: #993C1D; }
        h2 { font-size: 15px; font-weight: 700; margin: 20px 0 10px; padding-left: 10px; border-left: 4px solid #0F6E56; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
        th { background: #0F6E56; color: white; padding: 8px 10px; text-align: left; }
        .progress-bar { width: 100%; height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0F6E56, #14906F); border-radius: 10px; transition: width 1s ease; }
        @media print { button { display: none; } }
      </style></head><body>
      <h1>📊 ${stu.name} 성적 리포트</h1>
      <p class="sub">${[stu.school, stu.grade].filter(Boolean).join(' · ')} | 출력일: ${today}</p>
      <button onclick="window.print()" style="margin-bottom:20px;padding:10px 24px;background:#0F6E56;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;">🖨️ 인쇄 / PDF 저장</button>

      <div class="stats">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">전체 오답</div></div>
        <div class="stat-box"><div class="stat-num green">${solved}</div><div class="stat-label">완료</div></div>
        <div class="stat-box"><div class="stat-num orange">${unsolved}</div><div class="stat-label">미해결</div></div>
        <div class="stat-box"><div class="stat-num ${rate >= 70 ? 'green' : rate >= 40 ? 'orange' : 'red'}">${rate}%</div><div class="stat-label">완료율</div></div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width:${rate}%"></div></div>
      <p style="font-size:12px;color:#888;margin-bottom:20px;">완료율 ${rate}% — ${rate >= 70 ? '🎉 매우 잘하고 있어요!' : rate >= 40 ? '💪 조금만 더 힘내요!' : '📚 꾸준히 복습이 필요해요'}</p>

      <h2>🔥 많이 틀린 문제 TOP 5</h2>
      <table><thead><tr><th>단원</th><th>날짜</th><th>틀린 횟수</th></tr></thead><tbody>${hardRows}</tbody></table>

      <h2>📅 월별 오답 업로드</h2>

      </body></html>

    win.document.close();
  }

  // ===== 문의 게시판 =====
  let currentTeacherQnaId = null;
  const QNA_PAGE_SIZE_T = 5;
  let qnaPageT = 1;
  let qnaTotalCountT = 0;

  async function loadTeacherQnA(page = 1) {
    qnaPageT = page;
    const container = document.getElementById('teacher-qna-list');
    const pagEl = document.getElementById('teacher-qna-pagination');
    if (!container) return;
    container.innerHTML = '<div class="empty">불러오는 중...</div>';
    try {
      const offset = (page - 1) * QNA_PAGE_SIZE_T;
      const countRes = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=id`, { headers: sbHeaders({ 'Prefer': 'count=exact' }) });
      const cr = countRes.headers.get('content-range');
      qnaTotalCountT = cr ? parseInt(cr.split('/')[1]) : 0;

      const res = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=*&order=created_at.desc&limit=${QNA_PAGE_SIZE_T}&offset=${offset}`, { headers: sbHeaders() });
      const list = await res.json();

      let studentMap = {};
      if (Array.isArray(list) && list.length) {
        const ids = [...new Set(list.filter(q => q.student_id).map(q => q.student_id))];
        if (ids.length) {
          const sRes = await fetch(`${SUPABASE_URL}/rest/v1/students?id=in.(${ids.join(',')})&select=id,name`, { headers: sbHeaders() });
          const sData = await sRes.json();
          sData.forEach(s => studentMap[s.id] = s.name);
        }
      }

      if (!Array.isArray(list) || !list.length) {
        container.innerHTML = '<div class="empty" style="padding:2rem;">아직 질문이 없어요</div>';
        if (pagEl) pagEl.innerHTML = '';
        return;
      }

      container.innerHTML = list.map((q, i) => {
        const date = new Date(q.created_at).toLocaleDateString('ko-KR');
        const studentName = studentMap[q.student_id] || '알 수 없음';
        return `
          <div style="padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);${i===list.length-1?'border-bottom:none;':''}display:flex;align-items:center;justify-content:space-between;gap:8px;" onclick="openTeacherQnaDetail('${q.id}')">
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:600;color:var(--text1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${q.title}</div>
              <div style="font-size:11px;color:var(--text4);">${studentName} · ${date}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
              ${q.answer ? '<span style="font-size:10px;padding:2px 7px;border-radius:6px;background:var(--green-light);color:var(--green);font-weight:700;">답변완료</span>' : '<span style="font-size:10px;padding:2px 7px;border-radius:6px;background:#FFF3CC;color:#854F0B;font-weight:700;">대기중</span>'}
              <span style="font-size:18px;color:var(--text4);">›</span>
            </div>
          </div>`;
      }).join('');

      if (pagEl) {
        const totalPages = Math.ceil(qnaTotalCountT / QNA_PAGE_SIZE_T);
        if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
        let btns = `<button class="page-btn ${page===1?'disabled':''}" onclick="loadTeacherQnA(${page-1})">‹</button>`;
        for (let p = 1; p <= totalPages; p++) btns += `<button class="page-btn ${p===page?'active':''}" onclick="loadTeacherQnA(${p})">${p}</button>`;
        btns += `<button class="page-btn ${page===totalPages?'disabled':''}" onclick="loadTeacherQnA(${page+1})">›</button>`;
        pagEl.innerHTML = btns;
      }
    } catch(e) { container.innerHTML = '<div class="empty">불러오기 실패</div>'; }
  }

        </div>
      </div>`;

    loadTeacherComments(qId);

  function closeTeacherQnaDetail() {
    currentTeacherQnaId = null;
    document.getElementById('teacher-qna-board-view').style.display = 'block';
    document.getElementById('teacher-qna-detail-view').style.display = 'none';
    loadTeacherQnA(qnaPageT);

  async function loadTeacherComments(qId) {
    const container = document.getElementById('teacher-comments-list');
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments?question_id=eq.${qId}&order=created_at.asc`, { headers: sbHeaders() });
      const comments = await res.json();
      if (!comments.length) { container.innerHTML = '<div style="font-size:13px;color:var(--text4);text-align:center;padding:12px;">아직 댓글이 없어요</div>'; return; }

      const roots = comments.filter(c => !c.parent_id);
      const replies = comments.filter(c => c.parent_id);

      container.innerHTML = roots.map(c => {
        const date = new Date(c.created_at).toLocaleDateString('ko-KR');
        const myReplies = replies.filter(r => r.parent_id === c.id);
        return `
          <div>
            <div style="background:var(--bg3);border-radius:12px;padding:10px 12px;display:flex;gap:8px;align-items:flex-start;">
              <div style="flex:1;">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                  <span style="font-size:12px;font-weight:700;color:var(--text1);">${c.author_name}</span>
                  <span style="font-size:11px;color:var(--text4);">${date}</span>
                </div>
                <div style="font-size:13px;color:var(--text2);margin-bottom:6px;">${c.content}</div>
                <button onclick="showTeacherReplyInput('${c.id}')" style="background:none;border:none;font-size:11px;color:var(--pink);font-weight:600;cursor:pointer;">↩ 답글</button>
              </div>
              <button onclick="deleteComment('${c.id}')" style="background:none;border:none;color:#FF453A;font-size:14px;cursor:pointer;">🗑️</button>
            </div>
            ${myReplies.map(r => `
              <div style="margin-left:16px;margin-top:6px;background:var(--bg4);border-radius:10px;padding:9px 12px;display:flex;gap:8px;align-items:flex-start;">
                <div style="flex:1;">
                  <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
                    <span style="font-size:12px;font-weight:700;color:var(--text1);">↩ ${r.author_name}</span>
                    <span style="font-size:11px;color:var(--text4);">${new Date(r.created_at).toLocaleDateString('ko-KR')}</span>
                  </div>
                  <div style="font-size:13px;color:var(--text2);">${r.content}</div>
                </div>
                <button onclick="deleteComment('${r.id}')" style="background:none;border:none;color:#FF453A;font-size:14px;cursor:pointer;">🗑️</button>
              </div>`).join('')}
            <div id="teacher-reply-input-${c.id}" style="display:none;margin-left:16px;margin-top:6px;">
              <div style="display:flex;gap:6px;">
                <input type="text" id="teacher-reply-text-${c.id}" placeholder="답글 입력..." style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);font-size:12px;outline:none;background:var(--bg2);color:var(--text1);" />
                <button onclick="submitTeacherReply('${c.id}')" style="padding:8px 12px;border-radius:8px;border:none;background:var(--pink);color:white;font-size:12px;font-weight:600;cursor:pointer;">등록</button>
              </div>
            </div>
          </div>`;
      }).join('');
    } catch { container.innerHTML = '<div class="empty">불러오기 실패</div>'; }
  }

  function showTeacherReplyInput(commentId) {
    const el = document.getElementById(`teacher-reply-input-${commentId}`);
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  async function submitTeacherComment() {
    const input = document.getElementById('teacher-comment-input');
    const content = input.value.trim();
    if (!content || !currentTeacherQnaId) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
        method: 'POST',
        headers: sbHeaders({ 'Prefer': 'return=minimal', 'Content-Type': 'application/json' }),
        body: JSON.stringify({ question_id: currentTeacherQnaId, author_name: '선생님', content })
      });
      if (!res.ok) { const err = await res.text(); alert('댓글 등록 실패: ' + err); return; }
      input.value = '';
      loadTeacherComments(currentTeacherQnaId);
    } catch(e) { alert('댓글 등록 실패했어요 ㅠㅠ ' + e.message); }
  }

  async function submitTeacherReply(parentId) {
    const input = document.getElementById(`teacher-reply-text-${parentId}`);
    const content = input.value.trim();
    if (!content) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
        method: 'POST',
        headers: sbHeaders({ 'Prefer': 'return=minimal', 'Content-Type': 'application/json' }),
        body: JSON.stringify({ question_id: currentTeacherQnaId, author_name: '선생님', content, parent_id: parentId })
      });
      if (!res.ok) { const err = await res.text(); alert('답글 등록 실패: ' + err); return; }
      input.value = '';
      loadTeacherComments(currentTeacherQnaId);
    } catch(e) { alert('답글 등록 실패했어요 ㅠㅠ ' + e.message); }
  }

  async function deleteComment(commentId) {
    if (!confirm('댓글을 삭제할까요?')) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/comments?id=eq.${commentId}`, { method: 'DELETE', headers: sbHeaders() });
      loadTeacherComments(currentTeacherQnaId);
    } catch { alert('삭제 실패했어요 ㅠㅠ'); }
  }

  async function submitAnswer(qId) {
    const input = document.getElementById(`answer-input-${qId}`) || document.getElementById(`teacher-answer-input-${qId}`);
    const answer = input?.value.trim();
    if (!answer) { alert('답변을 입력해주세요!'); return; }
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/questions?id=eq.${qId}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Prefer': 'return=minimal', 'Content-Type': 'application/json' }),
        body: JSON.stringify({ answer })
      });
      if (res.ok) { alert('답변이 등록됐어요! 😊'); openTeacherQnaDetail(qId); }
      else { const err = await res.text(); alert('등록 실패: ' + err); }
    } catch(e) { alert('등록 실패했어요 ㅠㅠ ' + e.message); }
  }

  async function deleteQuestion(qId) {
    if (!confirm('이 질문을 삭제할까요?')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/questions?id=eq.${qId}`, { method: 'DELETE', headers: sbHeaders() });
      if (res.ok) closeTeacherQnaDetail();
      else alert('삭제 실패했어요 ㅠㅠ');
    } catch { alert('삭제 실패했어요 ㅠㅠ'); }
  }

      });

  async function addStudent() {
    const name = document.getElementById('new-name').value.trim();
    const school = document.getElementById('new-school').value.trim();
    const grade = document.getElementById('new-grade').value.trim();
    const password = document.getElementById('new-password').value.trim();
    if (!name) { alert('이름을 입력해주세요'); return; }

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({ name, school, grade, password })
      });
      const created = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(created));

      document.getElementById('new-name').value = '';
      document.getElementById('new-school').value = '';
      document.getElementById('new-grade').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('add-form').classList.remove('show');

      await loadStudentsFromDB();
      if (created && created[0]) currentId = created[0].id;
      renderSelect();
      await renderBoard();
    } catch (err) {
      console.error(err);
      alert('학생 추가에 실패했어요. 콘솔을 확인해주세요.');
    }
  }

  async function deleteCurrentStudent() {

    };

  function compressImage(file, maxSize = 3000, quality = 0.98) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
          else if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('이미지 압축 실패'));
          }, 'image/jpeg', quality);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadSolutionImage(file, entryId) {
    const compressedBlob = await compressImage(file);
    const fileName = `solution_${entryId}_${Date.now()}.jpg`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${fileName}`, {
      method: 'POST',
      headers: sbHeaders({ 'Content-Type': 'image/jpeg' }),
      body: compressedBlob
    });
    if (!uploadRes.ok) {
      const errText = await uploadRes.text();
      throw new Error('모범풀이 업로드 실패: ' + errText);
    }
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${fileName}`;
  }

  async function saveClassify(entryId) {
    const subject = document.getElementById(`classify-subject-${entryId}`).value;
    const major = document.getElementById(`classify-major-${entryId}`).value;
    const minor = document.getElementById(`classify-minor-${entryId}`).value;
    const teacherMemo = document.getElementById(`classify-memo-${entryId}`).value.trim();

    const saveBtn = document.querySelector(`button[onclick="saveClassify('${entryId}')"]`);
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }

    try {
      const updateBody = {
        subject: subject || null,
        major_unit: major || null,
        minor_unit: minor || null,
        teacher_memo: teacherMemo || null
      };

      // 모범풀이 사진이 새로 선택되어 있으면 업로드 후 URL도 같이 저장
      if (pendingSolutionFiles[entryId]) {
        const solutionUrl = await uploadSolutionImage(pendingSolutionFiles[entryId], entryId);
        updateBody.image_solution_url = solutionUrl;
        delete pendingSolutionFiles[entryId];
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?id=eq.${entryId}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify(updateBody)
      });
      if (!res.ok) throw new Error(await res.text());

      classifyOpenIds.delete(entryId);
      await refreshCurrentEntries();
    } catch (err) {
      console.error(err);
      alert('분류 저장에 실패했어요. (모범풀이 사진 업로드 중일 수 있어요, 잠시 후 다시 시도해주세요)');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장하기'; }
    }
  }

  async function generateVariation(entry) {
    if (!entry.image_url) return;
    try {
      // 이미 변형문제 있으면 스킵
      const existing = await fetch(`${SUPABASE_URL}/rest/v1/variations?note_id=eq.${entry.id}&select=id`, { headers: sbHeaders() }).then(r => r.json());
      if (existing.length > 0) return;

      const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-variation`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
        body: JSON.stringify({ image_url: entry.image_url, note_id: entry.id })
      });
      if (res.status === 429) {
        alert('⚠️ 오늘 AI 변형문제 생성 한도(20회)를 모두 썼어요.\n이 오답의 변형문제는 내일 미션탭에서 🔄 재생성으로 만들 수 있어요.');
        return;
      }
      if (!res.ok) { console.error('변형문제 생성 실패:', await res.text()); return; }
      const v = await res.json();
      if (v.error) { console.error('변형문제 생성 오류:', v.error); return; }

      await fetch(`${SUPABASE_URL}/rest/v1/variations`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }),
        body: JSON.stringify({
          note_id: entry.id,
          problem_text: v.problem,
          answer: v.answer,
          time_limit_sec: v.time_limit_sec || 300,
          approved: false
        })
      });
      console.log('변형문제 생성 완료 (검수 대기)');
    } catch(e) { console.error('generateVariation:', e); }
  }

  async function rejectEntry(entryId) {
    const e = currentEntries.find(x => x.id === entryId);
    if (!e) return;
    if (!confirm('다시 풀게 할까요? (틀린 횟수가 1 올라가요)')) return;

    const newRetry = (e.retry_count || 0) + 1;

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?id=eq.${entryId}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({
          solved: false,
          review_status: 'rejected',
          retry_count: newRetry,
          last_reviewed_date: todayStr()
        })
      });
      if (!res.ok) throw new Error(await res.text());
      await refreshCurrentEntries();
    } catch (err) {
      console.error(err);
      alert('처리에 실패했어요.');
    }
  }

  async function loadCurrentPage() {
    if (!currentId) return;

    let filterQ = `student_id=eq.${currentId}`;
    if (currentFilter === 'pending')    filterQ += `&solved=eq.false`;
    if (currentFilter === 'solved')     filterQ += `&solved=eq.true`;
    if (currentFilter === 'struggling') filterQ += `&retry_count=gte.${STRUGGLE_THRESHOLD}`;
    if (currentFilter === 'unsorted')   filterQ += `&subject=is.null`;
    if (currentFilter === 'reviewing')  filterQ += `&review_status=in.(pending,rejected)`;
    if (unitSearchKeywordT) filterQ += `&or=(subject.ilike.*${unitSearchKeywordT}*,major_unit.ilike.*${unitSearchKeywordT}*,minor_unit.ilike.*${unitSearchKeywordT}*)`;

    if (currentFilter === 'byUnit') {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/wrong_notes?${filterQ}&select=*&order=subject.asc,major_unit.asc,created_at.desc`,
        { headers: sbHeaders() }
      );
      currentEntries = await res.json();
      totalCountT = currentEntries.length;
      renderNoteList();
      return;
    }

    const offset = (currentPageT - 1) * PAGE_SIZE_T;
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/wrong_notes?${filterQ}&select=*&order=created_at.desc&limit=${PAGE_SIZE_T}&offset=${offset}`,
        { headers: sbHeaders({ 'Prefer': 'count=exact' }) }
      );
      const cr = res.headers.get('content-range');
      totalCountT = cr ? parseInt(cr.split('/')[1]) : 0;
      currentEntries = await res.json();
      renderNoteList();
    } catch { totalCountT = 0; currentEntries = []; renderNoteList(); }
  }

  // 이미지 모달 + 핀치 줌
  let _tScale = 1, _tLastScale = 1;
  let _tTx = 0, _tTy = 0;
  let _tPinching = false, _tInitDist = 0;
  let _tLastTx = 0, _tLastTy = 0, _tInitMx = 0, _tInitMy = 0, _tImgCx = 0, _tImgCy = 0;
  let _tDragging = false, _tDragStartX = 0, _tDragStartY = 0;
  let _tLastTap = 0;

  function openModal(src) {
    const img = document.getElementById('modal-img');
    const overlay = document.getElementById('modal-overlay');
    img.src = src;
    _tScale = 1; _tTx = 0; _tTy = 0;
    img.style.transition = 'none';
    img.style.transform = '';
    overlay.classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
  }

  // 사진 저장: Web Share API → blob 다운로드 → 새 탭 순으로 시도
  async function shareModalImage() {
    const img = document.getElementById('modal-img');
    if (!img.src) return;
    const btn = event.target;
    const origText = btn.textContent;
    btn.textContent = '⏳ 준비 중...';
    btn.disabled = true;

    try {
      const res = await fetch(img.src);
      const blob = await res.blob();

      // 1순위: 파일 다운로드 (다운로드 폴더에 저장 → 갤러리에서도 보임)
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `오답사진_${Date.now()}.jpg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
      btn.textContent = '✅ 저장됨!';
      setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 1500);
      return;
    } catch (e) {
      // 실패 시 새 탭에서 열기
      window.open(img.src, '_blank');
    }
    btn.textContent = origText;
    btn.disabled = false;
  }

  function _tApply(img, animated) {
    img.style.transition = animated ? 'transform 0.2s ease' : 'none';
    img.style.transform = `translate(${_tTx}px, ${_tTy}px) scale(${_tScale})`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    const img = document.getElementById('modal-img');
    const overlay = document.getElementById('modal-overlay');
    if (!img || !overlay) return;

    img.addEventListener('touchstart', e => {
      e.preventDefault();
      if (e.touches.length === 2) {
        _tPinching = true; _tDragging = false;
        _tInitDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
        _tLastScale = _tScale;
        _tLastTx = _tTx; _tLastTy = _tTy;
        _tInitMx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        _tInitMy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const rect = img.getBoundingClientRect();
        _tImgCx = rect.left + rect.width / 2 - _tTx;
        _tImgCy = rect.top + rect.height / 2 - _tTy;
      } else if (e.touches.length === 1) {
        _tDragging = true;
        _tDragStartX = e.touches[0].clientX - _tTx;
        _tDragStartY = e.touches[0].clientY - _tTy;
        const now = Date.now();
        if (now - _tLastTap < 280) {
          if (_tScale > 1) { _tScale = 1; _tTx = 0; _tTy = 0; }
          else { _tScale = 2.5; }
          _tApply(img, true);
        }
        _tLastTap = now;
      }
    }, { passive: false });

    img.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2 && _tPinching) {
        const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
        const newScale = Math.min(6, Math.max(1, _tLastScale * (dist / _tInitDist)));
        const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const localX = (_tInitMx - _tImgCx - _tLastTx) / _tLastScale;
        const localY = (_tInitMy - _tImgCy - _tLastTy) / _tLastScale;
        _tScale = newScale;
        _tTx = mx - _tImgCx - localX * newScale;
        _tTy = my - _tImgCy - localY * newScale;
        if (_tScale <= 1) { _tScale = 1; _tTx = 0; _tTy = 0; }
        _tApply(img, false);
      } else if (e.touches.length === 1 && _tDragging && _tScale > 1) {
        _tTx = e.touches[0].clientX - _tDragStartX;
        _tTy = e.touches[0].clientY - _tDragStartY;
        _tApply(img, false);
      }
    }, { passive: false });

    img.addEventListener('touchend', e => {
      if (e.touches.length < 2) _tPinching = false;
      if (e.touches.length === 0) {
        _tDragging = false;
        if (_tScale < 1.1) { _tScale = 1; _tTx = 0; _tTy = 0; _tApply(img, true); }
      }
    });

    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  });

  function grantScoreboardPoint(stu) {
    try {
      const raw = localStorage.getItem('quest_students');
      if (!raw) return;
      let qStudents = JSON.parse(raw);
      const match = qStudents.find(q => q.name === stu.name);
      if (!match) return;

      const prevEarned = match.earnedTotal || 0;
      match.score = (match.score || 0) + SCOREBOARD_POINT_PER_SOLVE;
      match.earnedTotal = prevEarned + SCOREBOARD_POINT_PER_SOLVE;

      const prevTickets = Math.floor(prevEarned / 20);
      const newTickets = Math.floor(match.earnedTotal / 20);
      const gained = newTickets - prevTickets;
      if (gained > 0) {
        match.tickets = (match.tickets || 0) + gained;
      }

      match.logs = match.logs || [];
      match.logIdCounter = (match.logIdCounter || 0) + 1;
      match.logs.push({
        id: match.logIdCounter,
        label: '오답노트 다시풀기 완료',
        delta: SCOREBOARD_POINT_PER_SOLVE,
        date: todayStr(),
        time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }),
        type: 'add'
      });

      localStorage.setItem('quest_students', JSON.stringify(qStudents));
      if (gained > 0) {
        setTimeout(() => alert(`🎟️ ${stu.name} 학생이 점수판에서 뽑기권 ${gained}장을 획득했어요!`), 100);
      }
    } catch (err) {
      console.log('점수판 연동 스킵:', err);
    }
  }

                 <button class="btn-no" onclick="rejectEntry('${e.id}')">❌ NO</button>`}
          </div>
          <button class="btn-delete" onclick="deleteEntry('${e.id}')" title="삭제">✕</button>
        </div>
        ${classifyFormHtml}
      </div>`;
  }

  // ===== 약점 TOP3 =====
  function renderWeakness() {
    const container = document.getElementById('weakness-list');
    const withRetry = allEntryStats.filter(e => (e.retry_count || 0) > 0 && e.minor_unit);

    if (withRetry.length === 0) {
      container.innerHTML = '<p class="weakness-empty">아직 틀린 횟수 데이터가 없어요 🎉</p>';
      return;
    }

    const counts = {};
    withRetry.forEach(e => {
      const key = [e.subject, e.major_unit, e.minor_unit].filter(Boolean).join(' > ');
      counts[key] = (counts[key] || 0) + (e.retry_count || 0);
    });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const medals = ['🥇', '🥈', '🥉'];

    container.innerHTML = sorted.map((item, i) =>
      `<div class="weakness-item">
        <span><span class="weakness-rank">${medals[i]}</span>${item[0]}</span>
        <span class="weakness-count">총 ${item[1]}회 틀림</span>
      </div>`
    ).join('');
  }

  // ===== 망각곡선 복습 알림 =====
  function renderReviewAlert() {
    const alertBox = document.getElementById('review-alert');
    const listEl = document.getElementById('review-alert-list');
    const today = todayStr();
    const targets = [1, 3, 7];

    const due = [];
    currentEntries.forEach(e => {
      if (e.solved) return;
      const elapsed = daysBetween(e.entry_date, today);
      if (targets.includes(elapsed)) due.push({ entry: e, elapsed });
    });

    if (due.length === 0) {
      alertBox.classList.remove('show');
      listEl.innerHTML = '';
      return;
    }

    alertBox.classList.add('show');
    listEl.innerHTML = due.slice(0, 6).map(d => {
      const tagClass = d.elapsed === 1 ? 'd1' : (d.elapsed === 3 ? 'd3' : 'd7');
      const label = d.elapsed === 1 ? '1일 전' : (d.elapsed === 3 ? '3일 전' : '7일 전');
      const unitLabel = [d.entry.subject, d.entry.major_unit].filter(Boolean).join(' · ') || '미분류';
      return `<div class="review-alert-item">
        <span>${unitLabel}${d.entry.memo ? ' — ' + d.entry.memo : ''}</span>
        <span class="review-tag ${tagClass}">${label}</span>
      </div>`;
    }).join('');
  }

  // ===== 히트맵 =====
  function renderHeatmap() {
    const grid = document.getElementById('heatmap-grid');
    const counts = {};
    currentEntries.forEach(e => {
      if (!e.entry_date) return;
      counts[e.entry_date] = (counts[e.entry_date] || 0) + 1;
    });

    const today = new Date();
    today.setHours(0,0,0,0);
    const days = [];
    for (let i = 48; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      days.push(ds);
    }

    function levelOf(c) {
      if (!c) return '';
      if (c === 1) return 'l1';
      if (c === 2) return 'l2';
      if (c <= 4) return 'l3';
      return 'l4';
    }

    grid.innerHTML = days.map(ds => {
      const c = counts[ds] || 0;
      const lvl = levelOf(c);
      const [y,m,d] = ds.split('-');
      return `<div class="heatmap-cell ${lvl}" title="${y}.${m}.${d} — 오답 ${c}개"></div>`;
    }).join('');
  }

  // ===== 랜덤 복습 모드 =====
  function startRandomReview() {
    const pending = currentEntries.filter(e => !e.solved);
    if (pending.length === 0) {
      alert('미해결 오답이 없어요! 모두 복습 완료했네요 🎉');
      return;
    }
    const shuffled = [...pending].sort(() => Math.random() - 0.5);
    reviewQueue = shuffled.slice(0, Math.min(3, shuffled.length));
    reviewIndex = 0;
    document.getElementById('review-modal-overlay').classList.add('show');
    renderReviewModal();
  }
  function closeRandomReview() {
    document.getElementById('review-modal-overlay').classList.remove('show');
  }
  function renderReviewModal() {
    const body = document.getElementById('review-modal-body');
    if (reviewIndex >= reviewQueue.length) {
      body.innerHTML = `<div class="review-modal-empty">🎉 오늘의 복습 끝!<br>수고했어요.</div>`;
      return;
    }
    const e = reviewQueue[reviewIndex];
    const unitLabel = [e.subject, e.major_unit, e.minor_unit].filter(Boolean).join(' · ') || '미분류';
    body.innerHTML = `
      <div style="font-size:12px;color:#888;margin-bottom:8px;">${reviewIndex + 1} / ${reviewQueue.length}</div>
      <img class="review-modal-img" src="${e.image_url}" alt="문제" />
      <p class="review-modal-meta">${unitLabel}${e.memo ? ' — ' + e.memo : ''}</p>
      <div class="review-modal-actions">
        <button class="review-modal-btn solved" onclick="markReviewSolved('${e.id}')">✅ 다시 풀었어요</button>
        <button class="review-modal-btn skip" onclick="skipReview()">다음으로</button>
      </div>
    `;
  }
  async function markReviewSolved(entryId) {
    await approveEntry(entryId);

  function renderStudentDetails() {
    const total = allEntryStats.length;
    const solved = allEntryStats.filter(e => e.solved).length;
    const unsorted = allEntryStats.filter(e => !e.subject).length;
    const reviewing = allEntryStats.filter(e => {
      const rs = e.review_status || (e.solved ? 'approved' : 'pending');
      return rs === 'pending' || rs === 'rejected';
    }).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-solved').textContent = solved;
    document.getElementById('stat-pending').textContent = reviewing;

    // 진행률 바
    const pct = total > 0 ? Math.round((solved / total) * 100) : 0;
    const pctEl = document.getElementById('progress-pct-t');
    const fillEl = document.getElementById('progress-fill-t');
    if (pctEl) pctEl.textContent = pct + '%';
    if (fillEl) fillEl.style.width = pct + '%';

    const unsortedAlert = document.getElementById('unsorted-alert');
    if (unsorted > 0) {
      unsortedAlert.classList.add('show');
      document.getElementById('unsorted-title').textContent = `⚠️ 분류 대기 중인 오답이 ${unsorted}개 있어요`;
    } else {
      unsortedAlert.classList.remove('show');
    }

    const reviewingAlert = document.getElementById('reviewing-alert');
    if (reviewing > 0) {
      reviewingAlert.classList.add('show');
      document.getElementById('reviewing-title').textContent = `⏳ 검수 대기 중인 오답이 ${reviewing}개 있어요`;
    } else {
      reviewingAlert.classList.remove('show');

    renderWeakness();
    renderReviewAlert();
    renderHeatmap();

    renderNoteList();
