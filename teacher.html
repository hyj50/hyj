<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오답 너 뒤졌다 (선생)</title>
<link rel="manifest" href="/manifest-teacher.json">
<meta name="theme-color" content="#0F6E56">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오답뒤졌다(선생)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 2rem; }
  .wrap { max-width: 720px; margin: 0 auto; }

  @media (max-width: 600px) {
    body { padding: 0.8rem; }
    .board { padding: 1.1rem !important; }
    .stats-row { grid-template-columns: 1fr 1fr 1fr; gap: 6px !important; }
    .student-select-row { flex-wrap: wrap; }
    .student-select-row select { width: 100%; }
    .note-top-row { flex-direction: column; }
    .note-thumbs { width: 100%; }
    .note-thumb { width: 80px; height: 80px; }
  }

  /* 로그인 화면 */
  .login-wrap { max-width: 360px; margin: 8rem auto; }
  .login-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
  .login-card h1 { font-size: 18px; margin-bottom: 1.2rem; color: #1a1a1a; }
  .login-card input { width: 100%; padding: 12px 14px; font-size: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; margin-bottom: 10px; text-align: center; }
  .login-card input:focus { border-color: #0F6E56; }
  .login-card button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #0F6E56; color: white; font-size: 14px; font-weight: 700; cursor: pointer; }
  .login-card button:hover { background: #0c5945; }
  .login-error { color: #993C1D; font-size: 12px; margin-top: 8px; display: none; }
  .login-error.show { display: block; }

  /* 학생 선택 바 */
  .student-bar { background: white; border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .student-select-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .student-select-row select { flex: 1; padding: 10px 12px; font-size: 15px; border-radius: 10px; border: 1px solid #ddd; background: white; color: #1a1a1a; }
  .btn-small { padding: 10px 14px; border-radius: 10px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; }
  .btn-small:hover { background: #f5f5f0; }
  .btn-add-student { border-color: #0F6E56; color: #0F6E56; }
  .btn-add-student:hover { background: #E1F5EE; }
  .btn-del-student { border-color: #993C1D; color: #993C1D; }
  .btn-del-student:hover { background: #FAECE7; }
  .btn-logout { border-color: #999; color: #777; }

  .add-form { display: none; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .add-form.show { display: flex; }
  .add-form input { flex: 1; min-width: 90px; padding: 9px 12px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
  .add-form input:focus { border-color: #0F6E56; }
  .add-form button { padding: 9px 16px; border-radius: 8px; border: 1px solid #0F6E56; background: #0F6E56; color: white; font-size: 13px; cursor: pointer; font-weight: 600; }

  .student-link-box { background: #F0F7F4; border: 1px solid #CCE7DD; border-radius: 10px; padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: #0F6E56; }
  .student-link-box code { background: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

  /* 월별 순위표 */
  .leaderboard { background: white; border-radius: 16px; padding: 1.4rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .lb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .lb-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .lb-month-nav { display: flex; align-items: center; gap: 8px; }
  .lb-month-nav button { background: none; border: 1px solid #ddd; border-radius: 8px; width: 30px; height: 30px; font-size: 14px; cursor: pointer; color: #666; }
  .lb-month-nav button:hover { background: #f5f5f0; }
  .lb-month-label { font-size: 14px; font-weight: 600; color: #333; min-width: 100px; text-align: center; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th { font-size: 11px; color: #888; text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; font-weight: 500; }
  .lb-table td { font-size: 13px; padding: 8px; border-bottom: 1px solid #f5f5f0; }
  .lb-rank { font-weight: 700; width: 36px; }
  .lb-name { font-weight: 600; color: #1a1a1a; }
  .lb-score { font-weight: 700; color: #0F6E56; text-align: right; }
  .lb-detail { font-size: 11px; color: #999; text-align: right; }
  .lb-medal { font-size: 16px; }
  .lb-empty { text-align: center; padding: 1.5rem; color: #aaa; font-size: 13px; }

  .bonus-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
  .bonus-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .bonus-row select, .bonus-row input { padding: 8px 10px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
  .bonus-row select { flex: 1; min-width: 80px; }
  .bonus-row input[type="number"] { width: 70px; }
  .bonus-row input[type="text"] { flex: 2; min-width: 100px; }
  .btn-bonus { padding: 8px 14px; border-radius: 8px; border: none; background: #854F0B; color: white; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-bonus:hover { background: #6B3E0B; }

  .board { background: white; border-radius: 16px; padding: 1.8rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .profile-head { text-align: center; margin-bottom: 1.5rem; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .profile-sub { font-size: 13px; color: #888; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .stat-card { background: #f8f8f5; border-radius: 12px; padding: 1rem; text-align: center; border: 1px solid #e8e8e0; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .stat-value { font-size: 26px; font-weight: 600; color: #1a1a1a; }
  .stat-value.green { color: #0F6E56; }
  .stat-value.orange { color: #BA7517; }

  /* 미분류 알림 */
  .unsorted-alert { background: linear-gradient(135deg, #FFF3F0, #FFE8E0); border: 1px solid #FFD4C2; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; display: none; }
  .unsorted-alert.show { display: block; }
  .unsorted-title { font-size: 13px; font-weight: 700; color: #B5421F; margin-bottom: 4px; }
  .unsorted-sub { font-size: 12px; color: #8a3115; }

  /* 약점 TOP3 */
  .weakness-card { background: linear-gradient(135deg, #FFF3F0, #FFE8E0); border: 1px solid #FFD4C2; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; }
  .weakness-title { font-size: 13px; font-weight: 700; color: #B5421F; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .weakness-list { display: flex; flex-direction: column; gap: 6px; }
  .weakness-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #6B2E16; background: white; padding: 7px 12px; border-radius: 8px; }
  .weakness-rank { font-weight: 700; margin-right: 6px; }
  .weakness-count { font-size: 12px; font-weight: 600; color: #B5421F; }
  .weakness-empty { font-size: 12px; color: #999; padding: 4px 0; }

  .review-alert { background: linear-gradient(135deg, #FFF8E7, #FFEFC9); border: 1px solid #FAC775; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; display: none; }
  .review-alert.show { display: block; }
  .review-alert-title { font-size: 13px; font-weight: 700; color: #854F0B; margin-bottom: 8px; }
  .review-alert-list { display: flex; flex-direction: column; gap: 6px; }
  .review-alert-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12.5px; color: #6B3E0B; background: white; padding: 7px 12px; border-radius: 8px; }
  .review-tag { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 6px; white-space: nowrap; }
  .review-tag.d1 { background: #FFE0DC; color: #B5421F; }
  .review-tag.d3 { background: #FFF0CC; color: #854F0B; }
  .review-tag.d7 { background: #DCEEE8; color: #0F6E56; }

  .random-review-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: linear-gradient(135deg, #0F6E56, #14906F); color: white; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 1rem; }
  .random-review-btn:disabled { background: #ccc; cursor: not-allowed; }

  .heatmap-card { background: #f8f8f5; border-radius: 14px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid #e8e8e0; }
  .heatmap-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px; }
  .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .heatmap-cell { aspect-ratio: 1; border-radius: 4px; background: #ebebe5; }
  .heatmap-cell.l1 { background: #C8E6D9; }
  .heatmap-cell.l2 { background: #8FCDB0; }
  .heatmap-cell.l3 { background: #4FA984; }
  .heatmap-cell.l4 { background: #0F6E56; }
  .heatmap-legend { display: flex; align-items: center; gap: 4px; margin-top: 8px; justify-content: flex-end; font-size: 10px; color: #999; }
  .heatmap-legend-cell { width: 10px; height: 10px; border-radius: 2px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .filter-btn { padding: 7px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; color: #666; }
  .filter-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }

  .note-list { display: flex; flex-direction: column; gap: 10px; }
  .note-card { background: #fafafa; border-radius: 14px; padding: 1rem; border: 1px solid #eee; }
  .note-card.solved { opacity: 0.55; }
  .note-card.struggling { border-color: #FFC4B0; background: #FFFAF8; }
  .note-card.unsorted { border-color: #F6B8A0; background: #FFF6F2; }

  .note-top-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .note-thumbs { display: flex; gap: 4px; flex-shrink: 0; }
  .note-thumb { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; cursor: pointer; background: #eee; }
  .note-thumb.mini { width: 32px; height: 70px; }
  .note-body { flex: 1; min-width: 0; }
  .note-memo { font-size: 13px; color: #444; margin-bottom: 4px; word-break: break-word; }
  .note-date { font-size: 11px; color: #aaa; }
  .note-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .note-reason-tag { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: #EEEEE8; color: #666; }
  .note-retry-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: #FFE0DC; color: #B5421F; font-weight: 600; }
  .status-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; font-weight: 700; }
  .status-badge.pending { background: #FFF3CC; color: #854F0B; }
  .status-badge.approved { background: #E1F5EE; color: #0F6E56; }
  .status-badge.rejected { background: #FFE0DC; color: #B5421F; }
  .review-btns { display: flex; gap: 6px; }
  .btn-ok { padding: 7px 14px; border-radius: 8px; border: 1px solid #0F6E56; background: #0F6E56; color: white; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .btn-ok:hover { background: #0c5945; }
  .btn-no { padding: 7px 14px; border-radius: 8px; border: 1px solid #993C1D; background: white; color: #993C1D; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .btn-no:hover { background: #FAECE7; }
  .btn-reopen { padding: 7px 12px; border-radius: 8px; border: 1px solid #999; background: white; color: #777; font-size: 12px; cursor: pointer; }
  .btn-reopen:hover { background: #f5f5f5; }
  .note-unsorted-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: #FFD9C2; color: #B5421F; font-weight: 700; }

  .note-actions-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .check-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; cursor: pointer; white-space: nowrap; }
  .check-label input { width: 16px; height: 16px; cursor: pointer; accent-color: #0F6E56; }
  .btn-delete { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 2px 4px; }
  .btn-delete:hover { color: #993C1D; }

  /* 분류 폼 (선생님 전용) */
  .classify-form { background: white; border-radius: 10px; padding: 10px; margin-top: 8px; border: 1px dashed #ddd; }
  .solution-upload-zone { width: 100%; border: 2px dashed #ccc; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; background: #fafafa; }
  .solution-upload-zone:hover { border-color: #0F6E56; }
  .solution-upload-placeholder { font-size: 12px; color: #999; }
  .solution-preview-thumb { max-width: 100%; max-height: 120px; border-radius: 8px; object-fit: contain; }
  .classify-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .classify-row select, .classify-row input { flex: 1; padding: 7px 9px; font-size: 12px; border-radius: 7px; border: 1px solid #ddd; outline: none; }
  .classify-row select:disabled { background: #f0f0f0; color: #aaa; }
  .reason-tags-mini { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .reason-tag-btn-mini { padding: 4px 10px; border-radius: 14px; border: 1px solid #ddd; background: white; font-size: 11px; cursor: pointer; color: #666; }
  .reason-tag-btn-mini.selected { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .btn-save-classify { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #0F6E56; background: #0F6E56; color: white; font-size: 12px; font-weight: 600; cursor: pointer; }

  /* 일괄삭제 */
  .bulk-bar { display:none; position:sticky; top:8px; z-index:50; background:#1a1a1a; color:white; border-radius:12px; padding:10px 14px; margin-bottom:12px; align-items:center; justify-content:space-between; gap:8px; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
  .bulk-bar.show { display:flex; }
  .bulk-bar-left { font-size:13px; font-weight:600; }
  .bulk-bar-right { display:flex; gap:6px; }
  .btn-bulk-cancel { padding:7px 14px; border-radius:8px; border:1px solid #555; background:transparent; color:#ccc; font-size:12px; font-weight:600; cursor:pointer; }
  .btn-bulk-delete { padding:7px 14px; border-radius:8px; border:none; background:#993C1D; color:white; font-size:12px; font-weight:600; cursor:pointer; }
  .note-card-checkbox { width:18px; height:18px; accent-color:#993C1D; cursor:pointer; flex-shrink:0; }

  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
  .no-student { text-align: center; padding: 3rem 1rem; color: #999; }
  .loading-msg { text-align: center; padding: 3rem 1rem; color: #999; font-size: 14px; }

  /* 폴더 그룹 */
  .subject-group { margin-bottom: 10px; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
  .subject-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #f0f4f3; cursor: pointer; user-select: none; }
  .subject-header:hover { background: #e8eeec; }
  .subject-arrow { font-size: 11px; color: #999; transition: transform 0.2s; flex-shrink: 0; }
  .subject-arrow.open { transform: rotate(90deg); }
  .subject-folder-icon { font-size: 16px; flex-shrink: 0; }
  .subject-name { font-size: 14px; font-weight: 700; color: #1a1a1a; flex: 1; }
  .subject-count { font-size: 12px; color: #888; background: white; padding: 2px 9px; border-radius: 10px; border: 1px solid #e5e5e0; }
  .subject-count.has-pending { color: #BA7517; border-color: #FAC775; background: #FFF8E7; }
  .subject-body { display: none; }
  .subject-body.open { display: block; }

  .major-group { border-top: 1px solid #f0f0f0; }
  .major-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px 10px 26px; background: #f8f8f5; cursor: pointer; user-select: none; }
  .major-header:hover { background: #f2f2ee; }
  .major-arrow { font-size: 10px; color: #aaa; transition: transform 0.2s; flex-shrink: 0; }
  .major-arrow.open { transform: rotate(90deg); }
  .major-name { font-size: 13px; font-weight: 600; color: #333; flex: 1; }
  .major-count { font-size: 11px; color: #999; }
  .major-count.has-pending { color: #BA7517; }
  .major-body { display: none; }
  .major-body.open { display: block; }

  .minor-group { border-top: 1px solid #f3f3f0; }
  .minor-header { display: flex; align-items: center; gap: 8px; padding: 9px 14px 9px 42px; background: white; cursor: pointer; user-select: none; }
  .minor-header:hover { background: #fafafa; }
  .minor-arrow { font-size: 9px; color: #ccc; transition: transform 0.2s; flex-shrink: 0; }
  .minor-arrow.open { transform: rotate(90deg); }
  .minor-name { font-size: 12.5px; color: #555; flex: 1; }
  .minor-count { font-size: 11px; color: #aaa; }
  .minor-count.has-pending { color: #BA7517; }
  .minor-body { display: none; padding: 10px 14px 14px; background: #fcfcfa; flex-direction: column; gap: 10px; }
  .minor-body.open { display: flex; }

  .modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.75); z-index: 999; align-items: center; justify-content: center; padding: 2rem; }
  .modal-overlay.show { display: flex; }
  .modal-overlay img { max-width: 100%; max-height: 90vh; border-radius: 10px; }

  .review-modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 1.5rem; }
  .review-modal-overlay.show { display: flex; }
  .review-modal { background: white; border-radius: 18px; max-width: 480px; width: 100%; max-height: 88vh; overflow-y: auto; padding: 1.5rem; }
  .review-modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .review-modal-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .review-modal-close { background: none; border: none; font-size: 20px; color: #999; cursor: pointer; }
  .review-modal-img { width: 100%; border-radius: 12px; margin-bottom: 12px; background: #f5f5f5; }
  .review-modal-meta { font-size: 12px; color: #888; margin-bottom: 16px; }
  .review-modal-actions { display: flex; gap: 8px; }
  .review-modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; }
  .review-modal-btn.solved { border-color: #0F6E56; color: #0F6E56; }
  .review-modal-btn.skip { color: #999; }
  .review-modal-empty { text-align: center; padding: 2rem 1rem; color: #999; font-size: 14px; }
</style>
</head>
<body>
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>🔒 선생님 페이지</h1>
    <input type="password" id="password-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') tryLogin()" />
    <button onclick="tryLogin()">입장하기</button>
    <p class="login-error" id="login-error">비밀번호가 틀렸어요</p>
  </div>
</div>

<div class="wrap" id="main-wrap" style="display:none;">

  <div class="student-bar">
    <div class="student-select-row">
      <select id="student-select" onchange="onSelectStudent()"></select>
      <button class="btn-small btn-add-student" onclick="toggleAddForm()">+ 학생 추가</button>
      <button class="btn-small" onclick="changePassword()">🔑 비번 변경</button>
      <button class="btn-small btn-del-student" onclick="deleteCurrentStudent()">학생 삭제</button>
      <button class="btn-small btn-logout" onclick="logout()">로그아웃</button>
    </div>
    <div class="add-form" id="add-form">
      <input type="text" id="new-name" placeholder="이름" maxlength="20" />
      <input type="text" id="new-school" placeholder="학교" maxlength="20" />
      <input type="text" id="new-grade" placeholder="학년" maxlength="10" />
      <input type="text" id="new-password" placeholder="비밀번호" maxlength="20" />
      <button onclick="addStudent()">추가하기</button>
    </div>
    <div class="student-link-box">
      📱 학생들에게 이 링크를 공유하세요:<br>

    const d1 = new Date(dateStr1 + 'T00:00:00');

  async function addStudent() {
    const name = document.getElementById('new-name').value.trim();
    const school = document.getElementById('new-school').value.trim();
    const grade = document.getElementById('new-grade').value.trim();
    const password = document.getElementById('new-password').value.trim();
    if (!name) { alert('이름을 입력해주세요'); return; }

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({ name, school, grade, password })
      });
      const created = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(created));

      document.getElementById('new-name').value = '';
      document.getElementById('new-school').value = '';
      document.getElementById('new-grade').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('add-form').classList.remove('show');

      await loadStudentsFromDB();
      if (created && created[0]) currentId = created[0].id;
      renderSelect();
      await renderBoard();
    } catch (err) {
      console.error(err);
      alert('학생 추가에 실패했어요. 콘솔을 확인해주세요.');
    }
  }

    try {
      await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${stu.id}`, {
        method: 'DELETE',
        headers: sbHeaders()
      });
      await loadStudentsFromDB();
      currentId = students.length > 0 ? students[0].id : null;

  async function changePassword() {
    const stu = getCurrentStudent();
    if (!stu) { alert('먼저 학생을 선택해주세요.'); return; }

    const newPw = prompt(`'${stu.name}' 학생의 새 비밀번호를 입력하세요.\n(현재 비밀번호: ${stu.password || '없음'})`, stu.password || '');
    if (newPw === null) return; // 취소

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${stu.id}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ password: newPw.trim() })
      });
      if (!res.ok) throw new Error(await res.text());

      await loadStudentsFromDB();
      renderSelect();
      alert(`✅ '${stu.name}' 학생의 비밀번호가 '${newPw.trim()}'(으)로 변경됐어요.`);
    } catch (err) {
      console.error(err);
      alert('비밀번호 변경에 실패했어요.');
    }
  }

  function compressImage(file, maxSize = 600, quality = 0.5) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
          else if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('이미지 압축 실패'));
          }, 'image/jpeg', quality);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadSolutionImage(file, entryId) {
    const compressedBlob = await compressImage(file);
    const fileName = `solution_${entryId}_${Date.now()}.jpg`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${fileName}`, {
      method: 'POST',
      headers: sbHeaders({ 'Content-Type': 'image/jpeg' }),
      body: compressedBlob
    });
    if (!uploadRes.ok) {
      const errText = await uploadRes.text();
      throw new Error('모범풀이 업로드 실패: ' + errText);
    }
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${fileName}`;
  }

  async function saveClassify(entryId) {
    const subject = document.getElementById(`classify-subject-${entryId}`).value;
    const major = document.getElementById(`classify-major-${entryId}`).value;
    const minor = document.getElementById(`classify-minor-${entryId}`).value;
    const memo = document.getElementById(`classify-memo-${entryId}`).value.trim();
    const reasonBtn = document.querySelector(`#classify-reasons-${entryId} .reason-tag-btn-mini.selected`);
    const reason = reasonBtn ? reasonBtn.dataset.reason : '';

    const saveBtn = document.querySelector(`button[onclick="saveClassify('${entryId}')"]`);
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }

    try {
      const updateBody = {
        subject: subject || null,
        major_unit: major || null,
        minor_unit: minor || null,
        memo: memo,
        reason: reason || null
      };

      // 모범풀이 사진이 새로 선택되어 있으면 업로드 후 URL도 같이 저장
      if (pendingSolutionFiles[entryId]) {

        delete pendingSolutionFiles[entryId];

      const res = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?id=eq.${entryId}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify(updateBody)
      });
      if (!res.ok) throw new Error(await res.text());

      classifyOpenIds.delete(entryId);
      await refreshCurrentEntries();
    } catch (err) {
      console.error(err);
      alert('분류 저장에 실패했어요. (모범풀이 사진 업로드 중일 수 있어요, 잠시 후 다시 시도해주세요)');

  // ===== 점수판 연동 =====
  function grantScoreboardPoint(stu) {
    try {
      const raw = localStorage.getItem('quest_students');
      if (!raw) return;
      let qStudents = JSON.parse(raw);
      const match = qStudents.find(q => q.name === stu.name);
      if (!match) return;

      const prevEarned = match.earnedTotal || 0;
      match.score = (match.score || 0) + SCOREBOARD_POINT_PER_SOLVE;
      match.earnedTotal = prevEarned + SCOREBOARD_POINT_PER_SOLVE;

      const prevTickets = Math.floor(prevEarned / 20);
      const newTickets = Math.floor(match.earnedTotal / 20);
      const gained = newTickets - prevTickets;
      if (gained > 0) {
        match.tickets = (match.tickets || 0) + gained;
      }

      match.logs = match.logs || [];
      match.logIdCounter = (match.logIdCounter || 0) + 1;
      match.logs.push({
        id: match.logIdCounter,
        label: '오답노트 다시풀기 완료',
        delta: SCOREBOARD_POINT_PER_SOLVE,
        date: todayStr(),
        time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }),
        type: 'add'
      });

      localStorage.setItem('quest_students', JSON.stringify(qStudents));
      if (gained > 0) {
        setTimeout(() => alert(`🎟️ ${stu.name} 학생이 점수판에서 뽑기권 ${gained}장을 획득했어요!`), 100);
      }
    } catch (err) {
      console.log('점수판 연동 스킵:', err);
    }
  }

  // ===== 망각곡선 복습 알림 =====
  function renderReviewAlert() {
    const alertBox = document.getElementById('review-alert');
    const listEl = document.getElementById('review-alert-list');
    const today = todayStr();
    const targets = [1, 3, 7];

    const due = [];
    currentEntries.forEach(e => {
      if (e.solved) return;
      const elapsed = daysBetween(e.entry_date, today);
      if (targets.includes(elapsed)) due.push({ entry: e, elapsed });
    });

    if (due.length === 0) {
      alertBox.classList.remove('show');
      listEl.innerHTML = '';
      return;
    }

    alertBox.classList.add('show');
    listEl.innerHTML = due.slice(0, 6).map(d => {
      const tagClass = d.elapsed === 1 ? 'd1' : (d.elapsed === 3 ? 'd3' : 'd7');
      const label = d.elapsed === 1 ? '1일 전' : (d.elapsed === 3 ? '3일 전' : '7일 전');
      const unitLabel = [d.entry.subject, d.entry.major_unit].filter(Boolean).join(' · ') || '미분류';
      return `<div class="review-alert-item">
        <span>${unitLabel}${d.entry.memo ? ' — ' + d.entry.memo : ''}</span>
        <span class="review-tag ${tagClass}">${label}</span>
      </div>`;
    }).join('');
  }

  // ===== 히트맵 =====
  function renderHeatmap() {
    const grid = document.getElementById('heatmap-grid');
    const counts = {};
    currentEntries.forEach(e => {
      if (!e.entry_date) return;
      counts[e.entry_date] = (counts[e.entry_date] || 0) + 1;
    });

    const today = new Date();
    today.setHours(0,0,0,0);
    const days = [];
    for (let i = 48; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      days.push(ds);
    }

    function levelOf(c) {
      if (!c) return '';
      if (c === 1) return 'l1';
      if (c === 2) return 'l2';
      if (c <= 4) return 'l3';
      return 'l4';
    }

    grid.innerHTML = days.map(ds => {
      const c = counts[ds] || 0;
      const lvl = levelOf(c);
      const [y,m,d] = ds.split('-');
      return `<div class="heatmap-cell ${lvl}" title="${y}.${m}.${d} — 오답 ${c}개"></div>`;
    }).join('');
  }

          <h1>📐 ${stu.name} 수학 오답노트</h1>
          <p class="profile-sub">${[stu.school, stu.grade].filter(Boolean).join(' · ') || '학교/학년 미입력'}</p>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <p class="stat-label">전체 오답</p>
            <p class="stat-value" id="stat-total">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">완료</p>
            <p class="stat-value green" id="stat-solved">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">검수 대기</p>
            <p class="stat-value orange" id="stat-pending">0</p>
          </div>
        </div>

        <div class="unsorted-alert" id="unsorted-alert">
          <div class="unsorted-title" id="unsorted-title">⚠️ 분류 대기 중인 오답이 있어요</div>
          <div class="unsorted-sub">학생이 올린 사진에 과목·단원을 지정해주세요 (아래 "🆕 미분류" 필터에서 확인)</div>
        </div>

        <div class="unsorted-alert" id="reviewing-alert" style="background:linear-gradient(135deg,#FFF8E7,#FFEFC9);border-color:#FAC775;">
          <div class="unsorted-title" id="reviewing-title" style="color:#854F0B;">⏳ 검수 대기 중인 오답이 있어요</div>
          <div class="unsorted-sub" style="color:#8a5a15;">학생 풀이를 확인하고 ✅OK 또는 ❌NO로 판정해주세요 (아래 "⏳ 검수대기" 필터에서 확인)</div>
        </div>

        <div class="weakness-card">
          <div class="weakness-title">🎯 약점 TOP 3</div>
          <div class="weakness-list" id="weakness-list"></div>
        </div>

        <div class="review-alert" id="review-alert">
          <div class="review-alert-title">⏰ 오늘 복습하면 좋은 오답</div>
          <div class="review-alert-list" id="review-alert-list"></div>
        </div>

        <button class="random-review-btn" id="random-review-btn" onclick="startRandomReview()">
          🎲 오늘의 오답 3문제 랜덤 복습
        </button>

        <div class="heatmap-card">
          <p class="heatmap-title">📅 최근 7주 학습 기록</p>
          <div class="heatmap-grid" id="heatmap-grid"></div>
          <div class="heatmap-legend">
            <span>적음</span>
            <span class="heatmap-legend-cell" style="background:#ebebe5;"></span>
            <span class="heatmap-legend-cell" style="background:#C8E6D9;"></span>
            <span class="heatmap-legend-cell" style="background:#8FCDB0;"></span>
            <span class="heatmap-legend-cell" style="background:#4FA984;"></span>
            <span class="heatmap-legend-cell" style="background:#0F6E56;"></span>
            <span>많음</span>
          </div>
        </div>

        <div class="filter-row" id="filter-row">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
          <button class="filter-btn" data-filter="unsorted" onclick="setFilter('unsorted')">🆕 미분류</button>
          <button class="filter-btn" data-filter="reviewing" onclick="setFilter('reviewing')">⏳ 검수대기</button>
          <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">미해결</button>
          <button class="filter-btn" data-filter="solved" onclick="setFilter('solved')">완료</button>
          <button class="filter-btn" data-filter="struggling" onclick="setFilter('struggling')">⭐ 자주틀림</button>
          <button class="filter-btn" style="margin-left:auto;border-color:#993C1D;color:#993C1D;" onclick="toggleBulkMode()">🗑️ 선택삭제</button>
        </div>

        <div class="bulk-bar" id="bulk-bar">
          <span class="bulk-bar-left" id="bulk-count-label">0개 선택됨</span>
          <div class="bulk-bar-right">
            <button class="btn-bulk-cancel" onclick="toggleBulkMode()">취소</button>
            <button class="btn-bulk-delete" onclick="bulkDelete()">🗑️ 선택 삭제</button>
          </div>
        </div>

        <div class="note-list" id="note-list"></div>
      </div>
    `;
  }

  async function renderBoard() {
    const area = document.getElementById('board-area');
    const stu = getCurrentStudent();

    if (!stu) {
      area.innerHTML = `<div class="board"><div class="no-student">👈 학생을 추가하면<br>오답노트가 표시됩니다</div></div>`;
      return;
    }

    area.innerHTML = `<div class="board"><div class="loading-msg">불러오는 중...</div></div>`;
    currentEntries = await loadEntriesForStudent(stu.id);

    area.innerHTML = BOARD_TEMPLATE(stu);
    renderStudentDetails();
  }

  function renderStudentDetails() {
    const total = currentEntries.length;
    const solved = currentEntries.filter(e => e.solved).length;
    const unsorted = currentEntries.filter(e => !e.subject).length;
    const reviewing = currentEntries.filter(e => {
      const rs = e.review_status || (e.solved ? 'approved' : 'pending');
      return rs === 'pending' || rs === 'rejected';
    }).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-solved').textContent = solved;
    document.getElementById('stat-pending').textContent = reviewing;

    const unsortedAlert = document.getElementById('unsorted-alert');
    if (unsorted > 0) {
      unsortedAlert.classList.add('show');
      document.getElementById('unsorted-title').textContent = `⚠️ 분류 대기 중인 오답이 ${unsorted}개 있어요`;
    } else {
      unsortedAlert.classList.remove('show');
    }

    const reviewingAlert = document.getElementById('reviewing-alert');
    if (reviewing > 0) {
      reviewingAlert.classList.add('show');
      document.getElementById('reviewing-title').textContent = `⏳ 검수 대기 중인 오답이 ${reviewing}개 있어요`;
    } else {
      reviewingAlert.classList.remove('show');
    }

    renderWeakness();
    renderReviewAlert();
    renderHeatmap();

    const pendingCount = currentEntries.filter(e => !e.solved).length;
    document.getElementById('random-review-btn').disabled = pendingCount === 0;

    let list = currentEntries;
    if (currentFilter === 'pending') list = list.filter(e => !e.solved);
    if (currentFilter === 'solved') list = list.filter(e => e.solved);
    if (currentFilter === 'struggling') list = list.filter(e => (e.retry_count || 0) >= STRUGGLE_THRESHOLD);
    if (currentFilter === 'unsorted') list = list.filter(e => !e.subject);
    if (currentFilter === 'reviewing') list = list.filter(e => {
      const rs = e.review_status || (e.solved ? 'approved' : 'pending');
      return rs === 'pending' || rs === 'rejected';
    });

    const container = document.getElementById('note-list');

    if (currentFilter === 'unsorted' || currentFilter === 'reviewing') {
      // 미분류/검수대기는 폴더 없이 그냥 리스트로
      if (list.length === 0) {
        container.innerHTML = `<div class="empty">${currentFilter === 'unsorted' ? '미분류 오답이 없어요 🎉' : '검수 대기 중인 오답이 없어요 🎉'}</div>`;
      } else {
        container.innerHTML = [...list].sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('');
      }
      return;
    }

    if (list.length === 0) {
      container.innerHTML = '<div class="empty">표시할 오답이 없어요</div>';
      return;
    }

    // 분류 안 된 항목과 분류된 항목 분리
    const sortedList = list.filter(e => e.subject);
    const unsortedList = list.filter(e => !e.subject);

    const bySubject = {};
    sortedList.forEach(e => {
      const subj = e.subject || '기타';
      if (!bySubject[subj]) bySubject[subj] = [];
      bySubject[subj].push(e);
    });

    const subjectOrder = Object.keys(CURRICULUM).concat(['기타']);
    const subjectKeys = Object.keys(bySubject).sort((a, b) => subjectOrder.indexOf(a) - subjectOrder.indexOf(b));

    let html = '';

    // 미분류 항목 우선 표시 (폴더 밖에, 눈에 띄게)
    if (unsortedList.length > 0) {
      html += unsortedList.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('');
    }

    html += subjectKeys.map(subj => {
      const subjEntries = bySubject[subj];
      const subjPending = subjEntries.filter(e => !e.solved).length;
      const subjKey = 'subj_' + subj;
      const subjOpen = !!openGroups[subjKey];
      const majorMap = CURRICULUM[subj] || {};
      const majorOrder = Object.keys(majorMap);

      const byMajor = {};
      const noMajor = [];
      subjEntries.forEach(e => {
        if (e.major_unit) {
          if (!byMajor[e.major_unit]) byMajor[e.major_unit] = [];
          byMajor[e.major_unit].push(e);
        } else {
          noMajor.push(e);
        }
      });

      const majorKeys = Object.keys(byMajor).sort((a, b) => majorOrder.indexOf(a) - majorOrder.indexOf(b));

      const majorGroupsHtml = majorKeys.map(major => {
        const majorEntries = byMajor[major];
        const majorPending = majorEntries.filter(e => !e.solved).length;
        const mKey = subjKey + '__major_' + major;
        const mOpen = !!openGroups[mKey];
        const minorOrder = majorMap[major] || [];

        const byMinor = {};
        const noMinor = [];
        majorEntries.forEach(e => {
          if (e.minor_unit) {
            if (!byMinor[e.minor_unit]) byMinor[e.minor_unit] = [];
            byMinor[e.minor_unit].push(e);
          } else {
            noMinor.push(e);
          }
        });

        const minorKeys = Object.keys(byMinor).sort((a, b) => minorOrder.indexOf(a) - minorOrder.indexOf(b));

        const minorGroupsHtml = minorKeys.map(minor => {
          const minorEntries = byMinor[minor];
          const minorPending = minorEntries.filter(e => !e.solved).length;
          const miKey = mKey + '__minor_' + minor;
          const miOpen = !!openGroups[miKey];
          return `
            <div class="minor-group">
              <div class="minor-header" onclick="toggleGroup('${miKey}')">
                <span class="minor-arrow ${miOpen ? 'open' : ''}">▶</span>
                <span class="minor-name">${minor}</span>
                <span class="minor-count ${minorPending > 0 ? 'has-pending' : ''}">${minorEntries.length}개${minorPending > 0 ? ' · 미해결 ' + minorPending : ''}</span>
              </div>
              <div class="minor-body ${miOpen ? 'open' : ''}">
                ${minorEntries.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
              </div>
            </div>`;
        }).join('');

        const noMinorHtml = noMinor.length > 0 ? (() => {
          const miKey = mKey + '__nominor';
          const miOpen = !!openGroups[miKey];
          const pc = noMinor.filter(e => !e.solved).length;
          return `
            <div class="minor-group">
              <div class="minor-header" onclick="toggleGroup('${miKey}')">
                <span class="minor-arrow ${miOpen ? 'open' : ''}">▶</span>
                <span class="minor-name">중단원 미지정</span>
                <span class="minor-count ${pc > 0 ? 'has-pending' : ''}">${noMinor.length}개</span>
              </div>
              <div class="minor-body ${miOpen ? 'open' : ''}">
                ${noMinor.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
              </div>
            </div>`;
        })() : '';

        return `
          <div class="major-group">
            <div class="major-header" onclick="toggleGroup('${mKey}')">
              <span class="major-arrow ${mOpen ? 'open' : ''}">▶</span>
              <span class="major-name">${major}</span>
              <span class="major-count ${majorPending > 0 ? 'has-pending' : ''}">${majorEntries.length}개${majorPending > 0 ? ' · 미해결 ' + majorPending : ''}</span>
            </div>
            <div class="major-body ${mOpen ? 'open' : ''}">
              ${minorGroupsHtml}${noMinorHtml}
            </div>
          </div>`;
      }).join('');

      const noMajorHtml = noMajor.length > 0 ? (() => {
        const mKey = subjKey + '__nomajor';
        const mOpen = !!openGroups[mKey];
        const pc = noMajor.filter(e => !e.solved).length;
        return `
          <div class="major-group">
            <div class="major-header" onclick="toggleGroup('${mKey}')">
              <span class="major-arrow ${mOpen ? 'open' : ''}">▶</span>
              <span class="major-name">대단원 미지정</span>
              <span class="major-count ${pc > 0 ? 'has-pending' : ''}">${noMajor.length}개</span>
            </div>
            <div class="major-body ${mOpen ? 'open' : ''}">
              ${noMajor.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
            </div>
          </div>`;
      })() : '';

      return `
        <div class="subject-group">
          <div class="subject-header" onclick="toggleGroup('${subjKey}')">
            <span class="subject-arrow ${subjOpen ? 'open' : ''}">▶</span>
            <span class="subject-folder-icon">📁</span>
            <span class="subject-name">${subj}</span>
            <span class="subject-count ${subjPending > 0 ? 'has-pending' : ''}">${subjEntries.length}개${subjPending > 0 ? ' · 미해결 ' + subjPending : ''}</span>
          </div>
          <div class="subject-body ${subjOpen ? 'open' : ''}">
            ${majorGroupsHtml}${noMajorHtml}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = html;
  }

  // ===== 월별 순위표 =====
  let lbYear, lbMonth;
  function initLbMonth() {
    const d = new Date();
    lbYear = d.getFullYear();
    lbMonth = d.getMonth() + 1;
  }
  initLbMonth();

  function changeMonth(delta) {
    lbMonth += delta;
    if (lbMonth > 12) { lbMonth = 1; lbYear++; }
    if (lbMonth < 1) { lbMonth = 12; lbYear--; }
    loadLeaderboard();
  }

  function getMonthStr() {
    return `${lbYear}-${String(lbMonth).padStart(2, '0')}`;
  }

  async function loadLeaderboard() {
    const monthStr = getMonthStr();
    document.getElementById('lb-month-label').textContent = `${lbYear}년 ${lbMonth}월`;

    try {
      // 해당 월의 모든 오답 데이터 가져오기
      const nextMonth = lbMonth === 12 ? 1 : lbMonth + 1;
      const nextYear = lbMonth === 12 ? lbYear + 1 : lbYear;
      const notesRes = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?select=student_id,entry_date,review_status,solved&entry_date=gte.${monthStr}-01&entry_date=lt.${nextYear}-${String(nextMonth).padStart(2, '0')}-01`, {
        headers: sbHeaders()
      });
      const notes = await notesRes.json();

      // 해당 월의 보너스 포인트
      const bonusRes = await fetch(`${SUPABASE_URL}/rest/v1/bonus_points?select=student_id,points&month=eq.${monthStr}`, {
        headers: sbHeaders()
      });
      let bonuses = [];
      try { bonuses = await bonusRes.json(); } catch(e) { bonuses = []; }

      // 학생별 점수 계산
      const scores = {};
      students.forEach(s => {
        scores[s.id] = { name: s.name, uploads: 0, approved: 0, bonus: 0, total: 0 };
      });

      notes.forEach(n => {
        if (!scores[n.student_id]) return;
        scores[n.student_id].uploads += 1; // 올리기 1점
        if (n.review_status === 'approved' || (n.solved && !n.review_status)) {
          scores[n.student_id].approved += 5; // OK 받으면 5점
        }
      });

      if (Array.isArray(bonuses)) {
        bonuses.forEach(b => {
          if (!scores[b.student_id]) return;
          scores[b.student_id].bonus += b.points;
        });
      }

      // 총점 계산 & 정렬
      const ranked = Object.values(scores).map(s => {
        s.total = s.uploads + s.approved + s.bonus;
        return s;
      }).sort((a, b) => b.total - a.total);

      const medals = ['🥇', '🥈', '🥉'];
      const tbody = document.getElementById('lb-body');

      if (ranked.length === 0 || ranked.every(r => r.total === 0)) {
        tbody.innerHTML = `<tr><td colspan="6" class="lb-empty">이번 달 데이터가 아직 없어요</td></tr>`;
        return;
      }

      tbody.innerHTML = ranked.map((r, i) => `
        <tr>
          <td class="lb-rank">${i < 3 ? `<span class="lb-medal">${medals[i]}</span>` : (i + 1)}</td>
          <td class="lb-name">${r.name}</td>
          <td class="lb-detail">${r.uploads}점</td>
          <td class="lb-detail">${r.approved}점</td>
          <td class="lb-detail">${r.bonus > 0 ? '+' + r.bonus : '-'}</td>
          <td class="lb-score">${r.total}점</td>
        </tr>
      `).join('');

    } catch (err) {
      console.error('순위표 로드 실패:', err);
    }
  }

  function populateBonusSelect() {
    const sel = document.getElementById('bonus-student-select');
    sel.innerHTML = '<option value="">학생 선택</option>' +
      students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }

  async function giveBonus() {
    const studentId = document.getElementById('bonus-student-select').value;
    const points = parseInt(document.getElementById('bonus-points').value);
    const memo = document.getElementById('bonus-memo').value.trim();

    if (!studentId) { alert('학생을 선택해주세요.'); return; }
    if (!points || points <= 0) { alert('점수를 입력해주세요.'); return; }

    const monthStr = getMonthStr();
    const studentName = students.find(s => s.id === studentId)?.name || '';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/bonus_points`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({
          student_id: studentId,
          points: points,
          memo: memo || null,
          month: monthStr
        })
      });
      if (!res.ok) throw new Error(await res.text());

      alert(`✅ ${studentName}에게 보너스 ${points}점 지급 완료!`);
      document.getElementById('bonus-points').value = '';
      document.getElementById('bonus-memo').value = '';
      loadLeaderboard();
    } catch (err) {
      console.error(err);
      alert('보너스 지급에 실패했어요.');
    }
  }

  // ===== 학생 업로드 페이지 링크 표시 =====
  function setupStudentLink() {
    // 현재 주소(teacher.html)에서 student.html로 바꿔서 정확한 링크 생성
    const studentUrl = window.location.href.replace(/teacher(_dashboard)?\.html.*$/, 'student.html');
    document.getElementById('student-link-display').textContent = studentUrl;
  }

  function copyStudentLink() {
    const text = document.getElementById('student-link-display').textContent;
    navigator.clipboard.writeText(text).then(() => {
      alert('링크가 복사됐어요! 학생들에게 공유해주세요 📋');
    }).catch(() => {
      alert('복사에 실패했어요. 주소를 직접 선택해서 복사해주세요.');
    });
  }

  // ===== 초기 실행 =====
  checkLoginOnLoad();

  // PWA 서비스워커 등록
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }
  setupStudentLink();
</script>
