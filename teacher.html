<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오답 너 뒤졌다 (선생)</title>
<link rel="manifest" href="/manifest-teacher.json">
<meta name="theme-color" content="#E8639A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오답뒤졌다(선생)">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f5f5f0;
    --bg2: #ffffff;
    --bg3: #fafafa;
    --bg4: #f8f8f5;
    --border: #eee;
    --border2: #ddd;
    --text1: #1a1a1a;
    --text2: #555;
    --text3: #888;
    --text4: #aaa;
    --tab-bg: #f0f0eb;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    --pink: #E8639A;
    --pink-dark: #C94080;
    --pink-light: #FDE8F2;
    --green: #0F6E56;
    --green-light: #E1F5EE;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --bg2: #1c1c1e;
      --bg3: #2c2c2e;
      --bg4: #242426;
      --border: #3a3a3c;
      --border2: #48484a;
      --text1: #f2f2f7;
      --text2: #ebebf5cc;
      --text3: #ebebf599;
      --text4: #ebebf560;
      --tab-bg: #2c2c2e;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.4);
      --pink: #FF6EB0;
      --pink-dark: #FF6EB0;
      --pink-light: #3a1a2a;
      --green: #30d158;
      --green-light: #1a3a2a;
    }
  }

  html, body { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text1); }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 2rem; }
  .wrap { max-width: 720px; margin: 0 auto; }

  @media (max-width: 600px) {
    body { padding: 0.8rem; }
    .board { padding: 1.1rem !important; }
    .stats-row { grid-template-columns: 1fr 1fr 1fr; gap: 6px !important; }
    .student-select-row { flex-wrap: wrap; }
    .student-select-row select { width: 100%; }
    .note-top-row { flex-direction: column; }
    .note-thumbs { width: 100%; }
    .note-thumb { flex: 1; height: 120px; }
    .note-thumb.mini { flex: 1; height: 120px; }
  }

  /* 로그인 화면 */
  .login-wrap { max-width: 360px; margin: 8rem auto; }
  .login-card { background: var(--bg2); border-radius: 20px; padding: 2rem; box-shadow: var(--card-shadow); text-align: center; }
  .login-card h1 { font-size: 18px; margin-bottom: 1.2rem; color: var(--text1); }
  .login-card input { width: 100%; padding: 12px 14px; font-size: 15px; border-radius: 10px; border: 1px solid var(--border2); outline: none; margin-bottom: 10px; text-align: center; background: var(--bg2); color: var(--text1); }
  .login-card input:focus { border-color: var(--pink); }
  .login-card button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--pink); color: white; font-size: 14px; font-weight: 700; cursor: pointer; }
  .login-error { color: #993C1D; font-size: 12px; margin-top: 8px; display: none; }
  .login-error.show { display: block; }

  /* 학생 선택 바 */
  .student-bar { background: var(--bg2); border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: var(--card-shadow); }
  .student-select-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .student-select-row select { flex: 1; min-width: 120px; padding: 10px 12px; font-size: 15px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text1); }
  .btn-small { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg2); font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; color: var(--text2); }
  .btn-add-student { border-color: var(--pink); color: var(--pink); }
  .btn-add-student:hover { background: var(--pink-light); }
  .btn-del-student { border-color: #993C1D; color: #993C1D; }
  .btn-logout { border-color: var(--border2); color: var(--text3); }

  .add-form { display: none; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .add-form.show { display: flex; }
  .add-form input { flex: 1; min-width: 90px; padding: 9px 12px; font-size: 13px; border-radius: 8px; border: 1px solid var(--border2); outline: none; background: var(--bg2); color: var(--text1); }
  .add-form input:focus { border-color: var(--pink); }
  .add-form button { padding: 9px 16px; border-radius: 8px; border: none; background: var(--pink); color: white; font-size: 13px; cursor: pointer; font-weight: 600; }

  .student-link-box { background: var(--pink-light); border: 1px solid var(--pink); border-radius: 10px; padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: var(--pink-dark); }
  .student-link-box code { background: var(--bg2); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

  /* 월별 순위표 */
  .leaderboard { background: var(--bg2); border-radius: 16px; padding: 1.4rem; margin-bottom: 1rem; box-shadow: var(--card-shadow); }
  .lb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .lb-title { font-size: 16px; font-weight: 700; color: var(--text1); }
  .lb-month-nav { display: flex; align-items: center; gap: 8px; }
  .lb-month-nav button { background: none; border: 1px solid var(--border2); border-radius: 8px; width: 30px; height: 30px; font-size: 14px; cursor: pointer; color: var(--text3); }
  .lb-month-label { font-size: 14px; font-weight: 600; color: var(--text1); min-width: 100px; text-align: center; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th { font-size: 11px; color: var(--text3); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 500; }
  .lb-table td { font-size: 13px; padding: 8px; border-bottom: 1px solid var(--border); }
  .lb-rank { font-weight: 700; width: 36px; }
  .lb-name { font-weight: 600; color: var(--text1); }
  .lb-score { font-weight: 700; color: var(--pink); text-align: right; }
  .lb-detail { font-size: 11px; color: var(--text4); text-align: right; }
  .lb-medal { font-size: 16px; }
  .lb-empty { text-align: center; padding: 1.5rem; color: var(--text4); font-size: 13px; }

  .bonus-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .bonus-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .bonus-row select, .bonus-row input { padding: 8px 10px; font-size: 13px; border-radius: 8px; border: 1px solid var(--border2); outline: none; background: var(--bg2); color: var(--text1); }
  .bonus-row select { flex: 1; min-width: 80px; }
  .bonus-row input[type="number"] { width: 70px; }
  .bonus-row input[type="text"] { flex: 2; min-width: 100px; }
  .btn-bonus { padding: 8px 14px; border-radius: 8px; border: none; background: #854F0B; color: white; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* 통계 대시보드 */
  .board { background: var(--bg2); border-radius: 20px; padding: 1.8rem; box-shadow: var(--card-shadow); }
  .profile-head { text-align: center; margin-bottom: 1.2rem; }
  h1 { font-size: 20px; font-weight: 600; color: var(--text1); margin-bottom: 4px; }
  .profile-sub { font-size: 13px; color: var(--text3); }

  .dashboard-t {
    background: linear-gradient(135deg, #E8639A, #C94080);
    border-radius: 20px; padding: 1.2rem;
    margin-bottom: 1rem; color: white;
    box-shadow: 0 6px 24px rgba(232,99,154,0.35);
  }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; margin-bottom: 14px; }
  .stat-card { text-align: center; padding: 0.6rem; position: relative; }
  .stat-card + .stat-card::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:1px; background:rgba(255,255,255,0.3); }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.75); margin-bottom: 2px; font-weight: 600; }
  .stat-value { font-size: 28px; font-weight: 800; color: white; }
  .stat-value.green { color: #A8FFD4; }
  .stat-value.orange { color: #FFE0A0; }

  .progress-wrap-t { margin-top: 4px; }
  .progress-label-t { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
  .progress-bar-t { height: 6px; background: rgba(255,255,255,0.25); border-radius: 6px; overflow: hidden; }
  .progress-fill-t { height: 100%; background: white; border-radius: 6px; transition: width 0.8s ease; }

  /* 알림 카드 */
  .unsorted-alert { background: linear-gradient(135deg, #FFF3F0, #FFE8E0); border: 1px solid #FFD4C2; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; display: none; }
  .unsorted-alert.show { display: block; }
  .unsorted-title { font-size: 13px; font-weight: 700; color: #B5421F; margin-bottom: 4px; }
  .unsorted-sub { font-size: 12px; color: #8a3115; }

  /* 약점 TOP3 */
  .weakness-card { background: linear-gradient(135deg, #FFF3F0, #FFE8E0); border: 1px solid #FFD4C2; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; }
  .weakness-title { font-size: 13px; font-weight: 700; color: #B5421F; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .weakness-list { display: flex; flex-direction: column; gap: 6px; }
  .weakness-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #6B2E16; background: var(--bg2); padding: 7px 12px; border-radius: 8px; }
  .weakness-rank { font-weight: 700; margin-right: 6px; }
  .weakness-count { font-size: 12px; font-weight: 600; color: #B5421F; }
  .weakness-empty { font-size: 12px; color: var(--text4); padding: 4px 0; }

  .review-alert { background: linear-gradient(135deg, #FFF8E7, #FFEFC9); border: 1px solid #FAC775; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1rem; display: none; }
  .review-alert.show { display: block; }
  .review-alert-title { font-size: 13px; font-weight: 700; color: #854F0B; margin-bottom: 8px; }
  .review-alert-list { display: flex; flex-direction: column; gap: 6px; }
  .review-alert-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12.5px; color: #6B3E0B; background: var(--bg2); padding: 7px 12px; border-radius: 8px; }
  .review-tag { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 6px; white-space: nowrap; }
  .review-tag.d1 { background: #FFE0DC; color: #B5421F; }
  .review-tag.d3 { background: #FFF0CC; color: #854F0B; }
  .review-tag.d7 { background: #DCEEE8; color: #0F6E56; }

  .heatmap-card { background: var(--bg4); border-radius: 14px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
  .heatmap-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
  .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .heatmap-cell { aspect-ratio: 1; border-radius: 4px; background: var(--border); }
  .heatmap-cell.l1 { background: #FDE8F2; }
  .heatmap-cell.l2 { background: #F4A8CC; }
  .heatmap-cell.l3 { background: #EC76AD; }
  .heatmap-cell.l4 { background: #E8639A; }
  .heatmap-legend { display: flex; align-items: center; gap: 4px; margin-top: 8px; justify-content: flex-end; font-size: 10px; color: var(--text4); }
  .heatmap-legend-cell { width: 10px; height: 10px; border-radius: 2px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .filter-btn { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg2); font-size: 13px; cursor: pointer; color: var(--text3); }
  .filter-btn.active { background: var(--text1); color: var(--bg2); border-color: var(--text1); }

  /* 애니메이션 */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .note-list { display: flex; flex-direction: column; gap: 12px; }
  .note-card {
    background: var(--bg2);
    border-radius: 16px;
    padding: 1rem;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    animation: fadeSlideIn 0.2s ease both;
    transition: transform 0.15s;
  }
  .note-card:nth-child(1) { animation-delay: 0.00s; }
  .note-card:nth-child(2) { animation-delay: 0.04s; }
  .note-card:nth-child(3) { animation-delay: 0.08s; }
  .note-card:nth-child(4) { animation-delay: 0.12s; }
  .note-card:nth-child(5) { animation-delay: 0.16s; }
  .note-card:nth-child(6) { animation-delay: 0.20s; }
  .note-card:nth-child(7) { animation-delay: 0.24s; }
  .note-card:nth-child(8) { animation-delay: 0.28s; }
  .note-card:nth-child(9) { animation-delay: 0.32s; }
  .note-card:nth-child(10) { animation-delay: 0.36s; }
  .note-card.solved { opacity: 0.55; border-left: 4px solid #30d158; }
  .note-card.struggling { border-left: 4px solid #FF9F0A; background: var(--bg3); }
  .note-card.unsorted { border-left: 4px solid #FF453A; background: var(--bg3); }

  .note-top-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .note-thumbs { display: flex; gap: 6px; width: 100%; }
  .note-thumb { flex: 1; min-width: 0; height: 110px; border-radius: 10px; object-fit: cover; cursor: pointer; background: var(--border); display: block; }
  .note-body { flex: 1; min-width: 0; }
  .note-memo { font-size: 13px; color: var(--text2); margin-bottom: 4px; word-break: break-word; }
  .note-date { font-size: 11px; color: var(--text4); }
  .note-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .note-reason-tag { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: var(--bg4); color: var(--text3); }
  .note-retry-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: #FFE0DC; color: #B5421F; font-weight: 600; }
  .status-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; font-weight: 700; }
  .status-badge.pending { background: #FFF3CC; color: #854F0B; }
  .status-badge.approved { background: var(--green-light); color: var(--green); }
  .status-badge.rejected { background: #FFE0DC; color: #B5421F; }
  .review-btns { display: flex; gap: 6px; }
  .btn-ok { padding: 7px 14px; border-radius: 8px; border: none; background: var(--green); color: white; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .btn-no { padding: 7px 14px; border-radius: 8px; border: 1px solid #993C1D; background: var(--bg2); color: #993C1D; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .btn-reopen { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text3); font-size: 12px; cursor: pointer; }
  .note-unsorted-badge { font-size: 10.5px; padding: 2px 8px; border-radius: 6px; background: #FFD9C2; color: #B5421F; font-weight: 700; }
  .note-actions-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .check-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; cursor: pointer; white-space: nowrap; }
  .check-label input { width: 16px; height: 16px; cursor: pointer; accent-color: #0F6E56; }
  .btn-delete { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 2px 4px; }
  .btn-delete:hover { color: #993C1D; }

  /* 분류 폼 (선생님 전용) */
  .classify-form { background: white; border-radius: 10px; padding: 10px; margin-top: 8px; border: 1px dashed #ddd; }
  .solution-upload-zone { width: 100%; border: 2px dashed #ccc; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; background: #fafafa; }
  .solution-upload-zone:hover { border-color: #0F6E56; }
  .solution-upload-placeholder { font-size: 12px; color: #999; }
  .solution-preview-thumb { max-width: 100%; max-height: 120px; border-radius: 8px; object-fit: contain; }
  .classify-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .classify-row select, .classify-row input { flex: 1; padding: 7px 9px; font-size: 12px; border-radius: 7px; border: 1px solid #ddd; outline: none; }
  .classify-row select:disabled { background: #f0f0f0; color: #aaa; }
  .reason-tags-mini { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .reason-tag-btn-mini { padding: 4px 10px; border-radius: 14px; border: 1px solid #ddd; background: white; font-size: 11px; cursor: pointer; color: #666; }
  .reason-tag-btn-mini.selected { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .btn-save-classify { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #0F6E56; background: #0F6E56; color: white; font-size: 12px; font-weight: 600; cursor: pointer; }

  /* 일괄삭제 */
  .bulk-bar { display:none; position:sticky; top:8px; z-index:50; background:#1a1a1a; color:white; border-radius:12px; padding:10px 14px; margin-bottom:12px; align-items:center; justify-content:space-between; gap:8px; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
  .bulk-bar.show { display:flex; }
  .bulk-bar-left { font-size:13px; font-weight:600; }
  .bulk-bar-right { display:flex; gap:6px; }
  .btn-bulk-cancel { padding:7px 14px; border-radius:8px; border:1px solid #555; background:transparent; color:#ccc; font-size:12px; font-weight:600; cursor:pointer; }
  .btn-bulk-delete { padding:7px 14px; border-radius:8px; border:none; background:#993C1D; color:white; font-size:12px; font-weight:600; cursor:pointer; }
  .note-card-checkbox { width:18px; height:18px; accent-color:#993C1D; cursor:pointer; flex-shrink:0; }

  /* 페이지네이션 */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 14px; flex-wrap: wrap; }
  .page-btn { min-width: 34px; height: 34px; padding: 0 8px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 13px; font-weight: 600; color: #555; cursor: pointer; }
  .page-btn:hover { background: #f5f5f0; }
  .page-btn.active { background: #0F6E56; color: white; border-color: #0F6E56; }
  .page-btn.disabled { color: #ccc; cursor: default; pointer-events: none; }
  .page-info { font-size: 12px; color: #aaa; text-align: center; margin-top: 6px; }

  /* 메인 탭 */
  .main-tab-bar { display: flex; gap: 6px; margin-bottom: 1.2rem; background: #f0f0eb; padding: 4px; border-radius: 12px; }
  .main-tab-btn { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 9px; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; }
  .main-tab-btn.active { background: white; color: #0F6E56; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .main-tab-panel { display: none; }
  .main-tab-panel.active { display: block; }

  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
  .no-student { text-align: center; padding: 3rem 1rem; color: #999; }
  .loading-msg { text-align: center; padding: 3rem 1rem; color: #999; font-size: 14px; }

  /* 폴더 그룹 */
  .subject-group { margin-bottom: 10px; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
  .subject-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #f0f4f3; cursor: pointer; user-select: none; }
  .subject-header:hover { background: #e8eeec; }
  .subject-arrow { font-size: 11px; color: #999; transition: transform 0.2s; flex-shrink: 0; }
  .subject-arrow.open { transform: rotate(90deg); }
  .subject-folder-icon { font-size: 16px; flex-shrink: 0; }
  .subject-name { font-size: 14px; font-weight: 700; color: #1a1a1a; flex: 1; }
  .subject-count { font-size: 12px; color: #888; background: white; padding: 2px 9px; border-radius: 10px; border: 1px solid #e5e5e0; }
  .subject-count.has-pending { color: #BA7517; border-color: #FAC775; background: #FFF8E7; }
  .subject-body { display: none; }
  .subject-body.open { display: block; }

  .major-group { border-top: 1px solid #f0f0f0; }
  .major-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px 10px 26px; background: #f8f8f5; cursor: pointer; user-select: none; }
  .major-header:hover { background: #f2f2ee; }
  .major-arrow { font-size: 10px; color: #aaa; transition: transform 0.2s; flex-shrink: 0; }
  .major-arrow.open { transform: rotate(90deg); }
  .major-name { font-size: 13px; font-weight: 600; color: #333; flex: 1; }
  .major-count { font-size: 11px; color: #999; }
  .major-count.has-pending { color: #BA7517; }
  .major-body { display: none; }
  .major-body.open { display: block; }

  function formatDate(dStr) {
    if (!dStr) return '';
    const [y,m,d] = dStr.split('-');
    return `${y}.${m}.${d}`;

  function daysBetween(dateStr1, dateStr2) {
    const d1 = new Date(dateStr1 + 'T00:00:00');
    const d2 = new Date(dateStr2 + 'T00:00:00');
    return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  }

  // ===== 문의 게시판 =====
  const QNA_PAGE_SIZE_T = 5;
  let qnaPageT = 1;
  let qnaTotalCountT = 0;

  async function loadTeacherQnA(page = 1) {
    qnaPageT = page;
    const container = document.getElementById('teacher-qna-list');
    const pagEl = document.getElementById('teacher-qna-pagination');
    if (!container) return;
    container.innerHTML = '<div class="empty">불러오는 중...</div>';
    try {
      const offset = (page - 1) * QNA_PAGE_SIZE_T;

      // 전체 개수
      const countRes = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=id`, { headers: sbHeaders({ 'Prefer': 'count=exact' }) });
      const cr = countRes.headers.get('content-range');
      qnaTotalCountT = cr ? parseInt(cr.split('/')[1]) : 0;

      // 현재 페이지 데이터
      const res = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=*&order=created_at.desc&limit=${QNA_PAGE_SIZE_T}&offset=${offset}`, { headers: sbHeaders() });
      const list = await res.json();

      // 학생 이름 조회
      let studentMap = {};
      if (Array.isArray(list) && list.length) {
        const ids = [...new Set(list.filter(q => q.student_id).map(q => q.student_id))];
        if (ids.length) {
          const sRes = await fetch(`${SUPABASE_URL}/rest/v1/students?id=in.(${ids.join(',')})&select=id,name`, { headers: sbHeaders() });
          const sData = await sRes.json();
          sData.forEach(s => studentMap[s.id] = s.name);
        }
      }

      if (!Array.isArray(list) || !list.length) {
        container.innerHTML = '<div class="empty">아직 질문이 없어요</div>';
        if (pagEl) pagEl.innerHTML = '';
        return;
      }

      container.innerHTML = list.map(q => {
        const date = new Date(q.created_at).toLocaleDateString('ko-KR');
        const studentName = studentMap[q.student_id] || '알 수 없음';
        return `
          <div style="background:#fafafa;border-radius:14px;padding:1.2rem;border:1px solid #eee;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;">
              <span style="font-size:14px;font-weight:700;">${q.title}</span>
              <span style="font-size:11px;color:#aaa;white-space:nowrap;">${studentName} · ${date}</span>
            </div>
            ${q.content ? `<div style="font-size:13px;color:#555;margin-bottom:10px;">${q.content}</div>` : ''}
            ${q.answer ? `
              <div style="background:#F0F8F5;border-radius:10px;padding:10px 12px;border-left:3px solid #0F6E56;margin-bottom:10px;">
                <div style="font-size:11px;font-weight:700;color:#0F6E56;margin-bottom:4px;">✅ 내 답변</div>
                <div style="font-size:13px;">${q.answer}</div>
              </div>
            ` : ''}
            <div style="display:flex;gap:8px;margin-top:8px;">
              <input type="text" id="answer-input-${q.id}" placeholder="${q.answer ? '답변 수정...' : '답변 입력...'}" value="${q.answer || ''}" style="flex:1;padding:9px 12px;border-radius:10px;border:1px solid #ddd;font-size:13px;outline:none;" />
              <button onclick="submitAnswer('${q.id}')" style="padding:9px 16px;border-radius:10px;border:none;background:#0F6E56;color:white;font-size:13px;font-weight:600;cursor:pointer;">등록</button>
            </div>
          </div>`;
      }).join('');

      // 페이지네이션
      if (pagEl) {
        const totalPages = Math.ceil(qnaTotalCountT / QNA_PAGE_SIZE_T);
        if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
        let btns = `<button class="page-btn ${page===1?'disabled':''}" onclick="loadTeacherQnA(${page-1})">‹</button>`;
        for (let p = 1; p <= totalPages; p++) {
          btns += `<button class="page-btn ${p===page?'active':''}" onclick="loadTeacherQnA(${p})">${p}</button>`;
        }
        btns += `<button class="page-btn ${page===totalPages?'disabled':''}" onclick="loadTeacherQnA(${page+1})">›</button>`;
        pagEl.innerHTML = btns;
      }
    } catch(e) { container.innerHTML = '<div class="empty">불러오기 실패</div>'; }
  }

  async function submitAnswer(qId) {
    const input = document.getElementById(`answer-input-${qId}`);
    const answer = input.value.trim();
    if (!answer) { alert('답변을 입력해주세요!'); return; }
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/questions?id=eq.${qId}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Prefer': 'return=minimal' }),
        body: JSON.stringify({ answer })
      });
      alert('답변이 등록됐어요! 😊');
      loadTeacherQnA();
    } catch { alert('등록 실패했어요 ㅠㅠ'); }
  }

  async function addStudent() {
    const name = document.getElementById('new-name').value.trim();
    const school = document.getElementById('new-school').value.trim();
    const grade = document.getElementById('new-grade').value.trim();
    const password = document.getElementById('new-password').value.trim();
    if (!name) { alert('이름을 입력해주세요'); return; }

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({ name, school, grade, password })
      });
      const created = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(created));

      document.getElementById('new-name').value = '';
      document.getElementById('new-school').value = '';
      document.getElementById('new-grade').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('add-form').classList.remove('show');

      await loadStudentsFromDB();
      if (created && created[0]) currentId = created[0].id;
      renderSelect();
      await renderBoard();
    } catch (err) {
      console.error(err);
      alert('학생 추가에 실패했어요. 콘솔을 확인해주세요.');
    }
  }

    const stu = getCurrentStudent();

    if (!confirm(`'${stu.name}' 학생의 모든 오답노트를 삭제할까요? (되돌릴 수 없어요)`)) return;

    try {
      await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${stu.id}`, {
        method: 'DELETE',
        headers: sbHeaders()
      });
      await loadStudentsFromDB();
      currentId = students.length > 0 ? students[0].id : null;
      renderSelect();
      await renderBoard();

      console.error(err);
      alert('삭제에 실패했어요.');

    const stu = getCurrentStudent();
    if (!stu) { alert('먼저 학생을 선택해주세요.'); return; }

    const newPw = prompt(`'${stu.name}' 학생의 새 비밀번호를 입력하세요.\n(현재 비밀번호: ${stu.password || '없음'})`, stu.password || '');

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${stu.id}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ password: newPw.trim() })

      await loadStudentsFromDB();

  function compressImage(file, maxSize = 1100, quality = 0.75) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
          else if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('이미지 압축 실패'));
          }, 'image/jpeg', quality);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadSolutionImage(file, entryId) {
    const compressedBlob = await compressImage(file);
    const fileName = `solution_${entryId}_${Date.now()}.jpg`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${fileName}`, {
      method: 'POST',
      headers: sbHeaders({ 'Content-Type': 'image/jpeg' }),
      body: compressedBlob
    });
    if (!uploadRes.ok) {
      const errText = await uploadRes.text();
      throw new Error('모범풀이 업로드 실패: ' + errText);
    }
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${fileName}`;
  }

  async function saveClassify(entryId) {
    const subject = document.getElementById(`classify-subject-${entryId}`).value;
    const major = document.getElementById(`classify-major-${entryId}`).value;
    const minor = document.getElementById(`classify-minor-${entryId}`).value;
    const memo = document.getElementById(`classify-memo-${entryId}`).value.trim();
    const reasonBtn = document.querySelector(`#classify-reasons-${entryId} .reason-tag-btn-mini.selected`);
    const reason = reasonBtn ? reasonBtn.dataset.reason : '';

    const saveBtn = document.querySelector(`button[onclick="saveClassify('${entryId}')"]`);
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }

    try {
      const updateBody = {
        subject: subject || null,
        major_unit: major || null,
        minor_unit: minor || null,
        memo: memo,
        reason: reason || null
      };

      // 모범풀이 사진이 새로 선택되어 있으면 업로드 후 URL도 같이 저장
      if (pendingSolutionFiles[entryId]) {
        const solutionUrl = await uploadSolutionImage(pendingSolutionFiles[entryId], entryId);
        updateBody.image_solution_url = solutionUrl;
        delete pendingSolutionFiles[entryId];
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?id=eq.${entryId}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify(updateBody)
      });
      if (!res.ok) throw new Error(await res.text());

      classifyOpenIds.delete(entryId);
      await refreshCurrentEntries();
    } catch (err) {
      console.error(err);
      alert('분류 저장에 실패했어요. (모범풀이 사진 업로드 중일 수 있어요, 잠시 후 다시 시도해주세요)');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장하기'; }
    }
  }

  async function loadCurrentPage() {
    if (!currentId) return;

    let filterQ = `student_id=eq.${currentId}`;
    if (currentFilter === 'pending')    filterQ += `&solved=eq.false`;
    if (currentFilter === 'solved')     filterQ += `&solved=eq.true`;
    if (currentFilter === 'struggling') filterQ += `&retry_count=gte.${STRUGGLE_THRESHOLD}`;
    if (currentFilter === 'unsorted')   filterQ += `&subject=is.null`;
    if (currentFilter === 'reviewing')  filterQ += `&review_status=in.(pending,rejected)`;
    if (unitSearchKeywordT) filterQ += `&or=(subject.ilike.*${unitSearchKeywordT}*,major_unit.ilike.*${unitSearchKeywordT}*,minor_unit.ilike.*${unitSearchKeywordT}*)`;

    if (currentFilter === 'byUnit') {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/wrong_notes?${filterQ}&select=*&order=subject.asc,major_unit.asc,created_at.desc`,
        { headers: sbHeaders() }
      );
      currentEntries = await res.json();
      totalCountT = currentEntries.length;
      renderNoteList();
      return;
    }

    const offset = (currentPageT - 1) * PAGE_SIZE_T;
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/wrong_notes?${filterQ}&select=*&order=created_at.desc&limit=${PAGE_SIZE_T}&offset=${offset}`,
        { headers: sbHeaders({ 'Prefer': 'count=exact' }) }
      );
      const cr = res.headers.get('content-range');
      totalCountT = cr ? parseInt(cr.split('/')[1]) : 0;
      currentEntries = await res.json();
      renderNoteList();
    } catch { totalCountT = 0; currentEntries = []; renderNoteList(); }
  }

  // ===== 점수판 연동 =====
  function grantScoreboardPoint(stu) {
    try {
      const raw = localStorage.getItem('quest_students');
      if (!raw) return;
      let qStudents = JSON.parse(raw);
      const match = qStudents.find(q => q.name === stu.name);
      if (!match) return;

      const prevEarned = match.earnedTotal || 0;
      match.score = (match.score || 0) + SCOREBOARD_POINT_PER_SOLVE;
      match.earnedTotal = prevEarned + SCOREBOARD_POINT_PER_SOLVE;

      const prevTickets = Math.floor(prevEarned / 20);
      const newTickets = Math.floor(match.earnedTotal / 20);
      const gained = newTickets - prevTickets;
      if (gained > 0) {
        match.tickets = (match.tickets || 0) + gained;
      }

      match.logs = match.logs || [];
      match.logIdCounter = (match.logIdCounter || 0) + 1;
      match.logs.push({
        id: match.logIdCounter,
        label: '오답노트 다시풀기 완료',
        delta: SCOREBOARD_POINT_PER_SOLVE,
        date: todayStr(),
        time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }),
        type: 'add'
      });

      localStorage.setItem('quest_students', JSON.stringify(qStudents));
      if (gained > 0) {
        setTimeout(() => alert(`🎟️ ${stu.name} 학생이 점수판에서 뽑기권 ${gained}장을 획득했어요!`), 100);
      }
    } catch (err) {
      console.log('점수판 연동 스킵:', err);
    }
  }

  // ===== 약점 TOP3 =====
  function renderWeakness() {
    const container = document.getElementById('weakness-list');

    if (withRetry.length === 0) {
      container.innerHTML = '<p class="weakness-empty">아직 틀린 횟수 데이터가 없어요 🎉</p>';
      return;
    }

    const counts = {};
    withRetry.forEach(e => {
      const key = [e.subject, e.major_unit, e.minor_unit].filter(Boolean).join(' > ');
      counts[key] = (counts[key] || 0) + (e.retry_count || 0);
    });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const medals = ['🥇', '🥈', '🥉'];

    container.innerHTML = sorted.map((item, i) =>
      `<div class="weakness-item">
        <span><span class="weakness-rank">${medals[i]}</span>${item[0]}</span>
        <span class="weakness-count">총 ${item[1]}회 틀림</span>
      </div>`
    ).join('');
  }

  // ===== 망각곡선 복습 알림 =====
  function renderReviewAlert() {
    const alertBox = document.getElementById('review-alert');
    const listEl = document.getElementById('review-alert-list');
    const today = todayStr();
    const targets = [1, 3, 7];

    const due = [];
    currentEntries.forEach(e => {
      if (e.solved) return;
      const elapsed = daysBetween(e.entry_date, today);
      if (targets.includes(elapsed)) due.push({ entry: e, elapsed });
    });

    if (due.length === 0) {
      alertBox.classList.remove('show');
      listEl.innerHTML = '';
      return;
    }

    alertBox.classList.add('show');
    listEl.innerHTML = due.slice(0, 6).map(d => {
      const tagClass = d.elapsed === 1 ? 'd1' : (d.elapsed === 3 ? 'd3' : 'd7');
      const label = d.elapsed === 1 ? '1일 전' : (d.elapsed === 3 ? '3일 전' : '7일 전');
      const unitLabel = [d.entry.subject, d.entry.major_unit].filter(Boolean).join(' · ') || '미분류';
      return `<div class="review-alert-item">
        <span>${unitLabel}${d.entry.memo ? ' — ' + d.entry.memo : ''}</span>
        <span class="review-tag ${tagClass}">${label}</span>
      </div>`;
    }).join('');
  }

  // ===== 히트맵 =====
  function renderHeatmap() {
    const grid = document.getElementById('heatmap-grid');
    const counts = {};
    currentEntries.forEach(e => {
      if (!e.entry_date) return;
      counts[e.entry_date] = (counts[e.entry_date] || 0) + 1;
    });

    const today = new Date();
    today.setHours(0,0,0,0);
    const days = [];
    for (let i = 48; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      days.push(ds);
    }

    function levelOf(c) {
      if (!c) return '';
      if (c === 1) return 'l1';
      if (c === 2) return 'l2';
      if (c <= 4) return 'l3';
      return 'l4';
    }

    grid.innerHTML = days.map(ds => {
      const c = counts[ds] || 0;
      const lvl = levelOf(c);
      const [y,m,d] = ds.split('-');
      return `<div class="heatmap-cell ${lvl}" title="${y}.${m}.${d} — 오답 ${c}개"></div>`;
    }).join('');
  }

      alert('미해결 오답이 없어요! 모두 복습 완료했네요 🎉');
      return;

    reviewIndex = 0;
    document.getElementById('review-modal-overlay').classList.add('show');

  function renderStudentDetails() {
    const total = allEntryStats.length;
    const solved = allEntryStats.filter(e => e.solved).length;
    const unsorted = allEntryStats.filter(e => !e.subject).length;
    const reviewing = allEntryStats.filter(e => {
      const rs = e.review_status || (e.solved ? 'approved' : 'pending');
      return rs === 'pending' || rs === 'rejected';
    }).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-solved').textContent = solved;
    document.getElementById('stat-pending').textContent = reviewing;

    // 진행률 바
    const pct = total > 0 ? Math.round((solved / total) * 100) : 0;
    const pctEl = document.getElementById('progress-pct-t');
    const fillEl = document.getElementById('progress-fill-t');
    if (pctEl) pctEl.textContent = pct + '%';
    if (fillEl) fillEl.style.width = pct + '%';

    const unsortedAlert = document.getElementById('unsorted-alert');
    if (unsorted > 0) {
      unsortedAlert.classList.add('show');
      document.getElementById('unsorted-title').textContent = `⚠️ 분류 대기 중인 오답이 ${unsorted}개 있어요`;
    } else {
      unsortedAlert.classList.remove('show');
    }

    const reviewingAlert = document.getElementById('reviewing-alert');
    if (reviewing > 0) {
      reviewingAlert.classList.add('show');
      document.getElementById('reviewing-title').textContent = `⏳ 검수 대기 중인 오답이 ${reviewing}개 있어요`;
    } else {
      reviewingAlert.classList.remove('show');
    }

    renderWeakness();
    renderReviewAlert();
    renderHeatmap();

    renderNoteList();

  function renderNoteList() {
    const container = document.getElementById('note-list');
    const pag = document.getElementById('pagination');
    const info = document.getElementById('page-info');
    const list = currentEntries;

    // 대단원별 뷰
    if (currentFilter === 'byUnit') {
      if (!list.length) {
        container.innerHTML = '<div class="empty">표시할 오답이 없어요</div>';
        if (pag) pag.innerHTML = '';
        if (info) info.textContent = '';
        return;
      }
      const groups = {};
      list.forEach(e => {
        const key = [e.subject, e.major_unit].filter(Boolean).join(' > ') || '미분류';
        if (!groups[key]) groups[key] = [];
        groups[key].push(e);
      });
      container.innerHTML = Object.entries(groups).map(([unit, entries]) => `
        <div style="margin-bottom:16px;">
          <div style="font-size:13px;font-weight:700;color:#0F6E56;padding:8px 12px;background:#F0F8F5;border-radius:10px;margin-bottom:8px;">
            📚 ${unit} <span style="font-size:12px;color:#888;font-weight:400;">(${entries.length}개)</span>
          </div>
          ${entries.map(noteCardHtml).join('')}
        </div>
      `).join('');
      if (pag) pag.innerHTML = '';
      if (info) info.textContent = '';
      return;
    }

    if (currentFilter === 'unsorted' || currentFilter === 'reviewing') {
      // 미분류/검수대기는 폴더 없이 그냥 리스트로
      if (list.length === 0) {
        container.innerHTML = `<div class="empty">${currentFilter === 'unsorted' ? '미분류 오답이 없어요 🎉' : '검수 대기 중인 오답이 없어요 🎉'}</div>`;
      } else {
        container.innerHTML = [...list].sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('');
      }
      return;
    }

    if (list.length === 0) {
      container.innerHTML = '<div class="empty">표시할 오답이 없어요</div>';
      return;
    }

    // 분류 안 된 항목과 분류된 항목 분리
    const sortedList = list.filter(e => e.subject);
    const unsortedList = list.filter(e => !e.subject);

    const bySubject = {};
    sortedList.forEach(e => {
      const subj = e.subject || '기타';
      if (!bySubject[subj]) bySubject[subj] = [];
      bySubject[subj].push(e);
    });

    const subjectOrder = Object.keys(CURRICULUM).concat(['기타']);
    const subjectKeys = Object.keys(bySubject).sort((a, b) => subjectOrder.indexOf(a) - subjectOrder.indexOf(b));

    let html = '';

    // 미분류 항목 우선 표시 (폴더 밖에, 눈에 띄게)
    if (unsortedList.length > 0) {
      html += unsortedList.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('');
    }

    html += subjectKeys.map(subj => {
      const subjEntries = bySubject[subj];
      const subjPending = subjEntries.filter(e => !e.solved).length;
      const subjKey = 'subj_' + subj;
      const subjOpen = !!openGroups[subjKey];
      const majorMap = CURRICULUM[subj] || {};
      const majorOrder = Object.keys(majorMap);

      const byMajor = {};
      const noMajor = [];
      subjEntries.forEach(e => {
        if (e.major_unit) {
          if (!byMajor[e.major_unit]) byMajor[e.major_unit] = [];
          byMajor[e.major_unit].push(e);
        } else {
          noMajor.push(e);
        }
      });

      const majorKeys = Object.keys(byMajor).sort((a, b) => majorOrder.indexOf(a) - majorOrder.indexOf(b));

      const majorGroupsHtml = majorKeys.map(major => {
        const majorEntries = byMajor[major];
        const majorPending = majorEntries.filter(e => !e.solved).length;
        const mKey = subjKey + '__major_' + major;
        const mOpen = !!openGroups[mKey];
        const minorOrder = majorMap[major] || [];

        const byMinor = {};
        const noMinor = [];
        majorEntries.forEach(e => {
          if (e.minor_unit) {
            if (!byMinor[e.minor_unit]) byMinor[e.minor_unit] = [];
            byMinor[e.minor_unit].push(e);
          } else {
            noMinor.push(e);
          }
        });

        const minorKeys = Object.keys(byMinor).sort((a, b) => minorOrder.indexOf(a) - minorOrder.indexOf(b));

        const minorGroupsHtml = minorKeys.map(minor => {
          const minorEntries = byMinor[minor];
          const minorPending = minorEntries.filter(e => !e.solved).length;
          const miKey = mKey + '__minor_' + minor;
          const miOpen = !!openGroups[miKey];
          return `
            <div class="minor-group">
              <div class="minor-header" onclick="toggleGroup('${miKey}')">
                <span class="minor-arrow ${miOpen ? 'open' : ''}">▶</span>
                <span class="minor-name">${minor}</span>
                <span class="minor-count ${minorPending > 0 ? 'has-pending' : ''}">${minorEntries.length}개${minorPending > 0 ? ' · 미해결 ' + minorPending : ''}</span>
              </div>
              <div class="minor-body ${miOpen ? 'open' : ''}">
                ${minorEntries.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
              </div>
            </div>`;
        }).join('');

        const noMinorHtml = noMinor.length > 0 ? (() => {
          const miKey = mKey + '__nominor';
          const miOpen = !!openGroups[miKey];
          const pc = noMinor.filter(e => !e.solved).length;
          return `
            <div class="minor-group">
              <div class="minor-header" onclick="toggleGroup('${miKey}')">
                <span class="minor-arrow ${miOpen ? 'open' : ''}">▶</span>
                <span class="minor-name">중단원 미지정</span>
                <span class="minor-count ${pc > 0 ? 'has-pending' : ''}">${noMinor.length}개</span>
              </div>
              <div class="minor-body ${miOpen ? 'open' : ''}">
                ${noMinor.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
              </div>
            </div>`;
        })() : '';

        return `
          <div class="major-group">
            <div class="major-header" onclick="toggleGroup('${mKey}')">
              <span class="major-arrow ${mOpen ? 'open' : ''}">▶</span>
              <span class="major-name">${major}</span>
              <span class="major-count ${majorPending > 0 ? 'has-pending' : ''}">${majorEntries.length}개${majorPending > 0 ? ' · 미해결 ' + majorPending : ''}</span>
            </div>
            <div class="major-body ${mOpen ? 'open' : ''}">
              ${minorGroupsHtml}${noMinorHtml}
            </div>
          </div>`;
      }).join('');

      const noMajorHtml = noMajor.length > 0 ? (() => {
        const mKey = subjKey + '__nomajor';
        const mOpen = !!openGroups[mKey];
        const pc = noMajor.filter(e => !e.solved).length;
        return `
          <div class="major-group">
            <div class="major-header" onclick="toggleGroup('${mKey}')">
              <span class="major-arrow ${mOpen ? 'open' : ''}">▶</span>
              <span class="major-name">대단원 미지정</span>
              <span class="major-count ${pc > 0 ? 'has-pending' : ''}">${noMajor.length}개</span>
            </div>
            <div class="major-body ${mOpen ? 'open' : ''}">
              ${noMajor.sort((a,b) => (b.entry_date||'').localeCompare(a.entry_date||'')).map(noteCardHtml).join('')}
            </div>
          </div>`;
      })() : '';

      return `
        <div class="subject-group">
          <div class="subject-header" onclick="toggleGroup('${subjKey}')">
            <span class="subject-arrow ${subjOpen ? 'open' : ''}">▶</span>
            <span class="subject-folder-icon">📁</span>
            <span class="subject-name">${subj}</span>
            <span class="subject-count ${subjPending > 0 ? 'has-pending' : ''}">${subjEntries.length}개${subjPending > 0 ? ' · 미해결 ' + subjPending : ''}</span>
          </div>
          <div class="subject-body ${subjOpen ? 'open' : ''}">
            ${majorGroupsHtml}${noMajorHtml}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = html;
    renderPaginationT();
  }

  function renderPaginationT() {
    const pag = document.getElementById('pagination');
    const info = document.getElementById('page-info');
    if (!pag) return;
    const totalPages = Math.ceil(totalCountT / PAGE_SIZE_T);
    if (totalPages <= 1) { pag.innerHTML = ''; if(info) info.textContent = ''; return; }
    if (info) info.textContent = `전체 ${totalCountT}개 중 ${(currentPageT-1)*PAGE_SIZE_T+1}–${Math.min(currentPageT*PAGE_SIZE_T, totalCountT)}번째`;
    const start = Math.max(1, currentPageT - 2);
    const end = Math.min(totalPages, start + 4);
    let btns = `<button class="page-btn ${currentPageT===1?'disabled':''}" onclick="goPageT(${currentPageT-1})">‹</button>`;
    if (start > 1) btns += `<button class="page-btn" onclick="goPageT(1)">1</button>${start>2?'<span style="padding:0 2px;color:#ccc">…</span>':''}`;
    for (let p = start; p <= end; p++) btns += `<button class="page-btn ${p===currentPageT?'active':''}" onclick="goPageT(${p})">${p}</button>`;
    if (end < totalPages) btns += `${end<totalPages-1?'<span style="padding:0 2px;color:#ccc">…</span>':''}<button class="page-btn" onclick="goPageT(${totalPages})">${totalPages}</button>`;
    btns += `<button class="page-btn ${currentPageT===totalPages?'disabled':''}" onclick="goPageT(${currentPageT+1})">›</button>`;
    pag.innerHTML = btns;
  }

  async function goPageT(p) {
    const totalPages = Math.ceil(totalCountT / PAGE_SIZE_T);
    if (p < 1 || p > totalPages) return;
    currentPageT = p;
    await loadCurrentPage();
    document.getElementById('note-list')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ===== 월별 순위표 =====
  let lbYear, lbMonth;
  function initLbMonth() {
    const d = new Date();
    lbYear = d.getFullYear();
    lbMonth = d.getMonth() + 1;
    const label = document.getElementById('lb-month-label');
    if (label) label.textContent = `${lbYear}년 ${lbMonth}월`;
  }
  initLbMonth();

  function changeMonth(delta) {
    lbMonth += delta;
    if (lbMonth > 12) { lbMonth = 1; lbYear++; }
    if (lbMonth < 1) { lbMonth = 12; lbYear--; }
    loadLeaderboard();
  }

  function getMonthStr() {
    return `${lbYear}-${String(lbMonth).padStart(2, '0')}`;
  }

  async function loadLeaderboard() {
    const monthStr = getMonthStr();
    document.getElementById('lb-month-label').textContent = `${lbYear}년 ${lbMonth}월`;

    try {
      // 해당 월의 모든 오답 데이터 가져오기
      const nextMonth = lbMonth === 12 ? 1 : lbMonth + 1;
      const nextYear = lbMonth === 12 ? lbYear + 1 : lbYear;
      const dateFrom = `${monthStr}-01`;
      const dateTo = `${nextYear}-${String(nextMonth).padStart(2, '0')}-01`;

      // entry_date 기준 + created_at 기준 둘 다 가져오기
      const [notesRes1, notesRes2] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?select=student_id,entry_date,review_status,solved,created_at&entry_date=gte.${dateFrom}&entry_date=lt.${dateTo}`, { headers: sbHeaders() }),
        fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?select=student_id,entry_date,review_status,solved,created_at&entry_date=is.null&created_at=gte.${dateFrom}T00:00:00&created_at=lt.${dateTo}T00:00:00`, { headers: sbHeaders() })
      ]);
      const notes1 = await notesRes1.json();
      const notes2 = await notesRes2.json();
      const notes = [...(Array.isArray(notes1) ? notes1 : []), ...(Array.isArray(notes2) ? notes2 : [])];

      // 해당 월의 보너스 포인트
      const bonusRes = await fetch(`${SUPABASE_URL}/rest/v1/bonus_points?select=student_id,points&month=eq.${monthStr}`, {
        headers: sbHeaders()
      });
      let bonuses = [];
      try { bonuses = await bonusRes.json(); } catch(e) { bonuses = []; }

      // 학생별 점수 계산
      const scores = {};
      students.forEach(s => {
        scores[s.id] = { name: s.name, uploads: 0, approved: 0, bonus: 0, total: 0 };
      });

      notes.forEach(n => {
        if (!scores[n.student_id]) return;
        scores[n.student_id].uploads += 1; // 올리기 1점
        if (n.review_status === 'approved' || (n.solved && !n.review_status)) {
          scores[n.student_id].approved += 5; // OK 받으면 5점
        }
      });

      if (Array.isArray(bonuses)) {
        bonuses.forEach(b => {
          if (!scores[b.student_id]) return;
          scores[b.student_id].bonus += b.points;
        });
      }

      // 총점 계산 & 정렬
      const ranked = Object.values(scores).map(s => {
        s.total = s.uploads + s.approved + s.bonus;
        return s;
      }).sort((a, b) => b.total - a.total);

      const medals = ['🥇', '🥈', '🥉'];
      const tbody = document.getElementById('lb-body');

      if (ranked.length === 0 || ranked.every(r => r.total === 0)) {
        tbody.innerHTML = `<tr><td colspan="6" class="lb-empty">이번 달 데이터가 아직 없어요</td></tr>`;
        return;
      }

      tbody.innerHTML = ranked.map((r, i) => `
        <tr>
          <td class="lb-rank">${i < 3 ? `<span class="lb-medal">${medals[i]}</span>` : (i + 1)}</td>
          <td class="lb-name">${r.name}</td>
          <td class="lb-detail">${r.uploads}점</td>
          <td class="lb-detail">${r.approved}점</td>
          <td class="lb-detail">${r.bonus > 0 ? '+' + r.bonus : '-'}</td>
          <td class="lb-score">${r.total}점</td>
        </tr>
      `).join('');

    } catch (err) {
      console.error('순위표 로드 실패:', err);
    }
  }

  function populateBonusSelect() {
    const sel = document.getElementById('bonus-student-select');
    sel.innerHTML = '<option value="">학생 선택</option>' +
      students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }

  async function giveBonus() {
    const studentId = document.getElementById('bonus-student-select').value;
    const points = parseInt(document.getElementById('bonus-points').value);
    const memo = document.getElementById('bonus-memo').value.trim();

    if (!studentId) { alert('학생을 선택해주세요.'); return; }
    if (!points || points <= 0) { alert('점수를 입력해주세요.'); return; }

    const monthStr = getMonthStr();
    const studentName = students.find(s => s.id === studentId)?.name || '';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/bonus_points`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({
          student_id: studentId,
          points: points,
          memo: memo || null,
          month: monthStr
        })
      });
      if (!res.ok) throw new Error(await res.text());

      alert(`✅ ${studentName}에게 보너스 ${points}점 지급 완료!`);
      document.getElementById('bonus-points').value = '';
      document.getElementById('bonus-memo').value = '';
      loadLeaderboard();
    } catch (err) {
      console.error(err);
      alert('보너스 지급에 실패했어요.');
    }
  }

  // ===== 학생 업로드 페이지 링크 표시 =====
  function switchMainTab(tab) {
    document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mainTab === tab));
    document.querySelectorAll('.main-tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('main-tab-' + tab).classList.add('active');
    if (tab === 'qna') loadTeacherQnA(1);
    if (tab === 'rank') loadLeaderboard();
  }

  // 뒤로가기 버튼 막기
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });

  // ===== 초기 실행 =====
  checkLoginOnLoad();

  // PWA 서비스워커 등록
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
