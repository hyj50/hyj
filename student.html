<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오답 너 뒤졌다</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#E8639A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오답 너 뒤졌다">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  /* 스플래시 */
  #splash-screen {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: #E8639A;
    z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    overflow: hidden;
    pointer-events: none !important;
    animation: splashFadeOut 0.6s ease 3.5s forwards;
  }
  #splash-screen * { pointer-events: none !important; }
  @keyframes splashFadeOut {
    to { opacity:0; visibility:hidden; }
  }
  #splash-screen.done { display: none; }

  .splash-bg {
    position: absolute; top:0; left:0; right:0; bottom:0;
    background-image: url('/splash.jpg');
    background-size: contain;
    background-position: center center;
    background-repeat: no-repeat;
    background-color: white;
    animation: splashZoom 3.5s ease forwards;
  }
  @keyframes splashZoom {
    from { transform: scale(1.05); opacity:0; }
    10%  { opacity:1; }
    to   { transform: scale(1); opacity:1; }
  }
  .splash-overlay {
    position: absolute; bottom:0; left:0; right:0; height:50%;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
  }
  .splash-text {
    position: relative; z-index: 2;
    text-align: center; padding-bottom: 60px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .splash-title {
    color: white; font-size: 26px; font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.6);
    opacity: 0;
    animation: splashTextIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 1s both;
  }
  .splash-sub {
    color: rgba(255,255,255,0.8); font-size: 13px; letter-spacing: 2px;
    opacity: 0;
    animation: splashTextIn 0.6s ease 1.8s both;
  }
  @keyframes splashTextIn {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .splash-bar-wrap {
    position: relative; z-index: 2;
    padding-bottom: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    opacity: 0;
    animation: splashTextIn 0.5s ease 2.4s both;
  }
  .splash-bar-bg { width: 80px; height: 3px; background: rgba(255,255,255,0.25); border-radius: 3px; overflow: hidden; }
  .splash-bar-fill { height: 100%; background: rgba(255,255,255,0.85); border-radius: 3px; width: 0; animation: splashFill 1.2s ease 2.5s forwards; }
  @keyframes splashFill { to { width: 100%; } }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f5f5f0;
    --bg2: #ffffff;
    --bg3: #fafafa;
    --bg4: #f8f8f5;
    --border: #eee;
    --border2: #ddd;
    --text1: #1a1a1a;
    --text2: #555;
    --text3: #888;
    --text4: #aaa;
    --tab-bg: #f0f0eb;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    --green: #E8639A;
    --green-light: #FDE8F2;
    --green-text: #C94080;
    --page-btn-bg: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --bg2: #1c1c1e;
      --bg3: #2c2c2e;
      --bg4: #242426;
      --border: #3a3a3c;
      --border2: #48484a;
      --text1: #f2f2f7;
      --text2: #ebebf5cc;
      --text3: #ebebf599;
      --text4: #ebebf560;
      --tab-bg: #2c2c2e;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.4);
      --green: #FF6EB0;
      --green-light: #3a1a2a;
      --green-text: #FF6EB0;
      --page-btn-bg: #2c2c2e;
    }
  }

  html, body { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text1); }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 1rem; }
  /* 바텀 네비게이션 */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .bottom-nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; border: none; background: none;
    cursor: pointer; padding: 4px 0;
    color: var(--text4); font-size: 10px; font-weight: 600;
    transition: color 0.15s;
  }
  .bottom-nav-btn .nav-icon { font-size: 22px; line-height: 1; }
  .bottom-nav-btn.active { color: var(--green); }
  .bottom-nav-btn.active .nav-icon { transform: scale(1.1); }

  /* 바텀 네비게이션 공간 확보 */
  .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

  .board {
    background: var(--bg2);
    border-radius: 20px;
    padding: 1.4rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin-bottom: 12px;
  }
  h1 { font-size: 19px; font-weight: 600; text-align: center; margin-bottom: 4px; color: var(--text1); }
  .sub { font-size: 12.5px; color: var(--text3); text-align: center; margin-bottom: 1.2rem; }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-group select, .form-group input { width: 100%; padding: 12px 14px; font-size: 16px; border-radius: 10px; border: 1px solid var(--border2); outline: none; background: var(--bg2); color: var(--text1); }
  .form-group select:focus, .form-group input:focus { border-color: var(--green); }

  .tab-panel { display: none; }
  .tab-panel.active {
    display: block;
    animation: fadeSlideIn 0.25s ease both;
  }

  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .upload-mini-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; text-align: center; }
  .upload-zone { border: 2px dashed var(--border2); border-radius: 14px; padding: 1.4rem 0.6rem; text-align: center; cursor: pointer; background: var(--bg3); transition: border-color 0.15s; }
  .upload-zone:active { border-color: var(--green); }
  .upload-zone.has-image { padding: 0; border-style: solid; overflow: hidden; }
  .upload-zone img { width: 100%; height: 140px; object-fit: cover; display: block; background: var(--bg4); }
  .upload-text { color: var(--text4); font-size: 12px; }
  .upload-icon { font-size: 26px; margin-bottom: 4px; }
  .file-input-hidden { display: none; }

  .btn-submit { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--green); color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-submit:active { opacity: 0.85; }
  .btn-submit:disabled { background: var(--border2); cursor: not-allowed; }

  .status-msg { text-align: center; padding: 13px; border-radius: 10px; font-size: 13.5px; margin-top: 12px; display: none; }
  .status-msg.show { display: block; }
  .status-msg.success { background: var(--green-light); color: var(--green-text); }
  .status-msg.error { background: #FAECE7; color: #993C1D; }
  .status-msg.loading { background: var(--bg4); color: var(--text3); }

  /* 통계 대시보드 */
  .dashboard {
    background: linear-gradient(135deg, #E8639A, #C94080);
    border-radius: 20px;
    padding: 1.4rem;
    margin-bottom: 14px;
    color: white;
    box-shadow: 0 6px 24px rgba(232,99,154,0.35);
  }
  .dashboard-title {
    font-size: 12px;
    font-weight: 600;
    opacity: 0.8;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .note-stats { display: flex; gap: 0; margin-bottom: 16px; }
  .note-stat {
    flex: 1;
    text-align: center;
    position: relative;
  }
  .note-stat + .note-stat::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: rgba(255,255,255,0.3);
  }
  .note-stat-num { font-size: 30px; font-weight: 800; color: white; }
  .note-stat-num.green { color: #A8FFD4; }
  .note-stat-num.orange { color: #FFE0A0; }
  .note-stat-label { font-size: 10px; color: rgba(255,255,255,0.75); margin-top: 2px; font-weight: 600; letter-spacing: 0.3px; }

  /* 진행률 바 */
  .progress-wrap { margin-top: 4px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: rgba(255,255,255,0.25); border-radius: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: white; border-radius: 6px; transition: width 0.8s ease; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 12px; border-radius: 18px; border: 1px solid var(--border2); background: var(--bg2); font-size: 12px; cursor: pointer; color: var(--text3); }
  .filter-btn.active { background: var(--text1); color: var(--bg2); border-color: var(--text1); }

  .note-list { display: flex; flex-direction: column; gap: 12px; }
  .note-card {
    background: var(--bg2);
    border-radius: 16px;
    padding: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .note-card:active { transform: scale(0.99); }
  .note-card.solved {
    opacity: 0.55;
    border-left: 4px solid #30d158;
  }
  .note-card.has-solution {
    border-left: 4px solid #0F6E56;
    background: var(--green-light);
  }
  .note-card.rejected-card {
    border-left: 4px solid #FF453A;
  }

  .note-thumbs-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .note-thumb { width: 100%; height: 80px; border-radius: 10px; object-fit: cover; cursor: pointer; background: var(--border); display: block; }
  .note-thumb-label { font-size: 9.5px; color: var(--text4); text-align: center; margin-top: 3px; }
  .note-thumb-col { flex: 1; min-width: 0; }

  .note-meta-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
  .note-unit-tag { font-size: 10.5px; padding: 3px 8px; border-radius: 6px; background: var(--green-light); color: var(--green-text); font-weight: 600; }
  .note-unsorted-tag { font-size: 10.5px; padding: 3px 8px; border-radius: 6px; background: #FFE9DC; color: #B5421F; font-weight: 600; }
  .note-solution-tag { font-size: 10.5px; padding: 3px 8px; border-radius: 6px; background: #FFF3CC; color: #854F0B; font-weight: 700; }
  .note-memo { font-size: 12.5px; color: var(--text2); margin-bottom: 4px; word-break: break-word; }
  .note-date { font-size: 10.5px; color: var(--text4); }

  .note-bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .student-status-badge { font-size: 11px; padding: 3px 9px; border-radius: 6px; font-weight: 700; }
  .student-status-badge.pending { background: #FFF3CC; color: #854F0B; }
  .student-status-badge.approved { background: var(--green-light); color: var(--green-text); }
  .student-status-badge.rejected { background: #FFE0DC; color: #B5421F; }
  .note-retry-badge-s { font-size: 10.5px; padding: 3px 8px; border-radius: 6px; background: #FFE0DC; color: #B5421F; font-weight: 600; }
  .btn-add-mine { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--green); background: var(--bg2); color: var(--green-text); font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-add-mine:active { background: var(--green-light); }
  .uploading-mine { font-size: 11px; color: var(--text3); padding: 6px 0; }
  .check-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .check-label input { width: 17px; height: 17px; accent-color: var(--green); }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text4); font-size: 13.5px; }
  .no-student { text-align: center; padding: 2.5rem 1rem; color: var(--text3); font-size: 13.5px; }

  /* 비밀번호 입력 영역 */
  .pw-area { margin-top: 4px; }
  .pw-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .pw-row input { flex: 1; padding: 12px 14px; font-size: 16px; border-radius: 10px; border: 1px solid var(--border2); outline: none; background: var(--bg2); color: var(--text1); }
  .pw-row input:focus { border-color: var(--green); }
  .btn-pw-confirm { padding: 12px 18px; border-radius: 10px; border: none; background: var(--green); color: white; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-pw-confirm:active { opacity: 0.85; }
  .pw-error { font-size: 12px; color: #993C1D; display: none; margin-top: 2px; }
  .pw-error.show { display: block; }
  .btn-logout-small { font-size: 12px; color: var(--text4); background: none; border: none; cursor: pointer; margin-top: 8px; text-decoration: underline; display: block; }
  .logged-in-label { font-size: 12px; color: var(--green-text); font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }

  /* 페이지네이션 */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 14px; flex-wrap: wrap; }
  .page-btn { min-width: 34px; height: 34px; padding: 0 8px; border-radius: 8px; border: 1px solid var(--border2); background: var(--page-btn-bg); font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .page-btn:active { background: var(--tab-bg); }
  .page-btn.active { background: var(--green); color: white; border-color: var(--green); }
  .page-btn.disabled { color: var(--text4); cursor: default; pointer-events: none; }
  .page-info { font-size: 12px; color: var(--text4); text-align: center; margin-top: 6px; }

  /* 약점 TOP3 */
  .weakness-card-s { background: linear-gradient(135deg, #FFF3F0, #FFE8E0); border: 1px solid #FFD4C2; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 12px; }
  .weakness-title-s { font-size: 13px; font-weight: 700; color: #B5421F; margin-bottom: 8px; }
  .weakness-item-s { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; color: #6B2E16; background: white; padding: 7px 12px; border-radius: 8px; margin-bottom: 5px; }
  .weakness-count-s { font-size: 12px; font-weight: 600; color: #B5421F; }
  .weakness-empty-s { font-size: 12px; color: var(--text4); padding: 4px 0; }

  /* 애니메이션 */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideLeft {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeSlideRight {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .tab-panel.active {
    display: block;
    animation: fadeSlideIn 0.25s ease both;
  }

  .note-card {
    animation: fadeSlideIn 0.2s ease both;
  }

  .note-card:nth-child(1) { animation-delay: 0.00s; }
  .note-card:nth-child(2) { animation-delay: 0.04s; }
  .note-card:nth-child(3) { animation-delay: 0.08s; }
  .note-card:nth-child(4) { animation-delay: 0.12s; }
  .note-card:nth-child(5) { animation-delay: 0.16s; }
  .note-card:nth-child(6) { animation-delay: 0.20s; }
  .note-card:nth-child(7) { animation-delay: 0.24s; }
  .note-card:nth-child(8) { animation-delay: 0.28s; }
  .note-card:nth-child(9) { animation-delay: 0.32s; }
  .note-card:nth-child(10) { animation-delay: 0.36s; }

  /* 대단원별 폴더 */
  .s-subject-group { margin-bottom: 10px; border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
  .s-subject-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg3); cursor: pointer; user-select: none; }
  .s-subject-arrow { font-size: 11px; color: var(--text4); transition: transform 0.2s; flex-shrink: 0; }
  .s-subject-arrow.open { transform: rotate(90deg); }
  .s-subject-name { font-size: 14px; font-weight: 700; color: var(--text1); flex: 1; }
  .s-subject-count { font-size: 12px; color: var(--text3); background: var(--bg2); padding: 2px 9px; border-radius: 10px; border: 1px solid var(--border); }
  .s-subject-body { display: none; padding: 10px; background: var(--bg3); flex-direction: column; gap: 10px; }
  .s-subject-body.open { display: flex; }

  .modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.92); z-index: 99999; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .modal-overlay img { max-width: 100%; max-height: 100vh; object-fit: contain; touch-action: none; user-select: none; transform-origin: center center; }
  .modal-label { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; font-size: 13px; background: rgba(255,255,255,0.15); padding: 5px 14px; border-radius: 20px; white-space: nowrap; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 20px; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; z-index: 1; display: flex; align-items: center; justify-content: center; }
  .modal-zoom-hint { position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 11px; white-space: nowrap; }
</style>
</head>
<body>
<div id="splash-screen">
  <div class="splash-bg"></div>
  <div class="splash-overlay"></div>
  <div class="splash-text">
    <div class="splash-title">오답 너 뒤졌다 💀</div>
    <div class="splash-sub">채움수학학원</div>
  </div>
  <div class="splash-bar-wrap">
    <div class="splash-bar-bg"><div class="splash-bar-fill"></div></div>
  </div>
</div>

<div class="wrap">
  <div class="board">
    <h1><img src="/apple-touch-icon.png" style="width:28px;height:28px;border-radius:7px;vertical-align:middle;margin-right:6px;" onerror="this.style.display='none'" />오답 너 뒤졌다</h1>
    <p class="sub">사진을 올리고, 선생님이 정리해주신 풀이를 확인해보세요</p>

    <!-- 로그인 영역 -->
    <div id="login-area">
      <input type="hidden" id="student-select" value="" />
      <div id="logged-in-label" class="logged-in-label" style="display:none;">
        <span id="logged-in-name"></span>
        <button class="btn-logout-small" onclick="logout()">다른 계정으로 전환</button>
      </div>
      <div id="login-form">
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" id="name-input" placeholder="이름을 입력하세요" maxlength="20" />
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <div class="pw-row">
            <input type="password" id="pw-input" placeholder="비밀번호 입력" maxlength="20" onkeydown="if(event.key==='Enter') confirmPassword()" />
            <button class="btn-pw-confirm" onclick="confirmPassword()">로그인</button>
          </div>
          <div class="pw-error" id="pw-error">이름 또는 비밀번호가 틀렸어요. 선생님께 문의하세요.</div>
        </div>
      </div>
    </div>

    <div id="content-area" style="display:none;">
      <div class="tab-panel active" id="tab-upload">
        <div class="upload-grid">
          <div>
            <p class="upload-mini-label">문제 사진 (필수)</p>
            <div class="upload-zone" id="upload-zone-problem" onclick="showUploadOptions('problem')">
              <div class="upload-text"><div class="upload-icon">📷</div>탭해서 선택</div>
            </div>
            <input type="file" id="file-input-problem" class="file-input-hidden" accept="image/*" onchange="onFileSelect(event,'problem')" />
            <input type="file" id="file-input-problem-cam" class="file-input-hidden" accept="image/*" capture="environment" onchange="onFileSelect(event,'problem')" />
          </div>
          <div>
            <p class="upload-mini-label">내 풀이 (선택)</p>
            <div class="upload-zone" id="upload-zone-mine" onclick="showUploadOptions('mine')">

<script>
  const SUPABASE_URL = 'https://pfaovietojozlrfztwom.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmYW92aWV0b2pvemxyZnp0d29tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzcxMDMsImV4cCI6MjA5NzU1MzEwM30.pO2NzKjwZzQJFmOYloiCHNBg9PdNSQlkiWuMyYicamQ';

  function sbHeaders(extra) {
    return Object.assign({
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json'

  let pendingFiles = { problem: null, mine: null };
  let currentEntries = [];

  let totalCount = 0;

  // ===== 초기화: 자동 로그인 시도 =====
  async function initLogin() {
    const savedId = sessionStorage.getItem('my_student_id');
    const savedName = sessionStorage.getItem('my_student_name');
    if (savedId && savedName) {
      // 세션에 저장된 로그인 정보로 자동 복원
      document.getElementById('student-select').value = savedId;
      document.getElementById('login-form').style.display = 'none';

      document.getElementById('logged-in-name').textContent = `✅ ${savedName}`;
      showMainContent();
    }
  }

  async function confirmPassword() {
    const nameInput = document.getElementById('name-input');
    const pwInput = document.getElementById('pw-input');
    const pwError = document.getElementById('pw-error');
    const enteredName = nameInput.value.trim();
    const enteredPw = pwInput.value;

    if (!enteredName) {
      pwError.textContent = '이름을 입력해주세요.';
      pwError.classList.add('show');
      return;
    }

    try {
      // DB에서 이름으로 학생 검색
      const res = await fetch(`${SUPABASE_URL}/rest/v1/students?name=eq.${encodeURIComponent(enteredName)}&select=id,name,password`, {
        headers: sbHeaders()
      });
      const data = await res.json();
      const stu = data[0];

      if (!stu) {
        pwError.textContent = '등록되지 않은 이름이에요. 선생님께 문의하세요.';
        pwError.classList.add('show');
        return;
      }

      // 비밀번호 확인 (비어있으면 아무 값이나 통과)
      const correctPw = stu.password || '';
      if (correctPw !== '' && enteredPw !== correctPw) {
        pwError.textContent = '비밀번호가 틀렸어요. 선생님께 문의하세요.';
        pwError.classList.add('show');
        pwInput.value = '';
        pwInput.focus();
        return;
      }

      // 로그인 성공
      pwError.classList.remove('show');
      sessionStorage.setItem('my_student_id', stu.id);
      sessionStorage.setItem('my_student_name', stu.name);
      document.getElementById('student-select').value = stu.id;

      document.getElementById('login-form').style.display = 'none';
      document.getElementById('logged-in-label').style.display = 'flex';
      document.getElementById('logged-in-name').textContent = `✅ ${stu.name}`;

      showMainContent();
    } catch (err) {
      console.error(err);
      pwError.textContent = '오류가 발생했어요. 다시 시도해주세요.';
      pwError.classList.add('show');
    }
  }

  function showMainContent() {
    document.getElementById('content-area').style.display = 'block';
    document.getElementById('no-student-msg').style.display = 'none';
    checkSubmitButton();
    loadMyEntries();
  }

  function logout() {
    sessionStorage.removeItem('my_student_id');
    sessionStorage.removeItem('my_student_name');
    document.getElementById('student-select').value = '';
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('logged-in-label').style.display = 'none';
    document.getElementById('content-area').style.display = 'none';
    document.getElementById('no-student-msg').style.display = 'block';
    document.getElementById('name-input').value = '';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').classList.remove('show');
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    if (tab === 'view') loadMyEntries();
    if (tab === 'qna') loadQnA();
  }

  function showUploadOptions(kind) {
    const sheet = document.getElementById('upload-action-sheet');
    sheet.style.display = 'flex';
    sheet.dataset.kind = kind;
  }

  function hideUploadSheet() {
    document.getElementById('upload-action-sheet').style.display = 'none';
  }

  function uploadSheetSelect(type) {
    const kind = document.getElementById('upload-action-sheet').dataset.kind;
    hideUploadSheet();
    if (type === 'camera') {
      document.getElementById(`file-input-${kind}-cam`).click();
    } else {
      document.getElementById(`file-input-${kind}`).click();
    }
  }

  function onFileSelect(e, kind) {
    const file = e.target.files[0];
    if (!file) return;
    pendingFiles[kind] = file;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const zone = document.getElementById('upload-zone-' + kind);
      zone.classList.add('has-image');
      zone.innerHTML = `<img src="${ev.target.result}" alt="미리보기" />`;
      checkSubmitButton();
    };
    reader.readAsDataURL(file);
  }

  function checkSubmitButton() {
    const studentId = document.getElementById('student-select').value;
    document.getElementById('submit-btn').disabled = !(pendingFiles.problem && studentId);
  }

  function compressImage(file, maxSize = 1200, quality = 0.85) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
          else if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }

          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);

          canvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('이미지 압축 실패'));
          }, 'image/jpeg', quality);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadOne(file, studentId, tag) {
    const compressedBlob = await compressImage(file);
    const fileName = `${studentId}_${tag}_${Date.now()}.jpg`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${fileName}`, {
      method: 'POST',
      headers: sbHeaders({ 'Content-Type': 'image/jpeg' }),
      body: compressedBlob
    });
    if (!uploadRes.ok) {
      const errText = await uploadRes.text();
      throw new Error('이미지 업로드 실패: ' + errText);
    }
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${fileName}`;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = 'status-msg show ' + type;
  }

  async function submitEntry() {
    const studentId = document.getElementById('student-select').value;
    const memo = document.getElementById('memo-input').value.trim();
    if (!pendingFiles.problem || !studentId) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    showStatus('업로드 중이에요...', 'loading');

    try {
      const imageUrl = await uploadOne(pendingFiles.problem, studentId, 'problem');
      let imageMineUrl = '';
      if (pendingFiles.mine) {
        imageMineUrl = await uploadOne(pendingFiles.mine, studentId, 'mine');
      }

      const today = new Date();
      const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({
          student_id: studentId,
          image_url: imageUrl,
          image_mine_url: imageMineUrl,
          memo: memo,
          entry_date: dateStr,
          solved: false,
          retry_count: 0
        })
      });

      if (!dbRes.ok) {
        const errText = await dbRes.text();
        throw new Error('저장 실패: ' + errText);
      }

      showStatus('✅ 오답이 올라갔어요! 선생님이 풀이를 정리해주실 거예요', 'success');

      pendingFiles = { problem: null, mine: null };
      document.getElementById('file-input-problem').value = '';
      document.getElementById('file-input-mine').value = '';
      resetUploadZone('problem', '탭해서 촬영', '📷');
      resetUploadZone('mine', '탭해서 촬영', '✏️');
      document.getElementById('memo-input').value = '';
      checkSubmitButton();

      currentPage = 1;
      loadMyEntries();

    } catch (err) {
      console.error(err);
      showStatus('❌ 업로드에 실패했어요. 다시 시도해주세요', 'error');
    } finally {
      checkSubmitButton();
    }
  }

  function resetUploadZone(kind, label, icon) {
    const zone = document.getElementById('upload-zone-' + kind);
    zone.classList.remove('has-image');
    zone.innerHTML = `<div class="upload-text"><div class="upload-icon">${icon}</div>${label}</div>`;
  }

  async function loadMyEntries() {
    const studentId = document.getElementById('student-select').value;
    if (!studentId) return;

    const container = document.getElementById('note-list');
    container.innerHTML = '<div class="empty">불러오는 중...</div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('page-info').textContent = '';

    try {
      // 필터 조건 쿼리 문자열
      let filterQ = `student_id=eq.${studentId}`;
      if (viewFilter === 'reviewing') filterQ += `&review_status=eq.pending`;
      if (viewFilter === 'redo')      filterQ += `&review_status=eq.rejected`;
      if (viewFilter === 'solved')    filterQ += `&solved=eq.true`;
      if (viewFilter === 'hasSolution') filterQ += `&image_solution_url=not.is.null`;
      if (unitSearchKeyword) filterQ += `&or=(subject.ilike.*${unitSearchKeyword}*,major_unit.ilike.*${unitSearchKeyword}*,minor_unit.ilike.*${unitSearchKeyword}*)`;

      // 대단원별 뷰는 전체 데이터 불러오기
      if (viewFilter === 'byUnit') {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/wrong_notes?${filterQ}&select=*&order=subject.asc,major_unit.asc,created_at.desc`,
          { headers: sbHeaders() }
        );
        currentEntries = await res.json();
        totalCount = currentEntries.length;
        renderMyEntries();
        return;
      }

      const offset = (currentPage - 1) * PAGE_SIZE;

      // 전체 카운트 (통계용 — 필터 없이 전체)
      const countRes = await fetch(
        `${SUPABASE_URL}/rest/v1/wrong_notes?student_id=eq.${studentId}&select=id,solved,review_status`,
        { headers: sbHeaders() }
      );
      const allRows = await countRes.json();
      const total = allRows.length;
      const solvedCount = allRows.filter(e => e.solved).length;
      const reviewingCount = allRows.filter(e => {
        const rs = e.review_status || (e.solved ? 'approved' : 'pending');
        return rs === 'pending' || rs === 'rejected';
      }).length;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-solved').textContent = solvedCount;
      document.getElementById('stat-pending').textContent = reviewingCount;

      // 진행률 바 업데이트
      const pct = total > 0 ? Math.round((solvedCount / total) * 100) : 0;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';

      // 약점 TOP3 계산 (전체 데이터 기준)
      renderWeaknessStudent(allRows);

      // 현재 필터 + 페이지 데이터
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/wrong_notes?${filterQ}&select=*&order=created_at.desc&limit=${PAGE_SIZE}&offset=${offset}`,
        { headers: sbHeaders({ 'Prefer': 'count=exact' }) }
      );
      // Content-Range 헤더에서 필터된 총 개수 파싱
      const contentRange = res.headers.get('content-range'); // e.g. "0-19/87"
      totalCount = contentRange ? parseInt(contentRange.split('/')[1]) : 0;
      currentEntries = await res.json();

      renderMyEntries();
    } catch (err) {
      console.error('오답 불러오기 실패', err);
      container.innerHTML = '<div class="empty">불러오기에 실패했어요</div>';
    }
  }

  function saveModalImage() {

  // 이미지 모달 + 핀치 줌 (완전 재작성)
  let _scale = 1, _lastScale = 1;
  let _tx = 0, _ty = 0;
  let _lastTx = 0, _lastTy = 0;
  let _pinching = false, _initDist = 0, _initMidX = 0, _initMidY = 0;
  let _dragging = false, _dragStartX = 0, _dragStartY = 0;
  let _lastTap = 0;

  function openModal(src, label) {
    const img = document.getElementById('modal-img');
    const overlay = document.getElementById('modal-overlay');
    img.src = src;
    document.getElementById('modal-label').textContent = label || '';
    _scale = 1; _tx = 0; _ty = 0;
    img.style.transition = 'none';
    img.style.transform = '';
    overlay.classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
  }

  function _applyTransform(img, animated) {
    img.style.transition = animated ? 'transform 0.2s ease' : 'none';
    img.style.transform = `translate(${_tx}px, ${_ty}px) scale(${_scale})`;
  }

  // 모달 터치 이벤트 (한 번만 등록)
  document.addEventListener('DOMContentLoaded', () => {
    const img = document.getElementById('modal-img');
    const overlay = document.getElementById('modal-overlay');
    if (!img || !overlay) return;

    img.addEventListener('touchstart', e => {
      e.preventDefault();
      if (e.touches.length === 2) {
        _pinching = true;
        _dragging = false;
        _initDist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
        _initMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        _initMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        _lastScale = _scale;
        _lastTx = _tx; _lastTy = _ty;
      } else if (e.touches.length === 1) {
        _dragging = true;
        _dragStartX = e.touches[0].clientX - _tx;
        _dragStartY = e.touches[0].clientY - _ty;

        // 더블탭 체크
        const now = Date.now();
        if (now - _lastTap < 280) {
          if (_scale > 1) {
            _scale = 1; _tx = 0; _ty = 0;
          } else {
            _scale = 2.5;
          }
          _applyTransform(img, true);
        }
        _lastTap = now;
      }
    }, { passive: false });

    img.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2 && _pinching) {
        const dist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
        _scale = Math.min(6, Math.max(1, _lastScale * (dist / _initDist)));
        _applyTransform(img, false);
      } else if (e.touches.length === 1 && _dragging) {
        if (_scale <= 1) return;
        _tx = e.touches[0].clientX - _dragStartX;
        _ty = e.touches[0].clientY - _dragStartY;
        _applyTransform(img, false);
      }
    }, { passive: false });

    img.addEventListener('touchend', e => {
      if (e.touches.length < 2) _pinching = false;
      if (e.touches.length === 0) {
        _dragging = false;
        // 1배 이하면 원위치
        if (_scale < 1.1) {
          _scale = 1; _tx = 0; _ty = 0;
          _applyTransform(img, true);
        }
      }
    });

    // 배경 탭으로 닫기
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });
  });

  async function uploadMinePhoto(e, entryId) {
    const file = e.target.files[0];
    if (!file) return;

    const statusEl = document.getElementById(`mine-status-${entryId}`);
    if (statusEl) statusEl.textContent = '업로드 중...';

    try {
      const studentId = document.getElementById('student-select').value;
      const compressedBlob = await compressImage(file);
      const fileName = `${studentId}_mine_${Date.now()}.jpg`;

      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${fileName}`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'image/jpeg' }),
        body: compressedBlob
      });
      if (!uploadRes.ok) throw new Error(await uploadRes.text());

      const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${fileName}`;

      // 풀이를 새로 올리면 다시 '검수 대기' 상태로 (선생님이 재검수하도록)
      const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/wrong_notes?id=eq.${entryId}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ image_mine_url: imageUrl, review_status: 'pending', solved: false })
      });
      if (!dbRes.ok) throw new Error(await dbRes.text());

      if (statusEl) statusEl.textContent = '✅ 올라갔어요! 선생님이 다시 확인해주실 거예요';
      setTimeout(() => loadMyEntries(), 1000);
    } catch (err) {
      console.error(err);
      if (statusEl) statusEl.textContent = '❌ 실패했어요. 다시 시도해주세요';
    }
  }

  function noteCardHtml(e) {
    const hasSolution = !!e.image_solution_url;
    const hasMine = !!e.image_mine_url;
    const unitLabel = [e.subject, e.major_unit, e.minor_unit].filter(Boolean).join(' · ');

    let thumbs = [{ src: e.image_url, label: '문제' }];
    if (e.image_mine_url) thumbs.push({ src: e.image_mine_url, label: '내 풀이' });
    if (e.image_solution_url) thumbs.push({ src: e.image_solution_url, label: '모범 풀이' });

    const thumbsHtml = thumbs.map(t => `
      <div class="note-thumb-col">
        <img class="note-thumb" src="${t.src}" onclick="openModal('${t.src}', '${t.label}')" alt="${t.label}" />
        <div class="note-thumb-label">${t.label}</div>
      </div>
    `).join('');

    // 내 풀이가 없거나, 선생님이 NO(rejected)한 경우 풀이 올리기 버튼 표시
    const reviewStatusForBtn = e.review_status || (e.solved ? 'approved' : 'pending');
    const showMineBtn = !hasMine || reviewStatusForBtn === 'rejected';
    const addMineBtn = showMineBtn ? `
      <div style="margin-top:8px;">
        <button class="btn-add-mine" onclick="document.getElementById('mine-file-${e.id}').click()">${reviewStatusForBtn === 'rejected' ? '🔄 다시 푼 풀이 올리기' : '✏️ 내 풀이 올리기'}</button>
        <input type="file" id="mine-file-${e.id}" class="file-input-hidden" accept="image/*" onchange="uploadMinePhoto(event, '${e.id}')" />
        <div class="uploading-mine" id="mine-status-${e.id}"></div>
      </div>
    ` : '';

    const reviewStatus = e.review_status || (e.solved ? 'approved' : 'pending');
    const statusInfo =
      reviewStatus === 'approved' ? { cls: 'approved', text: '✅ 완료! 잘했어요' }
      : reviewStatus === 'rejected' ? { cls: 'rejected', text: '🔄 다시 풀어야 해요' }
      : { cls: 'pending', text: '⏳ 선생님 검수 대기중' };

    return `
      <div class="note-card ${e.solved ? 'solved' : ''} ${hasSolution ? 'has-solution' : ''} ${reviewStatus === 'rejected' ? 'rejected-card' : ''}">
        <div class="note-thumbs-row">${thumbsHtml}</div>
        <div class="note-meta-row">
          <span class="student-status-badge ${statusInfo.cls}">${statusInfo.text}</span>
          ${unitLabel ? `<span class="note-unit-tag">${unitLabel}</span>` : `<span class="note-unsorted-tag">분류 대기중</span>`}
          ${hasSolution ? `<span class="note-solution-tag">✅ 모범풀이 도착</span>` : ''}
          ${(e.retry_count || 0) > 0 ? `<span class="note-retry-badge-s">틀린 횟수 ${e.retry_count}회</span>` : ''}
        </div>
        ${e.memo ? `<p class="note-memo">🙋 <span style="font-weight:700;color:var(--pink);">학생의견:</span> ${e.memo}</p>` : ''}
        ${e.teacher_memo ? `<p class="note-memo">👩‍🏫 <span style="font-weight:700;color:var(--green);">선생님의견:</span> ${e.teacher_memo}</p>` : ''}
        <p class="note-date">${formatDate(e.entry_date)}</p>
        ${addMineBtn}
      </div>
    `;
  }

  function renderMyEntries() {
    const container = document.getElementById('note-list');
    const pag = document.getElementById('pagination');
    const info = document.getElementById('page-info');

    // 대단원별 폴더 뷰
    if (viewFilter === 'byUnit') {
      if (!currentEntries.length) {
        container.innerHTML = '<div class="empty">표시할 오답이 없어요</div>';
        if (pag) pag.innerHTML = '';
        if (info) info.textContent = '';
        return;
      }
      const groups = {};
      currentEntries.forEach(e => {
        const key = [e.subject, e.major_unit].filter(Boolean).join(' > ') || '미분류';
        if (!groups[key]) groups[key] = [];
        groups[key].push(e);
      });
      container.innerHTML = Object.entries(groups).map(([unit, entries], i) => {
        const groupId = `s-group-${i}`;
        const isUnsorted = unit === '미분류';
        return `
          <div class="s-subject-group">
            <div class="s-subject-header" onclick="toggleStudentGroup('${groupId}')">
              <span class="s-subject-arrow open" id="arrow-${groupId}">▶</span>
              <span style="font-size:18px;">${isUnsorted ? '📂' : '📚'}</span>
              <span class="s-subject-name">${unit}</span>
              <span class="s-subject-count">${entries.length}개</span>
            </div>
            <div class="s-subject-body open" id="${groupId}">
              ${entries.map(noteCardHtml).join('')}
            </div>
          </div>`;
      }).join('');
      if (pag) pag.innerHTML = '';
      if (info) info.textContent = '';
      return;
    }
    if (currentEntries.length === 0) {
      container.innerHTML = '<div class="empty">표시할 오답이 없어요</div>';
      document.getElementById('pagination').innerHTML = '';
      document.getElementById('page-info').textContent = '';
      return;
    }
    container.innerHTML = currentEntries.map(noteCardHtml).join('');

    // 페이지네이션 버튼 렌더
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);

    if (totalPages <= 1) { pag.innerHTML = ''; info.textContent = ''; return; }

    info.textContent = `전체 ${totalCount}개 중 ${(currentPage-1)*PAGE_SIZE+1}–${Math.min(currentPage*PAGE_SIZE, totalCount)}번째`;

    let btns = '';
    // 이전
    btns += `<button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" onclick="goPage(${currentPage-1})">‹</button>`;

    // 페이지 번호 (최대 5개 노출)
    const start = Math.max(1, currentPage - 2);
    const end   = Math.min(totalPages, start + 4);
    if (start > 1) btns += `<button class="page-btn" onclick="goPage(1)">1</button>${start > 2 ? '<span style="padding:0 2px;color:#ccc">…</span>' : ''}`;
    for (let p = start; p <= end; p++) {
      btns += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
    if (end < totalPages) btns += `${end < totalPages - 1 ? '<span style="padding:0 2px;color:#ccc">…</span>' : ''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;

    // 다음
    btns += `<button class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" onclick="goPage(${currentPage+1})">›</button>`;
    pag.innerHTML = btns;
  }

  function goPage(p) {
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    loadMyEntries();
    // 목록 상단으로 스크롤
    document.getElementById('note-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderWeaknessStudent(allRows) {
    const container = document.getElementById('weakness-list-s');
    if (!container) return;
    const withRetry = allRows.filter(e => (e.retry_count || 0) > 0 && e.minor_unit);
    if (withRetry.length === 0) {
      container.innerHTML = '<p class="weakness-empty-s">아직 틀린 횟수 데이터가 없어요 🎉</p>';
      return;
    }
    const counts = {};
    withRetry.forEach(e => {
      const key = [e.subject, e.major_unit, e.minor_unit].filter(Boolean).join(' > ');
      counts[key] = (counts[key] || 0) + (e.retry_count || 0);
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const medals = ['🥇', '🥈', '🥉'];
    container.innerHTML = sorted.map((item, i) =>
      `<div class="weakness-item-s">
        <span>${medals[i]} ${item[0]}</span>
        <span class="weakness-count-s">총 ${item[1]}회 틀림</span>
      </div>`
    ).join('');
  }

  // ===== 문의 게시판 =====
  const QNA_PAGE_SIZE = 5;
  let qnaPage = 1;
  let qnaTotalCount = 0;
  let currentQnaId = null;

  async function loadQnA(page = 1) {
    qnaPage = page;
    const container = document.getElementById('qna-list');
    const pagEl = document.getElementById('qna-pagination');
    if (!container) return;
    container.innerHTML = '<div class="empty">불러오는 중...</div>';

    try {
      const offset = (page - 1) * QNA_PAGE_SIZE;
      const countRes = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=id`, { headers: sbHeaders({ 'Prefer': 'count=exact' }) });
      const cr = countRes.headers.get('content-range');
      qnaTotalCount = cr ? parseInt(cr.split('/')[1]) : 0;

      const res = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=*&order=created_at.desc&limit=${QNA_PAGE_SIZE}&offset=${offset}`, { headers: sbHeaders() });
      const list = await res.json();

      // 학생 이름 조회
      let studentMap = {};
      if (Array.isArray(list) && list.length) {
        const ids = [...new Set(list.filter(q => q.student_id).map(q => q.student_id))];
        if (ids.length) {
          const sRes = await fetch(`${SUPABASE_URL}/rest/v1/students?id=in.(${ids.join(',')})&select=id,name`, { headers: sbHeaders() });
          const sData = await sRes.json();
          sData.forEach(s => studentMap[s.id] = s.name);
        }
      }

      if (!Array.isArray(list) || !list.length) {
        container.innerHTML = '<div class="empty" style="padding:2rem;">아직 질문이 없어요</div>';
        if (pagEl) pagEl.innerHTML = '';
        return;
      }

      // 게시판 목록 스타일
      container.innerHTML = list.map((q, i) => {
        const date = new Date(q.created_at).toLocaleDateString('ko-KR');
        const studentName = studentMap[q.student_id] || '알 수 없음';
        const isMe = q.student_id === document.getElementById('student-select').value;
        return `
          <div onclick="openQnaDetail('${q.id}')" style="padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);${i===list.length-1?'border-bottom:none;':''}display:flex;align-items:center;justify-content:space-between;gap:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:${isMe?'700':'600'};color:var(--text1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${isMe?'👤 ':''} ${q.title}</div>
              <div style="font-size:11px;color:var(--text4);">${studentName} · ${date}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
              ${q.answer ? '<span style="font-size:10px;padding:2px 7px;border-radius:6px;background:var(--green-light);color:var(--green);font-weight:700;">답변완료</span>' : '<span style="font-size:10px;padding:2px 7px;border-radius:6px;background:#FFF3CC;color:#854F0B;font-weight:700;">대기중</span>'}
              <span style="font-size:18px;color:var(--text4);">›</span>
            </div>
          </div>`;
      }).join('');

      // 페이지네이션
      if (pagEl) {
        const totalPages = Math.ceil(qnaTotalCount / QNA_PAGE_SIZE);
        if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
        let btns = `<button class="page-btn ${page===1?'disabled':''}" onclick="loadQnA(${page-1})">‹</button>`;
        for (let p = 1; p <= totalPages; p++) btns += `<button class="page-btn ${p===page?'active':''}" onclick="loadQnA(${p})">${p}</button>`;
        btns += `<button class="page-btn ${page===qnaTotalCount?'disabled':''}" onclick="loadQnA(${page+1})">›</button>`;
        pagEl.innerHTML = btns;
      }
    } catch(e) { container.innerHTML = '<div class="empty">불러오기 실패</div>'; }
  }

  async function openQnaDetail(qId) {
    currentQnaId = qId;
    document.getElementById('qna-board-view').style.display = 'none';
    document.getElementById('qna-detail-view').style.display = 'block';

            <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px;">✅ 선생님 답변</div>

    document.getElementById('qna-board-view').style.display = 'block';

  async function loadComments(qId) {
    const container = document.getElementById('qna-comments-list');
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments?question_id=eq.${qId}&order=created_at.asc`, { headers: sbHeaders() });
      const comments = await res.json();

      if (!comments.length) { container.innerHTML = '<div style="font-size:13px;color:var(--text4);text-align:center;padding:12px;">아직 댓글이 없어요</div>'; return; }

      // 댓글/대댓글 구조
      const roots = comments.filter(c => !c.parent_id);
      const replies = comments.filter(c => c.parent_id);

      container.innerHTML = roots.map(c => {
        const date = new Date(c.created_at).toLocaleDateString('ko-KR');
        const myReplies = replies.filter(r => r.parent_id === c.id);
        return `
          <div>
            <div style="background:var(--bg3);border-radius:12px;padding:10px 12px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="font-size:12px;font-weight:700;color:var(--text1);">${c.author_name}</span>
                <span style="font-size:11px;color:var(--text4);">${date}</span>
              </div>
              <div style="font-size:13px;color:var(--text2);margin-bottom:6px;">${c.content}</div>
              <button onclick="showReplyInput('${c.id}')" style="background:none;border:none;font-size:11px;color:var(--pink);font-weight:600;cursor:pointer;">↩ 답글</button>
            </div>
            ${myReplies.map(r => `
              <div style="margin-left:16px;margin-top:6px;background:var(--bg4);border-radius:10px;padding:9px 12px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
                  <span style="font-size:12px;font-weight:700;color:var(--text1);">↩ ${r.author_name}</span>
                  <span style="font-size:11px;color:var(--text4);">${new Date(r.created_at).toLocaleDateString('ko-KR')}</span>
                </div>
                <div style="font-size:13px;color:var(--text2);">${r.content}</div>
              </div>`).join('')}
            <div id="reply-input-${c.id}" style="display:none;margin-left:16px;margin-top:6px;display:none;">
              <div style="display:flex;gap:6px;">
                <input type="text" id="reply-text-${c.id}" placeholder="답글 입력..." style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);font-size:12px;outline:none;background:var(--bg2);color:var(--text1);" />
                <button onclick="submitReply('${c.id}')" style="padding:8px 12px;border-radius:8px;border:none;background:var(--pink);color:white;font-size:12px;font-weight:600;cursor:pointer;">등록</button>
              </div>
            </div>
          </div>`;
      }).join('');
    } catch { container.innerHTML = '<div class="empty">불러오기 실패</div>'; }
  }

  function showReplyInput(commentId) {
    const el = document.getElementById(`reply-input-${commentId}`);
    if (el) { el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
  }

  async function submitComment() {
    const input = document.getElementById('comment-input');
    const content = input.value.trim();
    const studentId = document.getElementById('student-select').value;
    const nameEl = document.getElementById('logged-in-name');
    const authorName = (nameEl ? nameEl.textContent : '학생').replace(/✅\s*/g, '').trim();
    if (!content) return;
    if (!currentQnaId) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
        method: 'POST',
        headers: sbHeaders({ 'Prefer': 'return=minimal' }),
        body: JSON.stringify({ question_id: currentQnaId, student_id: studentId, author_name: authorName, content })
      });
      if (!res.ok) { const err = await res.text(); alert('댓글 등록 실패: ' + err); return; }
      input.value = '';
      loadComments(currentQnaId);
    } catch(e) { alert('댓글 등록 실패했어요 ㅠㅠ ' + e.message); }
  }

  async function submitReply(parentId) {
    const input = document.getElementById(`reply-text-${parentId}`);
    const content = input.value.trim();
    const studentId = document.getElementById('student-select').value;
    const nameEl = document.getElementById('logged-in-name');
    const authorName = (nameEl ? nameEl.textContent : '학생').replace(/✅\s*/g, '').trim();
    if (!content) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
        method: 'POST',
        headers: sbHeaders({ 'Prefer': 'return=minimal' }),
        body: JSON.stringify({ question_id: currentQnaId, student_id: studentId, author_name: authorName, content, parent_id: parentId })
      });
      if (!res.ok) { const err = await res.text(); alert('답글 등록 실패: ' + err); return; }
      input.value = '';
      loadComments(currentQnaId);
    } catch(e) { alert('답글 등록 실패했어요 ㅠㅠ ' + e.message); }
  }

  async function submitQuestion() {
    const title = document.getElementById('qna-title').value.trim();
    const content = document.getElementById('qna-content').value.trim();
    const studentId = document.getElementById('student-select').value;
    if (!title) { alert('제목을 입력해주세요!'); return; }
    if (!studentId) { alert('로그인 후 질문을 올릴 수 있어요!'); return; }
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/questions`, {
        method: 'POST',
        headers: sbHeaders({ 'Prefer': 'return=minimal', 'Content-Type': 'application/json' }),
        body: JSON.stringify({ student_id: studentId, title, content })
      });
      if (!res.ok) {
        const err = await res.text();
        console.error('질문 올리기 실패:', err);
        alert('올리기 실패했어요 ㅠㅠ 오류: ' + err);
        return;
      }
      document.getElementById('qna-title').value = '';
      document.getElementById('qna-content').value = '';
      alert('질문이 올라갔어요! 선생님이 답변해주실 거예요 😊');
      loadQnA();
    } catch(e) { alert('올리기 실패했어요 ㅠㅠ ' + e.message); }
  }

  let reviewQueue = [];
  let reviewIndex = 0;

  function toggleStudentGroup(groupId) {
    const body = document.getElementById(groupId);
    const arrow = document.getElementById(`arrow-${groupId}`);
    if (!body) return;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    if (arrow) arrow.classList.toggle('open', !isOpen);
  }

  function startRandomReview() {
    const pending = currentEntries.filter(e => !e.solved);
    if (pending.length === 0) {
      alert('미해결 오답이 없어요! 모두 복습 완료했네요 🎉');
      return;
    }
    const shuffled = [...pending].sort(() => Math.random() - 0.5);
    reviewQueue = shuffled.slice(0, Math.min(3, shuffled.length));
    reviewIndex = 0;
    document.getElementById('review-modal-overlay').classList.add('show');
    renderReviewModal();
  }

  function closeRandomReview() {
    document.getElementById('review-modal-overlay').classList.remove('show');
  }

  function renderReviewModal() {
    const body = document.getElementById('review-modal-body');
    if (reviewIndex >= reviewQueue.length) {
      body.innerHTML = `<div style="text-align:center;padding:2rem;color:#999;font-size:14px;">🎉 오늘의 복습 끝!<br>수고했어요.</div>`;
      return;
    }
    const e = reviewQueue[reviewIndex];
    const unitLabel = [e.subject, e.major_unit, e.minor_unit].filter(Boolean).join(' · ') || '미분류';
    body.innerHTML = `
      <div style="font-size:12px;color:#888;margin-bottom:8px;">${reviewIndex+1} / ${reviewQueue.length}</div>
      <img src="${e.image_url}" style="width:100%;border-radius:12px;margin-bottom:12px;cursor:pointer;" alt="문제" onclick="openModal('${e.image_url}','문제')" />
      <p style="font-size:12px;color:#888;margin-bottom:16px;">${unitLabel}${e.memo ? ' — '+e.memo : ''}</p>
      <div style="display:flex;gap:8px;">
        <button onclick="skipReview()" style="flex:1;padding:12px;border-radius:10px;border:1px solid #ddd;background:white;font-size:13px;font-weight:600;cursor:pointer;color:#999;">다음으로 →</button>
      </div>
    `;
  }

  function skipReview() {
    reviewIndex++;
    renderReviewModal();
  }

  // 스플래시 음악 (10초 재생 후 페이드아웃)
  window.addEventListener('load', () => {
    const audio = new Audio('/splash.mp3');
    audio.volume = 0.8;
    audio.play().catch(() => {});

    // 7초 후부터 3초간 페이드아웃
    setTimeout(() => {
      const fadeInterval = setInterval(() => {
        if (audio.volume > 0.05) {
          audio.volume = Math.max(0, audio.volume - 0.05);
        } else {
          audio.volume = 0;
          audio.pause();
          clearInterval(fadeInterval);
        }
      }, 150);
    }, 7000);
  });

  // 당겨서 새로고침 막기 (스크롤은 유지)
  let touchStartY = 0;
  document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const touchY = e.touches[0].clientY;
    if (scrollTop === 0 && touchY > touchStartY) {
      e.preventDefault();
    }
  }, { passive: false });

  // 뒤로가기 버튼 막기
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });

  // 스플래시 제거
  setTimeout(() => {
    const splash = document.getElementById('splash-screen');
    if (splash) splash.classList.add('done');
  }, 4200);

  initLogin();

  // PWA 서비스워커 등록
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
  }
</script>
</body>
</html>
